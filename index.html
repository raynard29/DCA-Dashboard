<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="3600">
<title>DCA Portfolio Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0d14;--card:#111520;--card2:#161b2a;--border:#1e2538;
  --text:#e2e8f0;--muted:#64748b;--green:#22c55e;--red:#ef4444;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}

/* ── Header ── */
header{background:linear-gradient(135deg,#0d111e 0%,#111827 100%);border-bottom:1px solid var(--border);padding:18px 24px}
.hinner{max-width:1440px;margin:0 auto}
.htop{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
.logo{display:flex;align-items:center;gap:11px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#f7931a,#e07000);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0}
.logo-text{font-size:20px;font-weight:700;letter-spacing:-.5px}
.logo-sub{font-size:11px;color:var(--muted);margin-top:1px}
.hright{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.45)}}
.rbtn{background:#1a2035;border:1px solid #2a3350;color:var(--text);padding:6px 13px;border-radius:7px;font-size:12px;cursor:pointer;transition:.2s}
.rbtn:hover{background:#202840;border-color:#3a4470}

/* ── Stats ── */
.sbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.sc{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.sv{font-size:21px;font-weight:700;letter-spacing:-.5px}
.ss{font-size:10px;color:var(--muted);margin-top:2px}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}

/* ── Grid ── */
main{max-width:1440px;margin:0 auto;padding:22px 24px}
.sect{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sect::after{content:"";flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
@media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:440px){.grid{grid-template-columns:1fr}}

/* ── Card ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s}
.card:hover{border-color:#293050;transform:translateY(-2px);box-shadow:0 10px 36px rgba(0,0,0,.5)}
.ca{position:absolute;top:0;left:0;right:0;height:2px}
.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.sym{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.05}
.sbadge{font-size:10px;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;padding:2px 7px;white-space:nowrap;max-width:115px;overflow:hidden;text-overflow:ellipsis}
.cname{font-size:11px;color:var(--muted);margin-bottom:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr{display:flex;align-items:baseline;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.price{font-size:18px;font-weight:700}
.ybadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.yp{background:rgba(34,197,94,.14);color:var(--green)}
.yn{background:rgba(239,68,68,.14);color:var(--red)}
.yu{background:rgba(100,116,139,.12);color:var(--muted)}

/* ── Sparkline ── */
.sw{height:42px;width:100%;margin:6px 0}
.sw svg{width:100%;height:100%}

/* ── Position details ── */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:3px 6px;font-size:11px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.pl{color:var(--muted)}.pv{font-weight:600;text-align:right}

/* ── Status badge ── */
.st{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 9px;border-radius:4px;margin-top:9px;text-transform:uppercase}
.s-tr{background:rgba(168,85,247,.18);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.s-pr{background:rgba(34,197,94,.13);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.s-sp{background:rgba(239,68,68,.13);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.s-wa{background:rgba(100,116,139,.1);color:var(--muted);border:1px solid rgba(100,116,139,.2)}
.s-no{background:rgba(100,116,139,.07);color:#475569;border:1px solid rgba(100,116,139,.12)}
.card.dim{opacity:.5}

/* ── Loading / Error ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:260px;gap:14px;color:var(--muted);font-size:13px}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:#3b82f6;border-radius:50%;animation:rot .75s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.ebox{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.28);border-radius:9px;padding:14px 18px;color:#fca5a5;font-size:13px;margin:8px 0}

/* ── Footer ── */
footer{text-align:center;padding:22px;color:#374151;font-size:11px;border-top:1px solid var(--border);margin-top:8px}
</style>
</head>
<body>

<header>
  <div class="hinner">
    <div class="htop">
      <div class="logo">
        <div class="logo-icon">&#x20BF;</div>
        <div>
          <div class="logo-text">DCA Portfolio</div>
          <div class="logo-sub">Paper Trading &bull; Live Data</div>
        </div>
      </div>
      <div class="hright">
        <span class="live-dot"></span>
        <span id="ts">Loading&hellip;</span>
        <button class="rbtn" onclick="loadAll()">&#x21BB; Refresh</button>
      </div>
    </div>
    <div class="sbar" id="sbar">
      <div class="sc"><div class="sl">Portfolio Value</div><div class="sv neu">&mdash;</div></div>
      <div class="sc"><div class="sl">Cash</div><div class="sv neu">&mdash;</div></div>
      <div class="sc"><div class="sl">Invested</div><div class="sv neu">&mdash;</div></div>
      <div class="sc"><div class="sl">Unrealized P&amp;L</div><div class="sv neu">&mdash;</div></div>
      <div class="sc"><div class="sl">Day P&amp;L</div><div class="sv neu">&mdash;</div></div>
    </div>
  </div>
</header>

<main>
  <div class="sect">Holdings &mdash; 19 Stocks</div>
  <div id="grid"><div class="loading"><div class="spin"></div><span>Fetching live data from Alpaca&hellip;</span></div></div>
</main>

<footer id="foot">Generated 2026-06-05 14:10 UTC &middot; Auto-refreshes every hour &middot; Paper Trading Account</footer>

<script>
const KEY    = "PKVSKGUO3BBBBYYOX2TL5L7RPC";
const SECRET = "7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X";
const BASE   = "https://paper-api.alpaca.markets/v2";
const DBASE  = "https://data.alpaca.markets";

const STOCKS = [
    {sym:"STRC",name:"Strategy Inc",sector:"Crypto Treasury",color:"#f7931a",icon:"₿"},
    {sym:"MSTR",name:"MicroStrategy",sector:"Crypto Treasury",color:"#f7931a",icon:"₿"},
    {sym:"GEV",name:"GE Vernova",sector:"Energy",color:"#22c55e",icon:"⚡"},
    {sym:"BE",name:"Bloom Energy",sector:"Energy",color:"#22c55e",icon:"⚡"},
    {sym:"KGS",name:"Kodiak Gas",sector:"Energy",color:"#22c55e",icon:"⚡"},
    {sym:"QBTS",name:"D-Wave Quantum",sector:"Quantum",color:"#a855f7",icon:"⛛"},
    {sym:"IONQ",name:"IonQ",sector:"Quantum",color:"#a855f7",icon:"⛛"},
    {sym:"QUBT",name:"Quantum Computing",sector:"Quantum",color:"#a855f7",icon:"⛛"},
    {sym:"SNDK",name:"SanDisk",sector:"Semiconductors",color:"#3b82f6",icon:"💾"},
    {sym:"MU",name:"Micron Technology",sector:"Semiconductors",color:"#3b82f6",icon:"💾"},
    {sym:"WDC",name:"Western Digital",sector:"Semiconductors",color:"#3b82f6",icon:"💾"},
    {sym:"MRVL",name:"Marvell Technology",sector:"Semiconductors",color:"#3b82f6",icon:"💾"},
    {sym:"ALMU",name:"Aeluma Inc",sector:"Semiconductors",color:"#3b82f6",icon:"💾"},
    {sym:"IPGP",name:"IPG Photonics",sector:"Photonics",color:"#06b6d4",icon:"🔬"},
    {sym:"POET",name:"POET Technologies",sector:"Photonics",color:"#06b6d4",icon:"🔬"},
    {sym:"TSLA",name:"Tesla",sector:"EV",color:"#ef4444",icon:"🚗"},
    {sym:"AAPL",name:"Apple",sector:"Consumer Tech",color:"#64748b",icon:"📱"},
    {sym:"NFLX",name:"Netflix",sector:"Streaming",color:"#ec4899",icon:"🎬"},
    {sym:"CAT",name:"Caterpillar",sector:"Industrial",color:"#f59e0b",icon:"🏗"}
];

async function api(url) {
  const r = await fetch(url, {headers:{"APCA-API-KEY-ID":KEY,"APCA-API-SECRET-KEY":SECRET}});
  if (!r.ok) { const t = await r.text(); throw new Error(r.status+" "+r.statusText+": "+t.slice(0,200)); }
  return r.json();
}

const fmt$ = (v,d=2) => (v==null||isNaN(v)) ? "—" : "$"+Math.abs(+v).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtP = v => (v==null||isNaN(v)) ? "—" : ((+v>=0?"+":"")+(+v).toFixed(2)+"%");
const fmtS = v => { if(v==null||isNaN(v))return"—"; const n=+v; return n===Math.floor(n)?n.toLocaleString():n.toFixed(4); };

function sparkline(prices, color) {
  if (!prices || prices.length < 2) return '<svg viewBox="0 0 100 40"></svg>';
  const mn = Math.min(...prices), mx = Math.max(...prices), rng = mx-mn||1;
  const W=100, H=40, p=3;
  const pts = prices.map((v,i) => {
    const x = p + (i/(prices.length-1))*(W-p*2);
    const y = H - p - ((v-mn)/rng)*(H-p*2);
    return x.toFixed(1)+","+y.toFixed(1);
  });
  const poly = pts.join(" ");
  const gid  = "g"+color.replace("#","");
  const last = pts[pts.length-1].split(",");
  const area = p+","+(H-p)+" "+poly+" "+last[0]+","+(H-p);
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".28"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${area}" fill="url(#${gid})"/>
    <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function badge(plpc) {
  if (plpc == null) return '<span class="st s-no">NO POSITION</span>';
  const p = +plpc;
  if (p >= 10)  return '<span class="st s-tr">&#x1F680; TRAILING</span>';
  if (p <= -8)  return '<span class="st s-sp">&#x26A0; NEAR STOP</span>';
  if (p > 0)    return '<span class="st s-pr">&#x2713; IN PROFIT</span>';
  return '<span class="st s-wa">&#x1F441; WATCHING</span>';
}

function buildCard(s, pos, prices) {
  const hp  = !!pos;
  const cur = hp ? +pos.current_price : (prices.length ? prices[prices.length-1] : null);
  const ytd = (prices.length && cur != null) ? (cur - prices[0]) / prices[0] * 100 : null;
  const sc  = ytd == null ? "#64748b" : (ytd >= 0 ? "#22c55e" : "#ef4444");
  const plpc= hp ? +pos.unrealized_plpc * 100 : null;
  const stp = hp ? +pos.avg_entry_price * 0.9 : null;
  const yc  = ytd == null ? "yu" : (ytd >= 0 ? "yp" : "yn");

  return `<div class="card${hp ? "" : " dim"}">
    <div class="ca" style="background:${s.color}"></div>
    <div class="ch">
      <span class="sym" style="color:${s.color}">${s.sym}</span>
      <span class="sbadge">${s.icon} ${s.sector}</span>
    </div>
    <div class="cname">${s.name}</div>
    <div class="pr">
      <span class="price">${cur != null ? fmt$(cur) : "—"}</span>
      <span class="ybadge ${yc}">${ytd != null ? fmtP(ytd) : "N/A"} YTD</span>
    </div>
    <div class="sw">${sparkline(prices, sc)}</div>
    ${hp ? `<div class="pg">
      <span class="pl">Shares</span><span class="pv">${fmtS(pos.qty)}</span>
      <span class="pl">Avg Cost</span><span class="pv">${fmt$(pos.avg_entry_price)}</span>
      <span class="pl">P&amp;L</span><span class="pv ${plpc >= 0 ? "pos" : "neg"}">${fmtP(plpc)}</span>
      <span class="pl">Stop Price</span><span class="pv neg">${fmt$(stp)}</span>
    </div>` :
    `<div style="font-size:11px;color:var(--muted);margin-top:9px;padding-top:9px;border-top:1px solid var(--border)">No open position</div>`}
    ${badge(plpc)}
  </div>`;
}

function renderStats(acct, positions) {
  const eq  = +acct.equity, cash = +acct.cash;
  const inv = positions.reduce((s,p) => s + +p.market_value, 0);
  const upl = positions.reduce((s,p) => s + +p.unrealized_pl, 0);
  const dpl = positions.reduce((s,p) => s + (+p.unrealized_intraday_pl || 0), 0);
  const sg  = v => v >= 0 ? "pos" : "neg";
  document.getElementById("sbar").innerHTML = `
    <div class="sc"><div class="sl">Portfolio Value</div>
      <div class="sv">${fmt$(eq)}</div><div class="ss">Total equity</div></div>
    <div class="sc"><div class="sl">Cash</div>
      <div class="sv">${fmt$(cash)}</div>
      <div class="ss">BP: ${fmt$(acct.buying_power)}</div></div>
    <div class="sc"><div class="sl">Invested</div>
      <div class="sv">${fmt$(inv)}</div>
      <div class="ss">${positions.length} positions</div></div>
    <div class="sc"><div class="sl">Unrealized P&amp;L</div>
      <div class="sv ${sg(upl)}">${upl >= 0 ? "+" : ""}${fmt$(upl)}</div>
      <div class="ss">${fmtP(upl / Math.max(1, inv) * 100)}</div></div>
    <div class="sc"><div class="sl">Day P&amp;L</div>
      <div class="sv ${sg(dpl)}">${dpl >= 0 ? "+" : ""}${fmt$(dpl)}</div>
      <div class="ss">Intraday</div></div>`;
}

async function loadAll() {
  document.getElementById("grid").innerHTML = '<div class="loading"><div class="spin"></div><span>Fetching live data&hellip;</span></div>';
  document.getElementById("ts").textContent = "Loading…";
  try {
    const [acct, positions] = await Promise.all([
      api(BASE + "/account"),
      api(BASE + "/positions")
    ]);
    renderStats(acct, positions);

    const posMap = {};
    positions.forEach(p => posMap[p.symbol] = p);

    const syms  = STOCKS.map(s => s.sym).join(",");
    const yr    = new Date().getFullYear();
    const start = yr + "-01-02T00:00:00Z";
    const bd    = await api(DBASE + "/v2/stocks/bars?symbols=" + syms + "&timeframe=1Day&start=" + start + "&limit=10000&feed=iex&adjustment=raw");

    const bm = {};
    if (bd && bd.bars) {
      for (const [sym, bars] of Object.entries(bd.bars)) {
        bm[sym] = bars.map(b => b.c);
      }
    }

    document.getElementById("grid").innerHTML =
      '<div class="grid">' +
      STOCKS.map(s => buildCard(s, posMap[s.sym] || null, bm[s.sym] || [])).join("") +
      '</div>';

    const now = new Date();
    document.getElementById("ts").textContent =
      "Updated " + now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    document.getElementById("foot").textContent =
      "Live via Alpaca · Last refresh " + now.toLocaleString() + " · Paper Trading Account";

  } catch(e) {
    document.getElementById("grid").innerHTML =
      `<div class="ebox"><strong>Error loading data:</strong> ${e.message}<br>
       <small style="opacity:.7;display:block;margin-top:5px">Check browser console for details. Auto-retries on next hour-refresh.</small></div>`;
    document.getElementById("ts").textContent = "Error — click Refresh to retry";
    console.error("Dashboard error:", e);
  }
}

loadAll();
</script>
</body>
</html>
