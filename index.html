<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>DCA Portfolio Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0d14;--card:#111520;--border:#1e2535;
  --text:#e2e8f0;--muted:#64748b;
  --pos:#22c55e;--neg:#ef4444;
}
body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  min-height:100vh;padding:1.25rem 1rem 3rem;}

/* ── Header ─────────────────────────────── */
.hdr{max-width:1640px;margin:0 auto 2rem}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;flex-wrap:wrap;gap:.5rem}
.hdr-title{display:flex;align-items:center;gap:.6rem}
.hdr-title h1{font-size:1.45rem;font-weight:800;background:linear-gradient(130deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--pos);
  box-shadow:0 0 6px var(--pos);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
.refresh-btn{padding:.35rem .8rem;background:#1e2535;border:1px solid #2a3448;
  color:#94a3b8;border-radius:7px;cursor:pointer;font-size:.75rem;transition:.15s}
.refresh-btn:hover{background:#263045;color:#e2e8f0}

.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem}
@media(min-width:540px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.25rem;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,#3b82f6)}
.stat-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.45rem}
.stat-value{font-size:1.35rem;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}
.stat-sub{font-size:.7rem;color:var(--muted);margin-top:.2rem}
.pos-text{color:var(--pos)}
.neg-text{color:var(--neg)}

/* ── Grid ─────────────────────────────────── */
.grid{max-width:1640px;margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);gap:.9rem}
@media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:960px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1280px){.grid{grid-template-columns:repeat(5,1fr)}}

/* ── Card ────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:.95rem;position:relative;overflow:hidden;
  transition:transform .18s,box-shadow .18s,border-color .18s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:var(--accent,#3b82f6)}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.45);border-color:#2a3448}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.65rem}
.symbol{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;display:block;line-height:1}
.co-name{font-size:.65rem;color:var(--muted);display:block;margin-top:.18rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.right-badges{display:flex;flex-direction:column;align-items:flex-end;gap:.25rem}

.sector-badge{font-size:.58rem;padding:.18rem .42rem;border-radius:4px;
  border:1px solid;white-space:nowrap;font-weight:600;letter-spacing:.02em}
.status-badge{font-size:.55rem;padding:.14rem .36rem;border-radius:3px;
  font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.s-trailing{background:#f59e0b18;color:#f59e0b;border:1px solid #f59e0b35}
.s-stop{background:#ef444418;color:#ef4444;border:1px solid #ef444435;animation:blink 1.2s step-end infinite}
.s-profit{background:#22c55e18;color:#22c55e;border:1px solid #22c55e35}
.s-watch{background:#64748b18;color:#64748b;border:1px solid #64748b35}
@keyframes blink{50%{opacity:.35}}

.price-row{display:flex;align-items:center;gap:.45rem;margin-bottom:.4rem}
.price{font-size:1.05rem;font-weight:700;font-variant-numeric:tabular-nums}
.ytd-badge{font-size:.62rem;padding:.14rem .38rem;border-radius:4px;font-weight:600}
.ytd-pos{background:#22c55e18;color:#22c55e}
.ytd-neg{background:#ef444418;color:#ef4444}
.ytd-na{background:#64748b18;color:#64748b}

.spark-wrap{height:42px;margin:.3rem 0 .5rem;position:relative}
.spark-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%}
.no-spark{display:flex;align-items:center;justify-content:center;height:100%;
  color:#374151;font-size:.65rem}

.divider{border-top:1px solid var(--border);margin:.5rem 0 .45rem}
.pos-meta{display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted);margin-bottom:.35rem}
.pos-meta .stop{color:#f97316}
.no-pos{text-align:center;font-size:.68rem;color:#2d3a50;padding:.1rem 0}
.pl-row{display:flex;align-items:center;justify-content:space-between}
.pl-badge{font-size:.68rem;padding:.14rem .36rem;border-radius:4px;font-weight:700}
.pl-pos{background:#22c55e18;color:#22c55e}
.pl-neg{background:#ef444418;color:#ef4444}
.pl-dollar{font-size:.68rem}

/* ── Footer ──────────────────────────────── */
.footer{max-width:1640px;margin:2rem auto 0;text-align:center;
  color:var(--muted);font-size:.72rem;line-height:1.8}
.footer a{color:#4a90d9;text-decoration:none}

/* ── Loading / Error ─────────────────────── */
#loading{display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:70vh;gap:1rem}
.spinner{width:40px;height:40px;border:3px solid var(--border);
  border-top-color:#60a5fa;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{color:var(--muted);font-size:.88rem}
#err-box{display:none;background:#ef444412;border:1px solid #ef444428;
  border-radius:10px;padding:1.2rem 1.5rem;max-width:480px;text-align:center;color:#ef4444}
#err-box h3{margin-bottom:.5rem;font-size:.95rem}
#err-box p{font-size:.78rem;color:#f87171;line-height:1.5}
#err-box button{margin-top:.75rem;padding:.4rem 1.1rem;background:#ef444420;
  border:1px solid #ef444440;color:#ef4444;border-radius:7px;cursor:pointer;font-size:.78rem}
#err-box button:hover{background:#ef444430}
#dash{display:none}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="load-msg" id="load-txt">Connecting to Alpaca…</div>
  <div id="err-box">
    <h3>⚠ Could not fetch portfolio data</h3>
    <p id="err-detail">Check credentials and network.</p>
    <button onclick="init()">↺ Retry</button>
  </div>
</div>

<div id="dash">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-title">
        <div class="live-dot"></div>
        <h1>DCA Portfolio Dashboard</h1>
      </div>
      <button class="refresh-btn" onclick="init()">↺ Refresh</button>
    </div>
    <div class="stats-grid">
      <div class="stat" style="--accent:#60a5fa">
        <div class="stat-label">Portfolio Value</div>
        <div class="stat-value" id="s-pv">—</div>
        <div class="stat-sub" id="s-pv-sub"></div>
      </div>
      <div class="stat" style="--accent:#94a3b8">
        <div class="stat-label">Cash</div>
        <div class="stat-value" id="s-cash">—</div>
        <div class="stat-sub" id="s-cash-pct"></div>
      </div>
      <div class="stat" style="--accent:#a78bfa">
        <div class="stat-label">Invested</div>
        <div class="stat-value" id="s-inv">—</div>
        <div class="stat-sub" id="s-pos-ct"></div>
      </div>
      <div class="stat" style="--accent:#22c55e">
        <div class="stat-label">Unrealized P&amp;L</div>
        <div class="stat-value" id="s-upl">—</div>
        <div class="stat-sub" id="s-upl-pct"></div>
      </div>
    </div>
  </div>

  <div class="grid" id="stock-grid"></div>

  <div class="footer">
    <span id="last-updated">Generated 2026-06-10 17:10:09 UTC</span>
    &nbsp;·&nbsp; Auto-refreshes every hour
    &nbsp;·&nbsp; <a href="https://alpaca.markets" target="_blank">Paper Trading</a>
  </div>
</div>

<script>
'use strict';
const KEY = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const SEC = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const BASE = 'https://paper-api.alpaca.markets/v2';
const DATA = 'https://data.alpaca.markets';
const SYMS = 'STRC,MSTR,GEV,BE,KGS,QBTS,IONQ,QUBT,SNDK,MU,WDC,MRVL,ALMU,IPGP,POET,TSLA,AAPL,NFLX,CAT';
const H = { 'APCA-API-KEY-ID': KEY, 'APCA-API-SECRET-KEY': SEC };

const STOCKS = [
  {sym:'STRC', name:'Strategy Inc',       sector:'Crypto Treasury', color:'#f7931a'},
  {sym:'MSTR', name:'MicroStrategy',      sector:'Crypto Treasury', color:'#f7931a'},
  {sym:'GEV',  name:'GE Vernova',         sector:'Energy',          color:'#22c55e'},
  {sym:'BE',   name:'Bloom Energy',       sector:'Energy',          color:'#22c55e'},
  {sym:'KGS',  name:'Kodiak Gas',         sector:'Energy',          color:'#22c55e'},
  {sym:'QBTS', name:'D-Wave Quantum',     sector:'Quantum',         color:'#a855f7'},
  {sym:'IONQ', name:'IonQ',               sector:'Quantum',         color:'#a855f7'},
  {sym:'QUBT', name:'Quantum Computing',  sector:'Quantum',         color:'#a855f7'},
  {sym:'SNDK', name:'SanDisk',            sector:'Semiconductors',  color:'#3b82f6'},
  {sym:'MU',   name:'Micron Technology',  sector:'Semiconductors',  color:'#3b82f6'},
  {sym:'WDC',  name:'Western Digital',    sector:'Semiconductors',  color:'#3b82f6'},
  {sym:'MRVL', name:'Marvell Technology', sector:'Semiconductors',  color:'#3b82f6'},
  {sym:'ALMU', name:'Aeluma Inc',         sector:'Semiconductors',  color:'#3b82f6'},
  {sym:'IPGP', name:'IPG Photonics',      sector:'Photonics',       color:'#06b6d4'},
  {sym:'POET', name:'POET Technologies',  sector:'Photonics',       color:'#06b6d4'},
  {sym:'TSLA', name:'Tesla',              sector:'EV',              color:'#ef4444'},
  {sym:'AAPL', name:'Apple',              sector:'Consumer Tech',   color:'#64748b'},
  {sym:'NFLX', name:'Netflix',            sector:'Streaming',       color:'#ec4899'},
  {sym:'CAT',  name:'Caterpillar',        sector:'Industrial',      color:'#f59e0b'},
];

const ICONS = {
  'Crypto Treasury':'₿','Energy':'⚡','Quantum':'⚛','Semiconductors':'▣',
  'Photonics':'◈','EV':'⬡','Consumer Tech':'◎','Streaming':'▶','Industrial':'⚙',
};

function $$(id){ return document.getElementById(id); }
function money(n, dec=2){ return '$' + Math.abs(Number(n)).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function pct(n, dec=2){ const v=Number(n); return (v>=0?'+':'')+v.toFixed(dec)+'%'; }

async function apiFetch(url){
  const r = await fetch(url, {headers: H});
  if(!r.ok){ const t=await r.text(); throw new Error(`${r.status} — ${t.slice(0,120)}`); }
  return r.json();
}

function makeSpark(prices){
  if(!prices || prices.length < 3) return '<div class="no-spark">no data</div>';
  const mn = Math.min(...prices), mx = Math.max(...prices), rng = mx-mn || 1;
  const W=200, H=42, P=2;
  const xs = prices.map((_,i) => P + i/(prices.length-1)*(W-P*2));
  const ys = prices.map(p  => H-P - (p-mn)/rng*(H-P*2));
  const pts = xs.map((x,i) => `${x.toFixed(1)},${ys[i].toFixed(1)}`);
  const up = prices[prices.length-1] >= prices[0];
  const col = up ? '#22c55e' : '#ef4444';
  const line = `M${pts[0]} ` + pts.slice(1).map(p=>`L${p}`).join(' ');
  const area = line + ` L${xs[xs.length-1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
  const gid = `g${Math.random().toString(36).slice(2,6)}`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${col}" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
  </linearGradient></defs>
  <path d="${area}" fill="url(#${gid})"/>
  <path d="${line}" fill="none" stroke="${col}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
</svg>`;
}

function statusInfo(plpc){
  if(plpc >= 10)  return {lbl:'TRAILING ★', cls:'s-trailing'};
  if(plpc <= -8)  return {lbl:'NEAR STOP ⚠', cls:'s-stop'};
  if(plpc > 0)    return {lbl:'IN PROFIT', cls:'s-profit'};
  return               {lbl:'WATCHING', cls:'s-watch'};
}

function renderCards(positions, bars){
  const pmap = {};
  positions.forEach(p => pmap[p.symbol] = p);

  const grid = $$('stock-grid');
  grid.innerHTML = '';

  STOCKS.forEach(s => {
    const pos   = pmap[s.sym] || null;
    const raw   = (bars[s.sym] || []);
    const cls   = raw.map(b => b.c);
    const cur   = cls.length ? cls[cls.length-1] : null;
    const first = cls[0] || null;
    const ytd   = (first && cur) ? (cur-first)/first*100 : null;

    // YTD badge
    const ytdHtml = ytd !== null
      ? `<span class="ytd-badge ${ytd>=0?'ytd-pos':'ytd-neg'}">${ytd>=0?'+':''}${ytd.toFixed(1)}% YTD</span>`
      : `<span class="ytd-badge ytd-na">YTD n/a</span>`;

    let posHtml='', statusHtml='';
    if(pos){
      const qty  = parseFloat(pos.qty);
      const avg  = parseFloat(pos.avg_entry_price);
      const plpc = parseFloat(pos.unrealized_plpc)*100;
      const pl   = parseFloat(pos.unrealized_pl);
      const stop = avg*0.9;
      const si   = statusInfo(plpc);
      statusHtml = `<span class="status-badge ${si.cls}">${si.lbl}</span>`;
      posHtml = `
        <div class="divider"></div>
        <div class="pos-meta">
          <span>${qty%1===0?qty.toFixed(0):qty.toFixed(3)} sh @ ${money(avg)}</span>
          <span class="stop">Stop ${money(stop)}</span>
        </div>
        <div class="pl-row">
          <span class="pl-badge ${plpc>=0?'pl-pos':'pl-neg'}">${pct(plpc)}</span>
          <span class="pl-dollar ${pl>=0?'pos-text':'neg-text'}">${pl>=0?'+':'-'}${money(Math.abs(pl))}</span>
        </div>`;
    } else {
      statusHtml = `<span class="status-badge s-watch">WATCHING</span>`;
      posHtml = `<div class="divider"></div><div class="no-pos">— no position —</div>`;
    }

    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--accent', s.color);
    card.innerHTML = `
      <div class="card-top">
        <div>
          <span class="symbol">${s.sym}</span>
          <span class="co-name" title="${s.name}">${s.name}</span>
        </div>
        <div class="right-badges">
          <span class="sector-badge" style="background:${s.color}14;color:${s.color};border-color:${s.color}30">
            ${ICONS[s.sector]||''} ${s.sector}
          </span>
          ${statusHtml}
        </div>
      </div>
      <div class="price-row">
        <span class="price">${cur!==null ? money(cur) : '—'}</span>
        ${ytdHtml}
      </div>
      <div class="spark-wrap">${makeSpark(cls)}</div>
      ${posHtml}`;
    grid.appendChild(card);
  });
}

async function init(){
  $$('loading').style.display='flex';
  $$('err-box').style.display='none';
  $$('dash').style.display='none';
  $$('load-txt').textContent='Connecting to Alpaca…';

  try {
    const ytdStart = `${new Date().getFullYear()}-01-02T00:00:00Z`;
    $$('load-txt').textContent='Fetching account & positions…';

    const [acct, positions] = await Promise.all([
      apiFetch(`${BASE}/account`),
      apiFetch(`${BASE}/positions`),
    ]);

    $$('load-txt').textContent='Fetching YTD bars…';
    const barsResp = await apiFetch(
      `${DATA}/v2/stocks/bars?symbols=${SYMS}&timeframe=1Day&start=${ytdStart}&limit=10000&feed=iex&adjustment=raw`
    );
    const bars = barsResp.bars || {};

    /* ── Header stats ── */
    const pv   = parseFloat(acct.portfolio_value);
    const cash = parseFloat(acct.cash);
    const inv  = positions.reduce((s,p) => s+parseFloat(p.cost_basis), 0);
    const upl  = positions.reduce((s,p) => s+parseFloat(p.unrealized_pl), 0);
    const uplp = inv>0 ? upl/inv*100 : 0;
    const cashPct = pv>0 ? cash/pv*100 : 0;

    $$('s-pv').textContent  = money(pv);
    $$('s-cash').textContent= money(cash);
    $$('s-inv').textContent = money(inv);
    $$('s-cash-pct').textContent = `${cashPct.toFixed(1)}% of portfolio`;
    $$('s-pos-ct').textContent   = `${positions.length} position${positions.length!==1?'s':''}`;

    const uplEl = $$('s-upl');
    uplEl.textContent = (upl>=0?'+':'-') + money(Math.abs(upl));
    uplEl.className   = 'stat-value ' + (upl>=0?'pos-text':'neg-text');
    $$('s-upl-pct').textContent = `${pct(uplp)} vs cost basis`;

    renderCards(positions, bars);

    $$('last-updated').textContent = `Updated ${new Date().toLocaleString()}`;
    $$('loading').style.display='none';
    $$('dash').style.display='block';

  } catch(e) {
    console.error(e);
    $$('err-box').style.display='block';
    $$('err-detail').textContent = e.message;
    $$('load-txt').textContent = 'Failed to load data.';
  }
}

init();
</script>
</body>
</html>
