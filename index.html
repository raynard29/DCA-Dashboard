<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>DCA Portfolio Dashboard</title>
<style>
  :root {
    --bg: #0a0d14;
    --card: #111520;
    --card2: #161b2e;
    --border: #1e2535;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --blue: #3b82f6;
    --purple: #a855f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #0f1628 0%, #111520 100%); border-bottom: 1px solid var(--border); padding: 20px 24px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #3b82f6, #a855f7); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .logo h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
  .logo span { font-size: 0.75rem; color: var(--muted); display: block; margin-top: 1px; }
  .last-updated { font-size: 0.72rem; color: var(--muted); text-align: right; }
  .refresh-btn { background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; transition: all 0.2s; margin-left: 8px; }
  .refresh-btn:hover { background: var(--border); }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

  .stat-card { background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-value { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
  .stat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .neutral { color: var(--text); }

  /* MAIN */
  .main { padding: 24px; }
  .section-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* FILTER TABS */
  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { background: var(--card2); border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.78rem; transition: all 0.2s; }
  .filter-btn.active, .filter-btn:hover { background: var(--border); color: var(--text); border-color: #334155; }
  .filter-btn.active { border-color: var(--blue); color: var(--blue); }

  /* CARDS GRID */
  .cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 1200px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 900px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .cards-grid { grid-template-columns: 1fr; } }

  .stock-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; transition: transform 0.15s, border-color 0.15s; position: relative; overflow: hidden; }
  .stock-card:hover { transform: translateY(-2px); border-color: #2d3a52; }
  .stock-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }
  .stock-card.color-crypto::before { background: linear-gradient(90deg, #f7931a, #ff6b2b); }
  .stock-card.color-energy::before { background: linear-gradient(90deg, #22c55e, #16a34a); }
  .stock-card.color-quantum::before { background: linear-gradient(90deg, #a855f7, #7c3aed); }
  .stock-card.color-semi::before { background: linear-gradient(90deg, #3b82f6, #2563eb); }
  .stock-card.color-photonics::before { background: linear-gradient(90deg, #06b6d4, #0891b2); }
  .stock-card.color-ev::before { background: linear-gradient(90deg, #ef4444, #dc2626); }
  .stock-card.color-consumer::before { background: linear-gradient(90deg, #64748b, #475569); }
  .stock-card.color-streaming::before { background: linear-gradient(90deg, #ec4899, #db2777); }
  .stock-card.color-industrial::before { background: linear-gradient(90deg, #f59e0b, #d97706); }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .card-symbol { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .card-name { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
  .sector-badge { font-size: 0.62rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }

  .price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .current-price { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
  .ytd-badge { font-size: 0.72rem; font-weight: 600; padding: 2px 7px; border-radius: 6px; }
  .ytd-badge.up { background: rgba(34,197,94,0.15); color: var(--green); }
  .ytd-badge.down { background: rgba(239,68,68,0.15); color: var(--red); }
  .ytd-badge.flat { background: rgba(100,116,139,0.15); color: var(--muted); }

  /* SPARKLINE */
  .sparkline-wrap { margin: 10px 0; height: 52px; }
  svg.sparkline { width: 100%; height: 52px; }

  /* POSITION INFO */
  .position-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
  .pos-item { background: var(--card2); border-radius: 7px; padding: 6px 8px; }
  .pos-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .pos-value { font-size: 0.82rem; font-weight: 600; margin-top: 2px; }

  /* STATUS BADGE */
  .status-badge { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 4px 10px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em; }
  .status-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .status-trailing { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .status-trailing::before { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; }
  .status-near-stop { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .status-near-stop::before { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .status-in-profit { background: rgba(34,197,94,0.08); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
  .status-in-profit::before { background: #86efac; }
  .status-watching { background: rgba(100,116,139,0.12); color: var(--muted); border: 1px solid rgba(100,116,139,0.2); }
  .status-watching::before { background: var(--muted); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* NO POSITION */
  .no-position { font-size: 0.72rem; color: var(--muted); margin-top: 10px; text-align: center; padding: 8px; background: var(--card2); border-radius: 8px; }

  /* LOADING / ERROR */
  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 16px; }
  .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 0.9rem; }

  .error-banner { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 12px 16px; border-radius: 10px; font-size: 0.82rem; margin-bottom: 20px; display: none; }

  /* TOOLTIP */
  .tooltip { position: absolute; background: #1e2535; border: 1px solid var(--border); border-radius: 6px; padding: 5px 9px; font-size: 0.72rem; pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 50; white-space: nowrap; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Connecting to Alpaca...</div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📈</div>
        <div>
          <h1>DCA Portfolio</h1>
          <span>Paper Trading Dashboard</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="last-updated" id="lastUpdated">—</div>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Portfolio Value</div>
        <div class="stat-value neutral" id="portfolioValue">—</div>
        <div class="stat-sub" id="portfolioSub">Equity</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Cash Available</div>
        <div class="stat-value neutral" id="cashValue">—</div>
        <div class="stat-sub" id="cashSub">Buying Power</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Invested</div>
        <div class="stat-value neutral" id="investedValue">—</div>
        <div class="stat-sub">Long Market Value</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Unrealized P&amp;L</div>
        <div class="stat-value" id="plValue">—</div>
        <div class="stat-sub" id="plSub">Today / Total</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="error-banner" id="errorBanner"></div>

    <div class="section-title">Holdings</div>
    <div class="filters" id="filterBtns">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('Crypto Treasury',this)">Crypto Treasury</button>
      <button class="filter-btn" onclick="setFilter('Energy',this)">Energy</button>
      <button class="filter-btn" onclick="setFilter('Quantum',this)">Quantum</button>
      <button class="filter-btn" onclick="setFilter('Semiconductors',this)">Semiconductors</button>
      <button class="filter-btn" onclick="setFilter('Photonics',this)">Photonics</button>
      <button class="filter-btn" onclick="setFilter('EV',this)">EV</button>
      <button class="filter-btn" onclick="setFilter('Consumer Tech',this)">Consumer Tech</button>
      <button class="filter-btn" onclick="setFilter('Streaming',this)">Streaming</button>
      <button class="filter-btn" onclick="setFilter('Industrial',this)">Industrial</button>
    </div>

    <div class="cards-grid" id="cardsGrid"></div>
  </div>
</div>

<script>
const API_KEY    = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const API_SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const BASE       = 'https://paper-api.alpaca.markets/v2';
const DATA       = 'https://data.alpaca.markets';

const STOCKS = [
  { sym:'STRC', name:'Strategy Inc',        sector:'Crypto Treasury', color:'crypto',    icon:'₿' },
  { sym:'MSTR', name:'MicroStrategy',        sector:'Crypto Treasury', color:'crypto',    icon:'₿' },
  { sym:'GEV',  name:'GE Vernova',           sector:'Energy',          color:'energy',    icon:'⚡' },
  { sym:'BE',   name:'Bloom Energy',         sector:'Energy',          color:'energy',    icon:'⚡' },
  { sym:'KGS',  name:'Kodiak Gas',           sector:'Energy',          color:'energy',    icon:'⚡' },
  { sym:'QBTS', name:'D-Wave Quantum',       sector:'Quantum',         color:'quantum',   icon:'⚛' },
  { sym:'IONQ', name:'IonQ',                 sector:'Quantum',         color:'quantum',   icon:'⚛' },
  { sym:'QUBT', name:'Quantum Computing',    sector:'Quantum',         color:'quantum',   icon:'⚛' },
  { sym:'SNDK', name:'SanDisk',              sector:'Semiconductors',  color:'semi',      icon:'💾' },
  { sym:'MU',   name:'Micron Technology',    sector:'Semiconductors',  color:'semi',      icon:'💾' },
  { sym:'WDC',  name:'Western Digital',      sector:'Semiconductors',  color:'semi',      icon:'💾' },
  { sym:'MRVL', name:'Marvell Technology',   sector:'Semiconductors',  color:'semi',      icon:'💾' },
  { sym:'ALMU', name:'Aeluma Inc',           sector:'Semiconductors',  color:'semi',      icon:'💾' },
  { sym:'IPGP', name:'IPG Photonics',        sector:'Photonics',       color:'photonics', icon:'🔬' },
  { sym:'POET', name:'POET Technologies',    sector:'Photonics',       color:'photonics', icon:'🔬' },
  { sym:'TSLA', name:'Tesla',                sector:'EV',              color:'ev',        icon:'🚗' },
  { sym:'AAPL', name:'Apple',                sector:'Consumer Tech',   color:'consumer',  icon:'🍎' },
  { sym:'NFLX', name:'Netflix',              sector:'Streaming',       color:'streaming', icon:'🎬' },
  { sym:'CAT',  name:'Caterpillar',          sector:'Industrial',      color:'industrial',icon:'🏗' },
];

const SECTOR_COLORS = {
  'Crypto Treasury':'#f7931a','Energy':'#22c55e','Quantum':'#a855f7',
  'Semiconductors':'#3b82f6','Photonics':'#06b6d4','EV':'#ef4444',
  'Consumer Tech':'#64748b','Streaming':'#ec4899','Industrial':'#f59e0b'
};

let allCards = [];
let currentFilter = 'all';

const hdrs = { 'APCA-API-KEY-ID': API_KEY, 'APCA-API-SECRET-KEY': API_SECRET };

function fmt(n, digits=2) {
  if(n==null||isNaN(n)) return '—';
  return new Intl.NumberFormat('en-US',{minimumFractionDigits:digits,maximumFractionDigits:digits}).format(n);
}
function fmtUSD(n, compact=false) {
  if(n==null||isNaN(n)) return '—';
  if(compact && Math.abs(n)>=1000) return '$'+fmt(n/1000,1)+'K';
  return '$'+fmt(n,2);
}
function sign(n) { return n>0?'+':'' }

async function apiFetch(url) {
  const r = await fetch(url, { headers: hdrs });
  if(!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText} → ${url}`);
  return r.json();
}

function makeSpark(prices, color, w=220, h=52) {
  if(!prices||prices.length<2) return `<svg class="sparkline" viewBox="0 0 ${w} ${h}"><line x1="0" y1="${h/2}" x2="${w}" y2="${h/2}" stroke="#1e2535" stroke-width="1.5"/></svg>`;
  const mn = Math.min(...prices), mx = Math.max(...prices);
  const range = mx - mn || 1;
  const pad = 4;
  const pts = prices.map((v,i)=>{
    const x = pad + (i/(prices.length-1))*(w-2*pad);
    const y = pad + (1-(v-mn)/range)*(h-2*pad);
    return `${x},${y}`;
  });
  const pathD = 'M'+pts.join(' L');
  const areaD = `M${pad},${h} L` + pts.join(' L') + ` L${w-pad},${h} Z`;
  const isUp = prices[prices.length-1] >= prices[0];
  const c = isUp ? '#22c55e' : '#ef4444';
  const cFill = isUp ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)';
  return `<svg class="sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="g${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${c}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${areaD}" fill="url(#g${color.replace('#','')})" />
    <path d="${pathD}" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${pts[pts.length-1].split(',')[0]}" cy="${pts[pts.length-1].split(',')[1]}" r="2.5" fill="${c}"/>
  </svg>`;
}

function getStatus(plpc) {
  if(plpc==null) return ['WATCHING','watching'];
  if(plpc>=10) return ['TRAILING STOP','trailing'];
  if(plpc<=-8) return ['NEAR STOP','near-stop'];
  if(plpc>0)   return ['IN PROFIT','in-profit'];
  return ['WATCHING','watching'];
}

function renderCard(stock, pos, bars) {
  const prices = bars||[];
  const currentPrice = prices.length ? prices[prices.length-1] : null;
  const startPrice   = prices.length ? prices[0] : null;
  const ytdPct = (currentPrice&&startPrice) ? ((currentPrice-startPrice)/startPrice*100) : null;

  const qty      = pos ? parseFloat(pos.qty)            : null;
  const avgCost  = pos ? parseFloat(pos.avg_entry_price): null;
  const plpc     = pos ? parseFloat(pos.unrealized_plpc): null;
  const stopPx   = avgCost ? avgCost * 0.9               : null;
  const mktVal   = pos ? parseFloat(pos.market_value)   : null;

  const [statusLabel, statusClass] = getStatus(plpc);
  const col = SECTOR_COLORS[stock.sector]||'#64748b';

  const ytdClass = ytdPct==null?'flat':ytdPct>0?'up':'down';
  const ytdText  = ytdPct==null?'—':`${sign(ytdPct)}${fmt(ytdPct,1)}%`;

  const spark = makeSpark(prices, col);

  let posHTML = '';
  if(pos) {
    const plColor = plpc>=0?'var(--green)':'var(--red)';
    posHTML = `
      <div class="position-grid">
        <div class="pos-item"><div class="pos-label">Shares</div><div class="pos-value">${fmt(qty,0)}</div></div>
        <div class="pos-item"><div class="pos-label">Avg Cost</div><div class="pos-value">${fmtUSD(avgCost)}</div></div>
        <div class="pos-item"><div class="pos-label">P&L%</div><div class="pos-value" style="color:${plColor}">${sign(plpc)}${fmt(plpc,1)}%</div></div>
        <div class="pos-item"><div class="pos-label">Stop</div><div class="pos-value" style="color:var(--yellow)">${fmtUSD(stopPx)}</div></div>
      </div>
      <div><span class="status-badge status-${statusClass}">${statusLabel}</span></div>`;
  } else {
    posHTML = `<div class="no-position">No position</div>`;
  }

  return `
    <div class="stock-card color-${stock.color}" data-sector="${stock.sector}">
      <div class="card-header">
        <div>
          <div class="card-symbol">${stock.sym}</div>
          <div class="card-name">${stock.name}</div>
        </div>
        <span class="sector-badge" style="background:${col}22;color:${col};border:1px solid ${col}44">${stock.icon} ${stock.sector}</span>
      </div>
      <div class="price-row">
        <div class="current-price">${currentPrice?fmtUSD(currentPrice):'—'}</div>
        <span class="ytd-badge ${ytdClass}">YTD ${ytdText}</span>
      </div>
      <div class="sparkline-wrap">${spark}</div>
      ${posHTML}
    </div>`;
}

function setFilter(sector, btn) {
  currentFilter = sector;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = allCards
    .filter(c => currentFilter==='all' || c.sector===currentFilter)
    .map(c=>c.html).join('');
}

function setLoading(text) {
  document.getElementById('loadingText').textContent = text;
}

async function loadData() {
  const overlay = document.getElementById('loadingOverlay');
  const app = document.getElementById('app');
  overlay.style.display = 'flex';
  app.style.display = 'none';

  try {
    setLoading('Fetching account data...');
    const [acct, positions] = await Promise.all([
      apiFetch(`${BASE}/account`),
      apiFetch(`${BASE}/positions`)
    ]);

    setLoading('Fetching YTD price history...');
    const syms = STOCKS.map(s=>s.sym).join(',');
    const start = new Date(new Date().getFullYear(),0,2).toISOString().slice(0,10)+'T00:00:00Z';
    const barsResp = await apiFetch(
      `${DATA}/v2/stocks/bars?symbols=${syms}&timeframe=1Day&start=${start}&limit=10000&feed=iex&adjustment=raw`
    );
    const barsMap = barsResp.bars || {};

    // Portfolio stats
    const equity   = parseFloat(acct.equity)||0;
    const cash     = parseFloat(acct.cash)||0;
    const mktVal   = parseFloat(acct.long_market_value)||0;
    const dayPL    = parseFloat(acct.equity) - parseFloat(acct.last_equity)||0;
    const totalUPL = positions.reduce((s,p)=>s+parseFloat(p.unrealized_pl||0),0);

    document.getElementById('portfolioValue').textContent = fmtUSD(equity);
    document.getElementById('cashValue').textContent      = fmtUSD(cash);
    document.getElementById('investedValue').textContent  = fmtUSD(mktVal);

    const plEl  = document.getElementById('plValue');
    const plSub = document.getElementById('plSub');
    plEl.textContent  = `${sign(totalUPL)}${fmtUSD(totalUPL)}`;
    plEl.className    = 'stat-value ' + (totalUPL>=0?'positive':'negative');
    plSub.textContent = `Day: ${sign(dayPL)}${fmtUSD(dayPL,true)}`;

    // Build position map
    const posMap = {};
    positions.forEach(p=>{ posMap[p.symbol]=p; });

    // Build cards
    allCards = STOCKS.map(stock => {
      const rawBars = barsMap[stock.sym]||[];
      const prices  = rawBars.map(b=>b.c);
      const pos     = posMap[stock.sym]||null;
      return { sector: stock.sector, html: renderCard(stock, pos, prices) };
    });

    applyFilter();

    document.getElementById('lastUpdated').innerHTML =
      `Updated: ${new Date().toLocaleTimeString()} &nbsp;|&nbsp; ${new Date().toLocaleDateString()}`;

    overlay.style.display = 'none';
    app.style.display = 'block';

  } catch(err) {
    setLoading('Failed to load data — see error below');
    const eb = document.getElementById('errorBanner');
    eb.style.display = 'block';
    eb.textContent = `Error: ${err.message}`;
    overlay.style.display = 'none';
    app.style.display = 'block';
    console.error(err);
  }
}

loadData();
</script>
</body>
</html>
