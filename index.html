<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>DCA Portfolio Dashboard</title>
<style>
  :root {
    --bg: #0a0d14;
    --card: #111520;
    --card2: #161b2e;
    --border: #1e2540;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #22c55e;
    --red: #ef4444;
    --accent: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0f1629 0%, #111520 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 16px;
  }
  .logo { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .last-updated { font-size: 11px; color: var(--muted); }

  .stats-row {
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .stat-box {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px; flex: 1; min-width: 130px;
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 700; color: #fff; }
  .stat-value.up { color: var(--green); }
  .stat-value.down { color: var(--red); }

  main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

  .section-title {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin: 20px 0 12px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content:''; flex:1; height:1px; background: var(--border); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; position: relative;
    transition: border-color .2s, transform .15s;
    overflow: hidden;
  }
  .card:hover { border-color: #2d3a5a; transform: translateY(-1px); }
  .card-accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .symbol { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .company { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .sector-badge {
    font-size: 9px; font-weight: 600; padding: 3px 7px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.5px;
    background: rgba(255,255,255,0.06); color: var(--muted);
  }

  .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .price { font-size: 24px; font-weight: 700; color: #fff; }
  .ytd-badge {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  }
  .ytd-badge.up { background: rgba(34,197,94,.15); color: var(--green); }
  .ytd-badge.down { background: rgba(239,68,68,.15); color: var(--red); }

  .sparkline-wrap { margin: 8px 0; height: 48px; }
  svg.sparkline { width: 100%; height: 48px; }

  .pos-table { width: 100%; border-collapse: collapse; margin: 10px 0 8px; font-size: 11px; }
  .pos-table td { padding: 3px 0; color: var(--muted); }
  .pos-table td:last-child { text-align: right; color: var(--text); font-weight: 600; }

  .status-badge {
    display: inline-block; font-size: 9px; font-weight: 700;
    padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.8px;
  }
  .status-trailing { background: rgba(168,85,247,.18); color: #a855f7; }
  .status-stop { background: rgba(239,68,68,.18); color: var(--red); }
  .status-profit { background: rgba(34,197,94,.15); color: var(--green); }
  .status-watching { background: rgba(100,116,139,.15); color: var(--muted); }
  .status-no-pos { background: rgba(59,130,246,.1); color: var(--accent); }

  .no-pos { color: var(--muted); font-size: 11px; font-style: italic; margin: 6px 0; }

  #loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 60vh; gap: 16px;
  }
  .spinner {
    width: 48px; height: 48px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 14px; }

  #error-box {
    display: none; margin: 40px auto; max-width: 500px;
    background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
    border-radius: 12px; padding: 24px; text-align: center;
  }
  #error-box h3 { color: var(--red); margin-bottom: 8px; }
  #error-box p { color: var(--muted); font-size: 13px; line-height: 1.6; }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    main { padding: 14px 16px; }
    .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-value { font-size: 16px; }
    .price { font-size: 18px; }
    .symbol { font-size: 18px; }
  }
  @media (max-width: 380px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">DCA <span>Portfolio</span></div>
    <div class="last-updated" id="last-updated">Fetching live data…</div>
  </div>
  <div class="stats-row" id="stats-row">
    <div class="stat-box"><div class="stat-label">Portfolio Value</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat-box"><div class="stat-label">Cash</div><div class="stat-value" id="s-cash">—</div></div>
    <div class="stat-box"><div class="stat-label">Invested</div><div class="stat-value" id="s-invested">—</div></div>
    <div class="stat-box"><div class="stat-label">Unrealized P&amp;L</div><div class="stat-value" id="s-pnl">—</div></div>
    <div class="stat-box"><div class="stat-label">Day P&amp;L</div><div class="stat-value" id="s-daypnl">—</div></div>
  </div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Fetching live market data…</div>
  </div>
  <div id="error-box">
    <h3>Unable to load data</h3>
    <p id="error-msg">Could not connect to Alpaca. Check your API credentials or network connection and refresh the page.</p>
  </div>
  <div id="dashboard" style="display:none"></div>
</main>

<script>
const KEY = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const BASE = 'https://paper-api.alpaca.markets/v2';
const DATA = 'https://data.alpaca.markets';
const HEADERS = { 'APCA-API-KEY-ID': KEY, 'APCA-API-SECRET-KEY': SECRET };

const STOCKS = [
  { sym:'STRC', name:'Strategy Inc',        sector:'Crypto Treasury', color:'#f7931a' },
  { sym:'MSTR', name:'MicroStrategy',       sector:'Crypto Treasury', color:'#f7931a' },
  { sym:'GEV',  name:'GE Vernova',          sector:'Energy',          color:'#22c55e' },
  { sym:'BE',   name:'Bloom Energy',        sector:'Energy',          color:'#22c55e' },
  { sym:'KGS',  name:'Kodiak Gas',          sector:'Energy',          color:'#22c55e' },
  { sym:'QBTS', name:'D-Wave Quantum',      sector:'Quantum',         color:'#a855f7' },
  { sym:'IONQ', name:'IonQ',                sector:'Quantum',         color:'#a855f7' },
  { sym:'QUBT', name:'Quantum Computing',   sector:'Quantum',         color:'#a855f7' },
  { sym:'SNDK', name:'SanDisk',             sector:'Semiconductors',  color:'#3b82f6' },
  { sym:'MU',   name:'Micron Technology',   sector:'Semiconductors',  color:'#3b82f6' },
  { sym:'WDC',  name:'Western Digital',     sector:'Semiconductors',  color:'#3b82f6' },
  { sym:'MRVL', name:'Marvell Technology',  sector:'Semiconductors',  color:'#3b82f6' },
  { sym:'ALMU', name:'Aeluma Inc',          sector:'Semiconductors',  color:'#3b82f6' },
  { sym:'IPGP', name:'IPG Photonics',       sector:'Photonics',       color:'#06b6d4' },
  { sym:'POET', name:'POET Technologies',   sector:'Photonics',       color:'#06b6d4' },
  { sym:'TSLA', name:'Tesla',               sector:'EV',              color:'#ef4444' },
  { sym:'AAPL', name:'Apple',               sector:'Consumer Tech',   color:'#64748b' },
  { sym:'NFLX', name:'Netflix',             sector:'Streaming',       color:'#ec4899' },
  { sym:'CAT',  name:'Caterpillar',         sector:'Industrial',      color:'#f59e0b' },
];

const fmt = (n, d=2) => n == null ? '—' : Number(n).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtD = n => n == null ? '—' : '$' + fmt(n, 2);
const fmtP = n => n == null ? '—' : (n >= 0 ? '+' : '') + fmt(n, 2) + '%';

function makeSvgSparkline(closes, color) {
  if (!closes || closes.length < 2) return '<svg class="sparkline" viewBox="0 0 200 48"></svg>';
  const w = 200, h = 48, pad = 2;
  const min = Math.min(...closes), max = Math.max(...closes);
  const range = max - min || 1;
  const pts = closes.map((v, i) => {
    const x = pad + (i / (closes.length - 1)) * (w - pad * 2);
    const y = pad + (1 - (v - min) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const polyline = pts.join(' ');
  const fill_pts = `${pts[0].split(',')[0]},${h} ${polyline} ${pts[pts.length-1].split(',')[0]},${h}`;
  const alpha = color + '22';
  return `<svg class="sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="g_${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${fill_pts}" fill="url(#g_${color.replace('#','')})" />
    <polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function statusBadge(plpc) {
  if (plpc == null) return '<span class="status-badge status-no-pos">NO POSITION</span>';
  const p = parseFloat(plpc);
  if (p >= 10) return '<span class="status-badge status-trailing">&#9650; TRAILING</span>';
  if (p <= -8) return '<span class="status-badge status-stop">&#9888; NEAR STOP</span>';
  if (p > 0)  return '<span class="status-badge status-profit">&#10003; IN PROFIT</span>';
  return '<span class="status-badge status-watching">&#9679; WATCHING</span>';
}

function buildCard(info, pos, closes) {
  const { sym, name, sector, color } = info;
  const currentPrice = pos ? parseFloat(pos.current_price) : (closes && closes.length ? closes[closes.length-1] : null);
  const ytdStart = closes && closes.length ? closes[0] : null;
  const ytdPct = ytdStart && currentPrice ? ((currentPrice - ytdStart) / ytdStart * 100) : null;
  const ytdClass = ytdPct == null ? '' : (ytdPct >= 0 ? 'up' : 'down');
  const ytdLabel = ytdPct == null ? '' : (ytdPct >= 0 ? '+' : '') + ytdPct.toFixed(2) + '% YTD';

  const plpc = pos ? parseFloat(pos.unrealized_plpc) * 100 : null;
  const sparkColor = (ytdPct == null || ytdPct >= 0) ? '#22c55e' : '#ef4444';
  const spark = makeSvgSparkline(closes || [], sparkColor);

  const stopPrice = pos ? (parseFloat(pos.avg_entry_price) * 0.9) : null;

  let posHtml = '';
  if (pos) {
    posHtml = `
      <table class="pos-table">
        <tr><td>Shares</td><td>${fmt(pos.qty, pos.qty % 1 === 0 ? 0 : 4)}</td></tr>
        <tr><td>Avg Cost</td><td>${fmtD(pos.avg_entry_price)}</td></tr>
        <tr><td>P&amp;L</td><td style="color:${plpc >= 0 ? 'var(--green)' : 'var(--red)'}">${fmtP(plpc)}</td></tr>
        <tr><td>Stop (-10%)</td><td>${fmtD(stopPrice)}</td></tr>
      </table>
      ${statusBadge(plpc)}`;
  } else {
    posHtml = `<p class="no-pos">No open position</p>${statusBadge(null)}`;
  }

  return `<div class="card">
    <div class="card-accent-bar" style="background:${color}"></div>
    <div class="card-header">
      <div>
        <div class="symbol">${sym}</div>
        <div class="company">${name}</div>
      </div>
      <div class="sector-badge" style="color:${color};background:${color}18">${sector}</div>
    </div>
    <div class="price-row">
      <div class="price">${currentPrice ? '$' + fmt(currentPrice) : '—'}</div>
      ${ytdPct != null ? `<div class="ytd-badge ${ytdClass}">${ytdLabel}</div>` : ''}
    </div>
    <div class="sparkline-wrap">${spark}</div>
    ${posHtml}
  </div>`;
}

const SECTOR_ORDER = ['Crypto Treasury','Quantum','Semiconductors','Photonics','Energy','EV','Consumer Tech','Streaming','Industrial'];

async function main() {
  try {
    const syms = STOCKS.map(s => s.sym).join(',');
    const startYTD = '2026-01-02T00:00:00Z';

    const [acctRes, posRes, barsRes] = await Promise.all([
      fetch(`${BASE}/account`, {headers: HEADERS}),
      fetch(`${BASE}/positions`, {headers: HEADERS}),
      fetch(`${DATA}/v2/stocks/bars?symbols=${syms}&timeframe=1Day&start=${startYTD}&limit=10000&feed=iex&adjustment=raw`, {headers: HEADERS}),
    ]);

    if (!acctRes.ok) throw new Error(`Account API error ${acctRes.status}: ${await acctRes.text()}`);

    const [acct, positions, barsData] = await Promise.all([acctRes.json(), posRes.json(), barsRes.json()]);

    // Account stats
    const equity = parseFloat(acct.equity);
    const cash = parseFloat(acct.cash);
    const invested = equity - cash;
    const unrPnl = positions.reduce((s, p) => s + parseFloat(p.unrealized_pl || 0), 0);
    const dayPnl = parseFloat(acct.equity) - parseFloat(acct.last_equity);

    document.getElementById('s-total').textContent = '$' + fmt(equity);
    document.getElementById('s-cash').textContent = '$' + fmt(cash);
    document.getElementById('s-invested').textContent = '$' + fmt(invested);
    const pnlEl = document.getElementById('s-pnl');
    pnlEl.textContent = (unrPnl >= 0 ? '+$' : '-$') + fmt(Math.abs(unrPnl));
    pnlEl.className = 'stat-value ' + (unrPnl >= 0 ? 'up' : 'down');
    const dayEl = document.getElementById('s-daypnl');
    dayEl.textContent = (dayPnl >= 0 ? '+$' : '-$') + fmt(Math.abs(dayPnl));
    dayEl.className = 'stat-value ' + (dayPnl >= 0 ? 'up' : 'down');

    // Index positions & bars
    const posMap = {};
    for (const p of positions) posMap[p.symbol] = p;
    const barsMap = barsData.bars || {};

    // Build grouped cards
    const grouped = {};
    for (const s of STOCKS) {
      const closes = (barsMap[s.sym] || []).map(b => b.c);
      if (!grouped[s.sector]) grouped[s.sector] = [];
      grouped[s.sector].push(buildCard(s, posMap[s.sym] || null, closes));
    }

    let html = '';
    for (const sector of SECTOR_ORDER) {
      if (!grouped[sector]) continue;
      html += `<div class="section-title">${sector}</div><div class="grid">${grouped[sector].join('')}</div>`;
    }

    document.getElementById('dashboard').innerHTML = html;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZoneName:'short'});

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').textContent = e.message || String(e);
    document.getElementById('error-box').style.display = 'block';
    console.error(e);
  }
}

main();
</script>
</body>
</html>
