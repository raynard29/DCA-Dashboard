<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>DCA Portfolio Dashboard</title>
<style>
  :root {
    --bg: #0a0d14;
    --card: #111520;
    --card2: #161b2e;
    --border: #1e2740;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --purple: #a855f7;
    --blue: #3b82f6;
    --cyan: #06b6d4;
    --pink: #ec4899;
    --orange: #f7931a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #0d1117 0%, #111520 100%); border-bottom: 1px solid var(--border); padding: 20px 24px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #3b82f6, #a855f7); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .logo span { color: var(--muted); font-size: 13px; font-weight: 400; }
  .header-meta { display: flex; align-items: center; gap: 12px; }
  .last-updated { color: var(--muted); font-size: 12px; }
  .refresh-btn { background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all .2s; }
  .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; display: inline-block; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* SUMMARY CARDS */
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px 24px; }
  @media(max-width:900px){ .summary { grid-template-columns: repeat(2,1fr); } }
  @media(max-width:480px){ .summary { grid-template-columns: 1fr; padding: 12px; } }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; transition: border-color .2s; }
  .stat-card:hover { border-color: #2a3550; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
  .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* SECTOR TABS */
  .sectors { padding: 0 24px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .sector-tab { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; transition: all .2s; background: transparent; color: var(--muted); }
  .sector-tab:hover, .sector-tab.active { color: var(--text); border-color: currentColor; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 0 24px 32px; }
  @media(max-width:1200px){ .grid { grid-template-columns: repeat(3,1fr); } }
  @media(max-width:860px){ .grid { grid-template-columns: repeat(2,1fr); } }
  @media(max-width:480px){ .grid { grid-template-columns: 1fr; padding: 0 12px 24px; } }

  /* STOCK CARD */
  .stock-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; transition: all .25s; position: relative; overflow: hidden; }
  .stock-card:hover { border-color: #2a3550; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
  .stock-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; opacity: 0; transition: opacity .2s; }
  .stock-card:hover::before { opacity: 1; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-symbol { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .card-name { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .sector-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; border: 1px solid; }
  .card-price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .card-price { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .ytd-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 8px; }
  .ytd-pos { background: rgba(34,197,94,.15); color: var(--green); }
  .ytd-neg { background: rgba(239,68,68,.15); color: var(--red); }
  .ytd-neu { background: rgba(100,116,139,.15); color: var(--muted); }

  /* SPARKLINE */
  .sparkline-wrap { margin: 8px 0; height: 48px; }
  .sparkline-wrap svg { width: 100%; height: 48px; display: block; }

  /* POSITION INFO */
  .pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
  .pos-item { background: var(--card2); border-radius: 8px; padding: 7px 9px; }
  .pos-item-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: .4px; }
  .pos-item-val { font-size: 13px; font-weight: 600; }

  /* STATUS BADGE */
  .status-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .status-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: .5px; }
  .status-trailing { background: rgba(168,85,247,.2); color: #c084fc; border: 1px solid rgba(168,85,247,.3); }
  .status-profit  { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
  .status-stop    { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.25); }
  .status-watch   { background: rgba(100,116,139,.12); color: var(--muted); border: 1px solid rgba(100,116,139,.2); }
  .stop-price     { font-size: 11px; color: var(--muted); }

  /* NO POSITION OVERLAY */
  .no-pos { font-size: 11px; color: var(--muted); text-align: center; padding: 14px 0 4px; font-style: italic; }

  /* LOADING */
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; }
  .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 14px; }

  /* ERROR */
  #error-banner { display: none; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #f87171; padding: 12px 24px; margin: 16px 24px; border-radius: 10px; font-size: 13px; }

  /* FOOTER */
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 20px; border-top: 1px solid var(--border); margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">📈</div>
      <div>
        <h1>DCA Portfolio <span style="color:var(--muted)">· Paper</span></h1>
        <span>19 positions · Live data</span>
      </div>
    </div>
    <div class="header-meta">
      <span class="status-dot"></span>
      <span class="last-updated" id="updated">Loading…</span>
      <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    </div>
  </div>
</div>

<div id="error-banner"></div>
<div id="loading"><div class="spinner"></div><div class="loading-text" id="loading-text">Connecting to Alpaca…</div></div>

<div id="content" style="display:none">
  <div class="summary" id="summary"></div>
  <div class="sectors" id="sectors"></div>
  <div class="grid" id="grid"></div>
</div>

<footer>DCA Portfolio Dashboard · Auto-refreshes every hour · Paper trading account</footer>

<script>
const KEY    = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const BASE   = 'https://paper-api.alpaca.markets/v2';
const DATA   = 'https://data.alpaca.markets';

const STOCKS = [
  { sym:'STRC', name:'Strategy Inc',      sector:'Crypto Treasury', color:'#f7931a' },
  { sym:'MSTR', name:'MicroStrategy',     sector:'Crypto Treasury', color:'#f7931a' },
  { sym:'GEV',  name:'GE Vernova',        sector:'Energy',          color:'#22c55e' },
  { sym:'BE',   name:'Bloom Energy',      sector:'Energy',          color:'#22c55e' },
  { sym:'KGS',  name:'Kodiak Gas',        sector:'Energy',          color:'#22c55e' },
  { sym:'QBTS', name:'D-Wave Quantum',    sector:'Quantum',         color:'#a855f7' },
  { sym:'IONQ', name:'IonQ',              sector:'Quantum',         color:'#a855f7' },
  { sym:'QUBT', name:'Quantum Computing', sector:'Quantum',         color:'#a855f7' },
  { sym:'SNDK', name:'SanDisk',           sector:'Semiconductors',  color:'#3b82f6' },
  { sym:'MU',   name:'Micron Technology', sector:'Semiconductors',  color:'#3b82f6' },
  { sym:'WDC',  name:'Western Digital',   sector:'Semiconductors',  color:'#3b82f6' },
  { sym:'MRVL', name:'Marvell Technology',sector:'Semiconductors',  color:'#3b82f6' },
  { sym:'ALMU', name:'Aeluma Inc',        sector:'Semiconductors',  color:'#3b82f6' },
  { sym:'IPGP', name:'IPG Photonics',     sector:'Photonics',       color:'#06b6d4' },
  { sym:'POET', name:'POET Technologies', sector:'Photonics',       color:'#06b6d4' },
  { sym:'TSLA', name:'Tesla',             sector:'EV',              color:'#ef4444' },
  { sym:'AAPL', name:'Apple',             sector:'Consumer Tech',   color:'#64748b' },
  { sym:'NFLX', name:'Netflix',           sector:'Streaming',       color:'#ec4899' },
  { sym:'CAT',  name:'Caterpillar',       sector:'Industrial',      color:'#f59e0b' },
];

const SECTOR_ICONS = {
  'Crypto Treasury':'₿', 'Energy':'⚡', 'Quantum':'⚛', 'Semiconductors':'💾',
  'Photonics':'🔬', 'EV':'⚡', 'Consumer Tech':'🍎', 'Streaming':'▶', 'Industrial':'⚙'
};

const H = { 'APCA-API-KEY-ID': KEY, 'APCA-API-SECRET-KEY': SECRET };

async function apiFetch(url) {
  const r = await fetch(url, { headers: H });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${url}`);
  return r.json();
}

function fmt(n, dec=2) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toFixed(dec);
}
function fmtUSD(n) {
  if (n == null || isNaN(n)) return '—';
  const v = Math.abs(Number(n));
  const sign = Number(n) < 0 ? '-' : '';
  if (v >= 1e6) return sign + '$' + (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return sign + '$' + (v/1e3).toFixed(1) + 'K';
  return sign + '$' + v.toFixed(2);
}
function pct(n) { return (Number(n)*100).toFixed(2)+'%'; }

function sparkline(prices, color) {
  if (!prices || prices.length < 2) return `<svg viewBox="0 0 120 48"></svg>`;
  const mn = Math.min(...prices), mx = Math.max(...prices);
  const range = mx - mn || 1;
  const W = 120, H = 40, pad = 4;
  const pts = prices.map((p,i) => {
    const x = (i / (prices.length-1)) * W;
    const y = pad + (1 - (p-mn)/range) * (H - 2*pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const polyline = pts.join(' ');
  const last = pts[pts.length-1].split(',');
  const areaPath = `M ${pts[0].split(',')[0]},${H} L ${pts.join(' L ')} L ${last[0]},${H} Z`;
  const isPos = prices[prices.length-1] >= prices[0];
  const lineCol = isPos ? '#22c55e' : '#ef4444';
  const fillId = `g${Math.random().toString(36).slice(2)}`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="${fillId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${lineCol}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${lineCol}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <path d="${areaPath}" fill="url(#${fillId})"/>
    <polyline points="${polyline}" fill="none" stroke="${lineCol}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

let allBars = {}, allPositions = [], accountData = {};
let activeFilter = 'All';

async function loadAll() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('content').style.display = 'none';
  document.getElementById('error-banner').style.display = 'none';
  setLoadingText('Connecting to Alpaca…');

  try {
    setLoadingText('Fetching account…');
    accountData = await apiFetch(`${BASE}/account`);

    setLoadingText('Fetching positions…');
    allPositions = await apiFetch(`${BASE}/positions`);

    setLoadingText('Fetching YTD bars…');
    const syms = STOCKS.map(s=>s.sym).join(',');
    const start = new Date(new Date().getFullYear() + '-01-02').toISOString().slice(0,10);
    const barsResp = await apiFetch(`${DATA}/v2/stocks/bars?symbols=${syms}&timeframe=1Day&start=${start}T00:00:00Z&limit=10000&feed=iex&adjustment=raw`);
    allBars = barsResp.bars || {};

    render();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const banner = document.getElementById('error-banner');
    banner.style.display = 'block';
    banner.textContent = '⚠ Failed to load data: ' + e.message + '. Check network / credentials.';
    // Still try to render if we have partial data
    if (allPositions.length > 0 || Object.keys(allBars).length > 0) render();
  }
}

function setLoadingText(t) { document.getElementById('loading-text').textContent = t; }

function render() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  renderSummary();
  renderSectors();
  renderGrid(activeFilter);
}

function renderSummary() {
  const eq   = parseFloat(accountData.equity || 0);
  const cash  = parseFloat(accountData.cash || 0);
  const inv   = parseFloat(accountData.long_market_value || 0);
  const unreal = parseFloat(accountData.unrealized_pl || 0);
  const unrPct = eq > 0 ? (unreal / (eq - unreal + 0.0001) * 100) : 0;

  const green = '#22c55e', red = '#ef4444';
  document.getElementById('summary').innerHTML = `
    <div class="stat-card"><div class="stat-label">Portfolio Value</div><div class="stat-value">${fmtUSD(eq)}</div><div class="stat-sub">Equity</div></div>
    <div class="stat-card"><div class="stat-label">Cash Available</div><div class="stat-value" style="color:#60a5fa">${fmtUSD(cash)}</div><div class="stat-sub">Buying power: ${fmtUSD(parseFloat(accountData.buying_power||0))}</div></div>
    <div class="stat-card"><div class="stat-label">Invested</div><div class="stat-value" style="color:#a78bfa">${fmtUSD(inv)}</div><div class="stat-sub">${allPositions.length} open positions</div></div>
    <div class="stat-card"><div class="stat-label">Unrealized P&amp;L</div>
      <div class="stat-value" style="color:${unreal>=0?green:red}">${unreal>=0?'+':''}${fmtUSD(unreal)}</div>
      <div class="stat-sub" style="color:${unreal>=0?green:red}">${unreal>=0?'+':''}${unrPct.toFixed(2)}% on cost basis</div>
    </div>`;
}

function renderSectors() {
  const sectors = ['All', ...new Set(STOCKS.map(s=>s.sector))];
  document.getElementById('sectors').innerHTML = sectors.map(s =>
    `<button class="sector-tab${s===activeFilter?' active':''}" style="${s===activeFilter?'border-color:'+getSectorColor(s)+';color:'+getSectorColor(s):''}" onclick="filterSector('${s}')">${SECTOR_ICONS[s]||''} ${s}</button>`
  ).join('');
}

function getSectorColor(sector) {
  const s = STOCKS.find(x=>x.sector===sector);
  return s ? s.color : '#64748b';
}

function filterSector(s) {
  activeFilter = s;
  renderSectors();
  renderGrid(s);
}

function renderGrid(filter) {
  const filtered = filter==='All' ? STOCKS : STOCKS.filter(s=>s.sector===filter);
  document.getElementById('grid').innerHTML = filtered.map(s => renderCard(s)).join('');
}

function renderCard(info) {
  const sym = info.sym;
  const pos = allPositions.find(p => p.symbol === sym);
  const bars = (allBars[sym] || []).map(b => b.c);
  const ytdFirst = bars[0] || null;
  const ytdLast  = bars[bars.length-1] || null;
  const ytdPct   = (ytdFirst && ytdLast) ? ((ytdLast - ytdFirst) / ytdFirst * 100) : null;
  const curPrice = pos ? parseFloat(pos.current_price) : ytdLast;
  const plpc     = pos ? parseFloat(pos.unrealized_plpc) * 100 : null;
  const avgCost  = pos ? parseFloat(pos.avg_entry_price) : null;
  const qty      = pos ? parseFloat(pos.qty) : null;
  const stopPrice = avgCost ? avgCost * 0.9 : null;

  // status
  let statusClass = 'status-watch', statusLabel = 'Watching';
  if (plpc !== null) {
    if (plpc >= 10)      { statusClass = 'status-trailing'; statusLabel = '🔺 Trailing'; }
    else if (plpc <= -8) { statusClass = 'status-stop';     statusLabel = '⚠ Near Stop'; }
    else if (plpc > 0)   { statusClass = 'status-profit';   statusLabel = '✓ In Profit'; }
    else                 { statusClass = 'status-watch';    statusLabel = '○ Watching'; }
  }

  const ytdBadge = ytdPct !== null
    ? `<span class="ytd-badge ${ytdPct>=0?'ytd-pos':ytdPct<0?'ytd-neg':'ytd-neu'}">${ytdPct>=0?'+':''}${ytdPct.toFixed(1)}% YTD</span>`
    : `<span class="ytd-badge ytd-neu">— YTD</span>`;

  const plColor = plpc !== null ? (plpc>=0 ? '#22c55e' : '#ef4444') : '#64748b';

  const posSection = pos ? `
    <div class="pos-grid">
      <div class="pos-item"><div class="pos-item-label">Shares</div><div class="pos-item-val">${fmt(qty,4)}</div></div>
      <div class="pos-item"><div class="pos-item-label">Avg Cost</div><div class="pos-item-val">$${fmt(avgCost)}</div></div>
      <div class="pos-item"><div class="pos-item-label">P&amp;L %</div><div class="pos-item-val" style="color:${plColor}">${plpc>=0?'+':''}${fmt(plpc)}%</div></div>
      <div class="pos-item"><div class="pos-item-label">Unreal. P&amp;L</div><div class="pos-item-val" style="color:${plColor}">${fmtUSD(parseFloat(pos.unrealized_pl))}</div></div>
    </div>
    <div class="status-row">
      <span class="status-badge ${statusClass}">${statusLabel}</span>
      <span class="stop-price">Stop $${fmt(stopPrice)}</span>
    </div>` : `<div class="no-pos">No open position</div>`;

  return `<div class="stock-card" style="--accent:${info.color}">
    <style>.stock-card[style*="${info.color}"]::before { background: linear-gradient(90deg, ${info.color}, transparent); }</style>
    <div class="card-top">
      <div>
        <div class="card-symbol" style="color:${info.color}">${sym}</div>
        <div class="card-name">${info.name}</div>
      </div>
      <span class="sector-badge" style="color:${info.color};border-color:${info.color}33;background:${info.color}11">${SECTOR_ICONS[info.sector]||''} ${info.sector}</span>
    </div>
    <div class="card-price-row">
      <div class="card-price">$${curPrice ? fmt(curPrice) : '—'}</div>
      ${ytdBadge}
    </div>
    <div class="sparkline-wrap">${sparkline(bars, info.color)}</div>
    ${posSection}
  </div>`;
}

// Kick off
loadAll();
</script>
</body>
</html>
