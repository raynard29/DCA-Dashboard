<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>DCA Portfolio Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0d14;
    --card: #111520;
    --card2: #161b2e;
    --border: #1e2640;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --blue: #3b82f6;
    --purple: #a855f7;
    --cyan: #06b6d4;
    --accent: #6366f1;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
  .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 14px; }
  #app { display: none; }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px 24px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
  .header-inner { max-width: 1600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .logo { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .header-meta { font-size: 12px; color: var(--muted); text-align: right; }
  .summary { max-width: 1600px; margin: 24px auto; padding: 0 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 900px) { .summary { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .summary { grid-template-columns: 1fr; } }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px; }
  .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .neutral { color: var(--text); }
  .grid { max-width: 1600px; margin: 0 auto 40px; padding: 0 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } padding: 0 12px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; transition: border-color 0.2s, transform 0.2s; position: relative; overflow: hidden; }
  .card:hover { border-color: #2e3a5e; transform: translateY(-2px); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .card-sym { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .card-name { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.3; }
  .sector-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
  .current-price { font-size: 22px; font-weight: 700; }
  .ytd-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
  .ytd-pos { background: rgba(34,197,94,0.15); color: var(--green); }
  .ytd-neg { background: rgba(239,68,68,0.15); color: var(--red); }
  .sparkline-wrap { height: 56px; margin: 8px 0; }
  .sparkline-wrap svg { width: 100%; height: 100%; }
  .pos-row { background: var(--card2); border-radius: 8px; padding: 10px 12px; font-size: 11px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px; margin-top: 8px; }
  .pos-item { display: flex; flex-direction: column; gap: 2px; }
  .pos-lbl { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .pos-val { font-weight: 600; font-size: 12px; }
  .status-badge { margin-top: 10px; display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.8px; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; }
  .badge-trailing { background: rgba(99,102,241,0.2); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
  .badge-stop { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
  .badge-profit { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
  .badge-watch { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.25); }
  .no-position { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 8px; }
  .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .section-title { max-width: 1600px; margin: 0 auto 12px; padding: 0 24px; font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .error-banner { max-width: 1600px; margin: 0 auto 20px; padding: 0 24px; }
  .error-inner { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 14px 18px; font-size: 13px; color: #f87171; }
  footer { text-align: center; padding: 24px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); max-width: 1600px; margin: 0 auto; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Fetching live portfolio data…</div>
</div>

<div id="app">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-dot"></div>
        DCA Portfolio
      </div>
      <div class="header-meta">
        <div id="last-updated">–</div>
        <div>Auto-refreshes every hour</div>
      </div>
    </div>
  </header>

  <div id="error-area"></div>

  <div class="summary">
    <div class="stat-card">
      <div class="stat-label">Portfolio Value</div>
      <div class="stat-value neutral" id="stat-total">–</div>
      <div class="stat-sub" id="stat-total-sub">equity</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Cash Available</div>
      <div class="stat-value neutral" id="stat-cash">–</div>
      <div class="stat-sub" id="stat-cash-sub">buying power</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Invested</div>
      <div class="stat-value neutral" id="stat-invested">–</div>
      <div class="stat-sub" id="stat-invested-sub">market value</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Unrealized P&amp;L</div>
      <div class="stat-value" id="stat-pnl">–</div>
      <div class="stat-sub" id="stat-pnl-sub">open positions</div>
    </div>
  </div>

  <div class="section-title">Holdings</div>
  <div class="grid" id="stock-grid"></div>

  <footer id="footer-ts">Dashboard · DCA Portfolio</footer>
</div>

<script>
const KEY    = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const BASE   = 'https://paper-api.alpaca.markets/v2';
const DATA   = 'https://data.alpaca.markets';

const STOCKS = {
  STRC:  { name: 'Strategy Inc',       sector: 'Crypto Treasury', color: '#f7931a' },
  MSTR:  { name: 'MicroStrategy',      sector: 'Crypto Treasury', color: '#f7931a' },
  GEV:   { name: 'GE Vernova',         sector: 'Energy',          color: '#22c55e' },
  BE:    { name: 'Bloom Energy',        sector: 'Energy',          color: '#22c55e' },
  KGS:   { name: 'Kodiak Gas',         sector: 'Energy',          color: '#22c55e' },
  QBTS:  { name: 'D-Wave Quantum',     sector: 'Quantum',         color: '#a855f7' },
  IONQ:  { name: 'IonQ',               sector: 'Quantum',         color: '#a855f7' },
  QUBT:  { name: 'Quantum Computing',  sector: 'Quantum',         color: '#a855f7' },
  SNDK:  { name: 'SanDisk',            sector: 'Semiconductors',  color: '#3b82f6' },
  MU:    { name: 'Micron Technology',  sector: 'Semiconductors',  color: '#3b82f6' },
  WDC:   { name: 'Western Digital',    sector: 'Semiconductors',  color: '#3b82f6' },
  MRVL:  { name: 'Marvell Technology', sector: 'Semiconductors',  color: '#3b82f6' },
  ALMU:  { name: 'Aeluma Inc',         sector: 'Semiconductors',  color: '#3b82f6' },
  IPGP:  { name: 'IPG Photonics',      sector: 'Photonics',       color: '#06b6d4' },
  POET:  { name: 'POET Technologies',  sector: 'Photonics',       color: '#06b6d4' },
  TSLA:  { name: 'Tesla',              sector: 'EV',              color: '#ef4444' },
  AAPL:  { name: 'Apple',              sector: 'Consumer Tech',   color: '#64748b' },
  NFLX:  { name: 'Netflix',            sector: 'Streaming',       color: '#ec4899' },
  CAT:   { name: 'Caterpillar',        sector: 'Industrial',      color: '#f59e0b' },
};

const SYMS = Object.keys(STOCKS);

function $ (id) { return document.getElementById(id); }
function fmt(n, dec=2) { return n == null ? '–' : n.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec }); }
function fmtUSD(n, dec=2) { if (n == null) return '–'; const s = fmt(Math.abs(n), dec); return (n < 0 ? '-' : '') + '$' + s; }
function cls(n) { return n > 0 ? 'positive' : n < 0 ? 'negative' : 'neutral'; }

function makeSVG(prices, color) {
  if (!prices || prices.length < 2) return '<svg viewBox="0 0 200 56"></svg>';
  const mn = Math.min(...prices), mx = Math.max(...prices);
  const range = mx - mn || 1;
  const W = 200, H = 56, pad = 4;
  const xs = prices.map((_, i) => pad + (i / (prices.length - 1)) * (W - pad * 2));
  const ys = prices.map(p => H - pad - ((p - mn) / range) * (H - pad * 2));
  const pts = xs.map((x, i) => `${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const areaClose = `${xs[xs.length-1].toFixed(1)},${(H-pad).toFixed(1)} ${xs[0].toFixed(1)},${(H-pad).toFixed(1)}`;
  const gid = 'g' + Math.random().toString(36).slice(2);
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <polygon points="${pts} ${areaClose}" fill="url(#${gid})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function statusBadge(plpc) {
  if (plpc == null) return `<span class="status-badge badge-watch">WATCHING</span>`;
  if (plpc >= 10)   return `<span class="status-badge badge-trailing">TRAILING STOP</span>`;
  if (plpc <= -8)   return `<span class="status-badge badge-stop">NEAR STOP</span>`;
  if (plpc > 0)     return `<span class="status-badge badge-profit">IN PROFIT</span>`;
  return `<span class="status-badge badge-watch">WATCHING</span>`;
}

function renderCard(sym, pos, prices) {
  const info = STOCKS[sym];
  const color = info.color;

  const currentPrice = pos ? parseFloat(pos.current_price) : (prices && prices.length ? prices[prices.length-1] : null);
  const ytdStart     = prices && prices.length ? prices[0] : null;
  const ytdPct       = (currentPrice && ytdStart) ? ((currentPrice - ytdStart) / ytdStart * 100) : null;
  const lineColor    = ytdPct == null ? color : (ytdPct >= 0 ? '#22c55e' : '#ef4444');

  let posHtml = '';
  if (pos) {
    const qty      = parseFloat(pos.qty);
    const avgCost  = parseFloat(pos.avg_entry_price);
    const plpc     = parseFloat(pos.unrealized_plpc) * 100;
    const plAbs    = parseFloat(pos.unrealized_pl);
    const stopPx   = avgCost * 0.9;
    posHtml = `
      <div class="pos-row">
        <div class="pos-item">
          <span class="pos-lbl">Shares</span>
          <span class="pos-val">${fmt(qty, qty % 1 === 0 ? 0 : 4)}</span>
        </div>
        <div class="pos-item">
          <span class="pos-lbl">Avg Cost</span>
          <span class="pos-val">$${fmt(avgCost)}</span>
        </div>
        <div class="pos-item">
          <span class="pos-lbl">P&amp;L</span>
          <span class="pos-val ${cls(plAbs)}">${fmtUSD(plAbs)} (${plpc >= 0 ? '+' : ''}${fmt(plpc)}%)</span>
        </div>
        <div class="pos-item">
          <span class="pos-lbl">Stop Price</span>
          <span class="pos-val">$${fmt(stopPx)}</span>
        </div>
      </div>
      ${statusBadge(plpc)}`;
  } else {
    posHtml = `<div class="no-position">No open position</div>`;
  }

  return `
  <div class="card">
    <div class="card-accent" style="background:${color}"></div>
    <div class="card-top">
      <div>
        <div class="card-sym" style="color:${color}">${sym}</div>
        <div class="card-name">${info.name}</div>
      </div>
      <span class="sector-badge" style="background:${color}22;color:${color}">${info.sector}</span>
    </div>
    <div class="price-row">
      <span class="current-price">${currentPrice ? '$' + fmt(currentPrice) : '–'}</span>
      ${ytdPct != null ? `<span class="ytd-badge ${ytdPct >= 0 ? 'ytd-pos' : 'ytd-neg'}">${ytdPct >= 0 ? '+' : ''}${fmt(ytdPct, 1)}% YTD</span>` : ''}
    </div>
    <div class="sparkline-wrap">${makeSVG(prices, lineColor)}</div>
    ${posHtml}
  </div>`;
}

async function alpacaFetch(url) {
  const r = await fetch(url, {
    headers: {
      'APCA-API-KEY-ID': KEY,
      'APCA-API-SECRET-KEY': SECRET
    }
  });
  if (!r.ok) throw new Error(`HTTP ${r.status} from ${url}`);
  return r.json();
}

async function fetchBarsPage(symbols, start, pageToken) {
  let url = `${DATA}/v2/stocks/bars?symbols=${symbols.join(',')}&timeframe=1Day&start=${start}&limit=10000&feed=iex&adjustment=raw`;
  if (pageToken) url += `&page_token=${encodeURIComponent(pageToken)}`;
  return alpacaFetch(url);
}

async function main() {
  const now = new Date();
  const ts = now.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });

  let errors = [];

  // fetch account + positions in parallel
  const [account, positions] = await Promise.all([
    alpacaFetch(`${BASE}/account`).catch(e => { errors.push('Account: ' + e.message); return null; }),
    alpacaFetch(`${BASE}/positions`).catch(e => { errors.push('Positions: ' + e.message); return []; }),
  ]);

  // fetch bars (may need pagination)
  const startDate = `${now.getFullYear()}-01-02T00:00:00Z`;
  const barsMap = {};   // sym -> [close, ...]
  try {
    let token = null;
    do {
      const resp = await fetchBarsPage(SYMS, startDate, token);
      const bars = resp.bars || {};
      for (const [sym, dailyBars] of Object.entries(bars)) {
        if (!barsMap[sym]) barsMap[sym] = [];
        barsMap[sym].push(...dailyBars.map(b => b.c));
      }
      token = resp.next_page_token || null;
    } while (token);
  } catch(e) {
    errors.push('Bars: ' + e.message);
  }

  // build position map
  const posMap = {};
  if (Array.isArray(positions)) {
    for (const p of positions) posMap[p.symbol] = p;
  }

  // update summary
  if (account) {
    const equity   = parseFloat(account.equity);
    const cash     = parseFloat(account.cash);
    const invested = parseFloat(account.long_market_value) || (equity - cash);
    const pnl      = Array.isArray(positions) ? positions.reduce((s, p) => s + parseFloat(p.unrealized_pl || 0), 0) : null;
    const pnlPct   = pnl != null && invested ? (pnl / (invested - pnl) * 100) : null;

    $('stat-total').textContent = fmtUSD(equity, 2);
    $('stat-cash').textContent  = fmtUSD(cash, 2);
    $('stat-invested').textContent = fmtUSD(invested, 2);
    $('stat-total-sub').textContent = 'total equity';
    $('stat-cash-sub').textContent = fmtUSD(parseFloat(account.buying_power), 2) + ' buying power';

    if (pnl != null) {
      const el = $('stat-pnl');
      el.textContent = fmtUSD(pnl, 2) + (pnlPct != null ? ` (${pnlPct >= 0 ? '+' : ''}${fmt(pnlPct, 2)}%)` : '');
      el.className = 'stat-value ' + cls(pnl);
      $('stat-pnl-sub').textContent = positions.length + ' open positions';
    }
  }

  // show errors if any
  if (errors.length) {
    $('error-area').innerHTML = `<div class="error-banner"><div class="error-inner">⚠ Data issues: ${errors.join(' | ')}</div></div>`;
  }

  // render cards — sort by unrealized P&L descending (positions first, then watchlist)
  const withPos  = SYMS.filter(s => posMap[s]);
  const noPos    = SYMS.filter(s => !posMap[s]);
  withPos.sort((a, b) => parseFloat(posMap[b].unrealized_pl || 0) - parseFloat(posMap[a].unrealized_pl || 0));
  const ordered  = [...withPos, ...noPos];

  $('stock-grid').innerHTML = ordered.map(sym => renderCard(sym, posMap[sym] || null, barsMap[sym] || null)).join('');
  $('last-updated').textContent = 'Updated ' + ts;
  $('footer-ts').textContent = 'DCA Portfolio Dashboard · ' + ts;
  $('loading').style.display = 'none';
  $('app').style.display = 'block';
}

main().catch(err => {
  $('loading').innerHTML = `
    <div style="color:#ef4444;font-size:15px;max-width:480px;text-align:center;padding:24px">
      ⚠ Failed to load portfolio data<br>
      <span style="font-size:12px;color:#64748b;display:block;margin-top:8px">${err.message}</span>
      <br>
      <span style="font-size:12px;color:#64748b">Check browser console for details. The Alpaca Paper API may require CORS to be enabled from this origin.</span>
    </div>`;
});
</script>
</body>
</html>
