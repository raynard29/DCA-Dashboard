<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>DCA Portfolio Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0d14;--card:#111520;--border:#1e2535;
  --text:#e2e8f0;--muted:#94a3b8;
  --green:#22c55e;--red:#ef4444;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;padding-bottom:3rem}

/* ── HEADER ── */
.hdr{background:linear-gradient(160deg,#12192e 0%,#0d1020 100%);border-bottom:1px solid var(--border);padding:1.25rem 1.5rem;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.logo{font-size:1.1rem;font-weight:800;background:linear-gradient(90deg,#60a5fa,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}
.ts{font-size:.7rem;color:var(--muted)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
.met{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:.5rem;padding:.65rem .9rem}
.met-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem}
.met-val{font-size:1rem;font-weight:700}
.pos{color:var(--green)}.neg{color:var(--red)}

/* ── MAIN ── */
.main{padding:1.25rem 1.5rem}
.sec-title{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.9rem;padding-left:.1rem}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem}
@media(max-width:1200px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:860px){.grid{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.grid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:.75rem;padding:.9rem;position:relative;overflow:hidden;transition:border-color .15s,transform .15s}
.card:hover{border-color:#2a3854;transform:translateY(-1px)}
.accent{position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.45rem}
.sym{font-size:1.2rem;font-weight:900;letter-spacing:-.03em}
.cname{font-size:.65rem;color:var(--muted);margin-top:.1rem;line-height:1.3}
.sbadge{font-size:.58rem;padding:.18rem .45rem;border-radius:9999px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;flex-shrink:0;margin-left:.4rem;margin-top:.1rem}
.price-row{display:flex;align-items:baseline;gap:.4rem;margin-bottom:.45rem}
.cprice{font-size:1.05rem;font-weight:700}
.ybadge{font-size:.68rem;font-weight:700;padding:.12rem .38rem;border-radius:.25rem}
.ybadge.pos{background:rgba(34,197,94,.14);color:#4ade80}
.ybadge.neg{background:rgba(239,68,68,.14);color:#f87171}
.spark{width:100%;height:38px;margin:.35rem 0}
.spark svg{width:100%;height:100%}
.divider{border:none;border-top:1px solid var(--border);margin:.65rem 0}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:.28rem .4rem;font-size:.68rem}
.pl{color:var(--muted)}.pv{font-weight:600;text-align:right}
.pv.pos{color:var(--green)}.pv.neg{color:var(--red)}
.stat{display:inline-block;margin-top:.65rem;font-size:.6rem;font-weight:800;padding:.18rem .55rem;border-radius:.25rem;text-transform:uppercase;letter-spacing:.06em}
.s-trail{background:rgba(168,85,247,.2);color:#c084fc;border:1px solid rgba(168,85,247,.35)}
.s-stop{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.35)}
.s-profit{background:rgba(34,197,94,.14);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.s-watch{background:rgba(100,116,139,.12);color:#94a3b8;border:1px solid rgba(100,116,139,.25)}
.s-nopos{background:rgba(100,116,139,.07);color:#64748b;border:1px solid rgba(100,116,139,.15)}
.dim{opacity:.55}
.nopos-msg{color:var(--muted);font-size:.72rem;text-align:center;padding:.6rem 0}

/* ── LOADING / ERROR ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:1rem}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:#60a5fa;border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{color:var(--muted);font-size:.85rem}
.err-box{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.3);border-radius:.6rem;padding:1.2rem 1.5rem;color:#f87171;margin:2rem auto;max-width:580px;text-align:center;line-height:1.6}
.err-box small{color:var(--muted);font-size:.75rem}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-top">
    <div class="logo">⚡ DCA Portfolio</div>
    <div class="ts" id="ts">Connecting to Alpaca…</div>
  </div>
  <div class="metrics">
    <div class="met"><div class="met-label">Portfolio Value</div><div class="met-val" id="m-port">—</div></div>
    <div class="met"><div class="met-label">Cash Available</div><div class="met-val" id="m-cash">—</div></div>
    <div class="met"><div class="met-label">Invested</div><div class="met-val" id="m-inv">—</div></div>
    <div class="met"><div class="met-label">Unrealized P&amp;L</div><div class="met-val" id="m-pnl">—</div></div>
  </div>
</header>

<main class="main">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div class="load-txt">Fetching live portfolio data…</div>
  </div>
  <div id="err-wrap" style="display:none"></div>
  <div id="content" style="display:none">
    <div class="sec-title" id="pos-title">Open Positions</div>
    <div class="grid" id="pos-cards"></div>
    <div class="sec-title" style="margin-top:1.75rem" id="watch-title">Watchlist</div>
    <div class="grid" id="watch-cards"></div>
  </div>
</main>

<script>
'use strict';

/* ── CONFIG ── */
const KEY  = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const SEC  = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const PAPI = 'https://paper-api.alpaca.markets/v2';
const DAPI = 'https://data.alpaca.markets';
const H    = {'APCA-API-KEY-ID':KEY,'APCA-API-SECRET-KEY':SEC};

const STOCKS = {
  STRC:{name:'Strategy Inc',       sector:'Crypto Treasury', color:'#f7931a'},
  MSTR:{name:'MicroStrategy',      sector:'Crypto Treasury', color:'#f7931a'},
  GEV: {name:'GE Vernova',         sector:'Energy',          color:'#22c55e'},
  BE:  {name:'Bloom Energy',       sector:'Energy',          color:'#22c55e'},
  KGS: {name:'Kodiak Gas',         sector:'Energy',          color:'#22c55e'},
  QBTS:{name:'D-Wave Quantum',     sector:'Quantum',         color:'#a855f7'},
  IONQ:{name:'IonQ',               sector:'Quantum',         color:'#a855f7'},
  QUBT:{name:'Quantum Computing',  sector:'Quantum',         color:'#a855f7'},
  SNDK:{name:'SanDisk',            sector:'Semiconductors',  color:'#3b82f6'},
  MU:  {name:'Micron Technology',  sector:'Semiconductors',  color:'#3b82f6'},
  WDC: {name:'Western Digital',    sector:'Semiconductors',  color:'#3b82f6'},
  MRVL:{name:'Marvell Technology', sector:'Semiconductors',  color:'#3b82f6'},
  ALMU:{name:'Aeluma Inc',         sector:'Semiconductors',  color:'#3b82f6'},
  IPGP:{name:'IPG Photonics',      sector:'Photonics',       color:'#06b6d4'},
  POET:{name:'POET Technologies',  sector:'Photonics',       color:'#06b6d4'},
  TSLA:{name:'Tesla',              sector:'EV',              color:'#ef4444'},
  AAPL:{name:'Apple',              sector:'Consumer Tech',   color:'#64748b'},
  NFLX:{name:'Netflix',            sector:'Streaming',       color:'#ec4899'},
  CAT: {name:'Caterpillar',        sector:'Industrial',      color:'#f59e0b'},
};
const SYMS = Object.keys(STOCKS);

/* ── HELPERS ── */
function f$(v){
  if(v==null)return'—';
  const a=Math.abs(v), s=v<0?'-':'';
  if(a>=1e6) return s+'$'+(a/1e6).toFixed(2)+'M';
  if(a>=1e3) return s+'$'+(a/1e3).toFixed(1)+'K';
  return s+'$'+a.toFixed(2);
}
function fpct(v){if(v==null)return'—';return(v>=0?'+':'')+v.toFixed(2)+'%'}

function sparkSVG(closes, color){
  if(!closes||closes.length<2)return'';
  const mn=Math.min(...closes), mx=Math.max(...closes), rng=mx-mn||1;
  const W=200,H=38,pad=3;
  const pts=closes.map((c,i)=>{
    const x=(i/(closes.length-1))*W;
    const y=H-pad-((c-mn)/rng)*(H-pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const first=closes[0], last=closes[closes.length-1];
  const x0=0, xN=W;
  const y0=(H-pad-((first-mn)/rng)*(H-pad*2)).toFixed(1);
  const yN=(H-pad-((last-mn)/rng)*(H-pad*2)).toFixed(1);
  const gid='g'+color.replace('#','');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="${gid}_${Math.random().toString(36).slice(2)}" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse" y1="0" y2="${H}">
<stop offset="0%" stop-color="${color}" stop-opacity="0.25"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
<path d="M ${x0},${H} L ${x0},${y0} ${pts} L ${xN},${H} Z" fill="${color}" fill-opacity="0.15"/>
<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
</svg>`;
}

function statusInfo(plpc){
  if(plpc==null) return['NO POSITION','s-nopos'];
  if(plpc>=10)   return['▲ TRAILING STOP','s-trail'];
  if(plpc<=-8)   return['⚠ NEAR STOP','s-stop'];
  if(plpc>0)     return['IN PROFIT','s-profit'];
  return               ['WATCHING','s-watch'];
}

function cardHTML(sym, pos, closes){
  const info = STOCKS[sym];
  const c    = info.color;
  const hasP = !!pos;

  const cprice = hasP ? +pos.current_price : (closes?.length ? closes[closes.length-1] : null);
  const ytdStart = closes?.length ? closes[0] : null;
  const ytdPct   = (cprice&&ytdStart) ? (cprice-ytdStart)/ytdStart*100 : null;
  const lineClr  = ytdPct!=null ? (ytdPct>=0?'#22c55e':'#ef4444') : c;

  const plpc     = hasP ? +pos.unrealized_plpc*100 : null;
  const qty      = hasP ? +pos.qty          : null;
  const avg      = hasP ? +pos.avg_entry_price : null;
  const stop     = avg  ? avg*0.9           : null;
  const [stxt, scls] = statusInfo(plpc);

  const qStr = qty!=null ? (qty%1===0?qty.toFixed(0):qty.toFixed(4)) : '—';

  return `<div class="card${hasP?'':' dim'}">
  <div class="accent" style="background:${c}"></div>
  <div class="card-top">
    <div>
      <div class="sym" style="color:${c}">${sym}</div>
      <div class="cname">${info.name}</div>
    </div>
    <span class="sbadge" style="background:${c}22;color:${c};border:1px solid ${c}44">${info.sector}</span>
  </div>
  <div class="price-row">
    <span class="cprice">${cprice?'$'+cprice.toFixed(2):'—'}</span>
    ${ytdPct!=null?`<span class="ybadge ${ytdPct>=0?'pos':'neg'}">${fpct(ytdPct)} YTD</span>`:''}
  </div>
  <div class="spark">${sparkSVG(closes, lineClr)}</div>
  <hr class="divider">
  ${hasP?`<div class="pgrid">
    <span class="pl">Shares</span><span class="pv">${qStr}</span>
    <span class="pl">Avg Cost</span><span class="pv">${avg?'$'+avg.toFixed(2):'—'}</span>
    <span class="pl">P&amp;L</span><span class="pv ${plpc!=null&&plpc>=0?'pos':'neg'}">${fpct(plpc)}</span>
    <span class="pl">Stop</span><span class="pv">${stop?'$'+stop.toFixed(2):'—'}</span>
  </div>`:`<div class="nopos-msg">No open position</div>`}
  <span class="stat ${scls}">${stxt}</span>
</div>`;
}

/* ── FETCH & RENDER ── */
async function init(){
  try{
    const [aRes, pRes, bRes] = await Promise.all([
      fetch(`${PAPI}/account`,{headers:H}),
      fetch(`${PAPI}/positions`,{headers:H}),
      fetch(`${DAPI}/v2/stocks/bars?symbols=${SYMS.join(',')}&timeframe=1Day&start=2026-01-02T00:00:00Z&limit=10000&feed=iex&adjustment=raw`,{headers:H})
    ]);
    const account  = await aRes.json();
    const positions= await pRes.json();
    const barsData = await bRes.json();

    // index positions
    const posMap={};
    if(Array.isArray(positions)) positions.forEach(p=>posMap[p.symbol]=p);

    // extract closes
    const closesMap={};
    if(barsData.bars){
      Object.entries(barsData.bars).forEach(([s,bars])=>{
        closesMap[s]=bars.map(b=>b.c);
      });
    }

    // header metrics
    const pval = +(account.portfolio_value||account.equity||0);
    const cash = +(account.cash||0);
    const inv  = pval - cash;
    let totPL = 0;
    if(Array.isArray(positions)) positions.forEach(p=>totPL+=+(p.unrealized_pl||0));

    document.getElementById('m-port').textContent = f$(pval);
    document.getElementById('m-cash').textContent = f$(cash);
    document.getElementById('m-inv').textContent  = f$(inv);
    const plEl=document.getElementById('m-pnl');
    plEl.textContent=(totPL>=0?'+':'')+f$(totPL);
    plEl.className='met-val '+(totPL>=0?'pos':'neg');
    document.getElementById('ts').textContent='Updated: '+new Date().toLocaleString();

    // split positioned vs watchlist
    const withPos  = SYMS.filter(s=>posMap[s]);
    const withWatch= SYMS.filter(s=>!posMap[s]);

    document.getElementById('pos-cards').innerHTML   = withPos.map(s=>cardHTML(s,posMap[s],closesMap[s])).join('');
    document.getElementById('watch-cards').innerHTML = withWatch.map(s=>cardHTML(s,null,closesMap[s])).join('');
    if(!withPos.length)  document.getElementById('pos-title').style.display='none';
    if(!withWatch.length)document.getElementById('watch-title').style.display='none';

    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='';

  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('err-wrap').style.display='';
    document.getElementById('err-wrap').innerHTML=`<div class="err-box">
      <strong>Could not load portfolio data</strong><br>${e.message}<br>
      <small>CORS or credential issue — check console for details. Page auto-retries on refresh.</small>
    </div>`;
    console.error(e);
  }
}

init();
</script>
</body>
</html>
