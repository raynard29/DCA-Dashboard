<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3600">
  <title>DCA Portfolio Dashboard</title>
  <style>
    :root {
      --bg: #0a0d14;
      --card: #111520;
      --card2: #161b2a;
      --border: #1e2740;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --purple: #a855f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #0f1623 0%, #1a2035 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px 16px;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
    }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .refresh-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: #1e2740; }
    .refresh-btn.spinning .spin-icon { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SUMMARY CARDS ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .sum-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .sum-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .sum-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .sum-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }

    /* ── STATUS BAR ── */
    .status-bar {
      padding: 8px 24px;
      background: #0d1119;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.4 } }

    /* ── MAIN GRID ── */
    .main { padding: 20px 24px; }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 860px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 540px)  { .grid { grid-template-columns: 1fr; } }

    /* ── STOCK CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .card-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 12px 12px 0 0;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .sym { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
    .co-name { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.3; }
    .sector-badge {
      font-size: 18px;
      opacity: 0.8;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
    }
    .price { font-size: 18px; font-weight: 700; }
    .ytd-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
    }
    .ytd-pos { background: rgba(34,197,94,0.15); color: var(--green); }
    .ytd-neg { background: rgba(239,68,68,0.15); color: var(--red); }
    .ytd-neu { background: rgba(100,116,139,0.15); color: var(--muted); }

    /* ── SPARKLINE ── */
    .sparkline-wrap {
      margin: 8px -4px;
      height: 50px;
    }
    .sparkline-wrap svg { width: 100%; height: 50px; display: block; }

    /* ── POSITION ROW ── */
    .pos-row {
      background: var(--card2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 10px;
    }
    .pos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
    }
    .pos-item .label { font-size: 10px; color: var(--muted); }
    .pos-item .val { font-size: 12px; font-weight: 600; }

    /* ── STATUS BADGE ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-trailing  { background: rgba(168,85,247,0.15); color: var(--purple); border: 1px solid rgba(168,85,247,0.3); }
    .badge-stop      { background: rgba(239,68,68,0.15);  color: var(--red);    border: 1px solid rgba(239,68,68,0.3); }
    .badge-profit    { background: rgba(34,197,94,0.15);  color: var(--green);  border: 1px solid rgba(34,197,94,0.3); }
    .badge-watching  { background: rgba(100,116,139,0.1); color: var(--muted);  border: 1px solid rgba(100,116,139,0.2); }

    /* ── NO POSITION ── */
    .no-pos { font-size: 11px; color: var(--muted); margin-top: 8px; font-style: italic; }

    /* ── LOADING / ERROR ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      gap: 16px;
    }
    .loader {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text { color: var(--muted); font-size: 14px; }
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 16px 20px;
      max-width: 420px;
      text-align: center;
    }
    .error-box h3 { color: var(--red); margin-bottom: 8px; }
    .error-box p { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .retry-btn {
      margin-top: 12px;
      background: rgba(59,130,246,0.2);
      border: 1px solid rgba(59,130,246,0.4);
      color: #3b82f6;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="loading-overlay" class="loading-overlay">
  <div class="loader"></div>
  <div class="loading-text">Fetching live portfolio data…</div>
</div>

<div id="error-overlay" class="loading-overlay hidden">
  <div class="error-box">
    <h3>⚠ Unable to reach Alpaca API</h3>
    <p id="error-msg">Could not fetch portfolio data. Make sure your IP is in the Alpaca API allowlist and CORS is enabled for this domain.</p>
    <button class="retry-btn" onclick="init()">↺ Retry</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📈</div>
        <div>
          <div class="logo-text">DCA Portfolio</div>
          <div class="logo-sub">Live · Paper Account</div>
        </div>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="init()">
        <span class="spin-icon">↻</span> Refresh
      </button>
    </div>
    <div class="summary" id="summary"></div>
  </div>

  <div class="status-bar">
    <span class="status-dot"></span>
    <span id="status-time">Loading…</span>
    <span>·</span>
    <span id="status-count">0 positions</span>
    <span>·</span>
    <span>Auto-refresh every 60 min</span>
  </div>

  <div class="main">
    <div class="section-title">Portfolio Holdings</div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
const ALPACA_KEY    = "PKVSKGUO3BBBBYYOX2TL5L7RPC";
const ALPACA_SECRET = "7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X";
const ALPACA_BASE   = "https://paper-api.alpaca.markets/v2";
const ALPACA_DATA   = "https://data.alpaca.markets";
const ALL_SYMS      = "STRC,MSTR,GEV,BE,KGS,QBTS,IONQ,QUBT,SNDK,MU,WDC,MRVL,ALMU,IPGP,POET,TSLA,AAPL,NFLX,CAT";

const STOCKS = [{"sym": "STRC", "name": "Strategy Inc", "sector": "Crypto Treasury", "color": "#f7931a", "icon": "₿"}, {"sym": "MSTR", "name": "MicroStrategy", "sector": "Crypto Treasury", "color": "#f7931a", "icon": "₿"}, {"sym": "GEV", "name": "GE Vernova", "sector": "Energy", "color": "#22c55e", "icon": "⚡"}, {"sym": "BE", "name": "Bloom Energy", "sector": "Energy", "color": "#22c55e", "icon": "⚡"}, {"sym": "KGS", "name": "Kodiak Gas", "sector": "Energy", "color": "#22c55e", "icon": "⚡"}, {"sym": "QBTS", "name": "D-Wave Quantum", "sector": "Quantum", "color": "#a855f7", "icon": "⚛"}, {"sym": "IONQ", "name": "IonQ", "sector": "Quantum", "color": "#a855f7", "icon": "⚛"}, {"sym": "QUBT", "name": "Quantum Computing", "sector": "Quantum", "color": "#a855f7", "icon": "⚛"}, {"sym": "SNDK", "name": "SanDisk", "sector": "Semiconductors", "color": "#3b82f6", "icon": "💾"}, {"sym": "MU", "name": "Micron Technology", "sector": "Semiconductors", "color": "#3b82f6", "icon": "💾"}, {"sym": "WDC", "name": "Western Digital", "sector": "Semiconductors", "color": "#3b82f6", "icon": "💾"}, {"sym": "MRVL", "name": "Marvell Technology", "sector": "Semiconductors", "color": "#3b82f6", "icon": "💾"}, {"sym": "ALMU", "name": "Aeluma Inc", "sector": "Semiconductors", "color": "#3b82f6", "icon": "💾"}, {"sym": "IPGP", "name": "IPG Photonics", "sector": "Photonics", "color": "#06b6d4", "icon": "💡"}, {"sym": "POET", "name": "POET Technologies", "sector": "Photonics", "color": "#06b6d4", "icon": "💡"}, {"sym": "TSLA", "name": "Tesla", "sector": "EV", "color": "#ef4444", "icon": "🔋"}, {"sym": "AAPL", "name": "Apple", "sector": "Consumer Tech", "color": "#64748b", "icon": "🍎"}, {"sym": "NFLX", "name": "Netflix", "sector": "Streaming", "color": "#ec4899", "icon": "🎬"}, {"sym": "CAT", "name": "Caterpillar", "sector": "Industrial", "color": "#f59e0b", "icon": "🏗"}];

const HEADERS = {
  "APCA-API-KEY-ID": ALPACA_KEY,
  "APCA-API-SECRET-KEY": ALPACA_SECRET,
  "Accept": "application/json"
};

function fmt$(v) {
  if (v == null || isNaN(v)) return "—";
  return "$" + Number(v).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtPct(v) {
  if (v == null || isNaN(v)) return "—";
  const n = Number(v);
  return (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
}
function fmtShares(v) {
  if (v == null || isNaN(v)) return "—";
  const n = Number(v);
  return n % 1 === 0 ? n.toFixed(0) : n.toFixed(4);
}

function sparklineSVG(closes, color) {
  if (!closes || closes.length < 2) {
    return `<svg viewBox="0 0 200 50"><text x="100" y="28" text-anchor="middle" fill="#64748b" font-size="10">No data</text></svg>`;
  }
  const mn = Math.min(...closes);
  const mx = Math.max(...closes);
  const range = mx - mn || 1;
  const w = 200, h = 50, pad = 4;
  const pts = closes.map((c, i) => {
    const x = pad + (i / (closes.length - 1)) * (w - pad * 2);
    const y = h - pad - ((c - mn) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const polyline = pts.join(" ");
  const areaClose = `${w - pad},$ {h - pad} ${pad},${h - pad}`;
  const fillColor = color + "22";
  const strokeColor = color;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="g_${color.slice(1)}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${strokeColor}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${strokeColor}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${polyline} ${w - pad},${h - pad} ${pad},${h - pad}"
      fill="url(#g_${color.slice(1)})" />
    <polyline points="${polyline}"
      fill="none" stroke="${strokeColor}" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function statusBadge(plpc) {
  const p = Number(plpc);
  if (p >= 10)  return `<span class="status-badge badge-trailing">🚀 Trailing Stop</span>`;
  if (p <= -8)  return `<span class="status-badge badge-stop">⚠ Near Stop</span>`;
  if (p > 0)    return `<span class="status-badge badge-profit">✓ In Profit</span>`;
  return `<span class="status-badge badge-watching">👁 Watching</span>`;
}

async function apiFetch(url) {
  const r = await fetch(url, { headers: HEADERS });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${await r.text()}`);
  return r.json();
}

async function fetchAllBars() {
  const today = new Date();
  const start = new Date(today.getFullYear(), 0, 2).toISOString().split("T")[0];
  let url = `${ALPACA_DATA}/v2/stocks/bars?symbols=${ALL_SYMS}&timeframe=1Day&start=${start}T00:00:00Z&limit=10000&feed=iex&adjustment=raw`;
  const bars = {};
  while (url) {
    const data = await apiFetch(url);
    for (const [sym, list] of Object.entries(data.bars || {})) {
      if (!bars[sym]) bars[sym] = [];
      bars[sym].push(...list);
    }
    url = data.next_page_token
      ? `${ALPACA_DATA}/v2/stocks/bars?symbols=${ALL_SYMS}&timeframe=1Day&start=${start}T00:00:00Z&limit=10000&feed=iex&adjustment=raw&page_token=${data.next_page_token}`
      : null;
  }
  return bars;
}

async function init() {
  document.getElementById("loading-overlay").classList.remove("hidden");
  document.getElementById("error-overlay").classList.add("hidden");
  document.getElementById("app").classList.add("hidden");
  document.getElementById("refresh-btn")?.classList.add("spinning");

  try {
    const [account, positions, bars] = await Promise.all([
      apiFetch(`${ALPACA_BASE}/account`),
      apiFetch(`${ALPACA_BASE}/positions`),
      fetchAllBars()
    ]);
    render(account, positions, bars);
    document.getElementById("loading-overlay").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
  } catch (e) {
    console.error(e);
    document.getElementById("error-msg").textContent = e.message;
    document.getElementById("loading-overlay").classList.add("hidden");
    document.getElementById("error-overlay").classList.remove("hidden");
  } finally {
    document.getElementById("refresh-btn")?.classList.remove("spinning");
  }
}

function render(account, positions, bars) {
  const posMap = {};
  for (const p of positions) posMap[p.symbol] = p;

  // Summary
  const portVal   = parseFloat(account.portfolio_value || 0);
  const cash      = parseFloat(account.cash || 0);
  const invested  = positions.reduce((s, p) => s + parseFloat(p.market_value || 0), 0);
  const unrPL     = positions.reduce((s, p) => s + parseFloat(p.unrealized_pl || 0), 0);
  const unrPLpct  = invested > 0 ? (unrPL / (invested - unrPL)) * 100 : 0;
  const buyingPwr = parseFloat(account.buying_power || 0);

  document.getElementById("summary").innerHTML = `
    <div class="sum-card">
      <div class="sum-label">Portfolio Value</div>
      <div class="sum-value">${fmt$(portVal)}</div>
      <div class="sum-sub">Total equity</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Cash</div>
      <div class="sum-value">${fmt$(cash)}</div>
      <div class="sum-sub">Available</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Invested</div>
      <div class="sum-value">${fmt$(invested)}</div>
      <div class="sum-sub">${positions.length} positions</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Unrealized P&amp;L</div>
      <div class="sum-value ${unrPL >= 0 ? "pos" : "neg"}">${fmt$(unrPL)}</div>
      <div class="sum-sub ${unrPL >= 0 ? "pos" : "neg"}">${fmtPct(unrPLpct)}</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Buying Power</div>
      <div class="sum-value">${fmt$(buyingPwr)}</div>
      <div class="sum-sub">Available margin</div>
    </div>
  `;

  // Status bar
  const now = new Date();
  document.getElementById("status-time").textContent =
    "Updated " + now.toLocaleString("en-US", {hour:"2-digit",minute:"2-digit",month:"short",day:"numeric"});
  document.getElementById("status-count").textContent = `${positions.length} positions`;

  // Cards
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (const s of STOCKS) {
    const pos  = posMap[s.sym];
    const barsArr = (bars[s.sym] || []).map(b => b.c);

    // YTD %
    let ytdPct = null;
    if (barsArr.length >= 2) {
      ytdPct = ((barsArr[barsArr.length - 1] - barsArr[0]) / barsArr[0]) * 100;
    }
    const ytdClass  = ytdPct == null ? "ytd-neu" : (ytdPct >= 0 ? "ytd-pos" : "ytd-neg");
    const ytdLabel  = ytdPct == null ? "No data" : fmtPct(ytdPct);
    const sparkColor = pos
      ? (parseFloat(pos.unrealized_plpc || 0) * 100 >= 0 ? s.color : "#ef4444")
      : (ytdPct == null ? "#64748b" : (ytdPct >= 0 ? s.color : "#ef4444"));

    const spark = sparklineSVG(barsArr, sparkColor);
    const curPrice = pos
      ? parseFloat(pos.current_price)
      : (barsArr.length ? barsArr[barsArr.length - 1] : null);

    let posHTML = "";
    if (pos) {
      const plpc   = parseFloat(pos.unrealized_plpc || 0) * 100;
      const avg    = parseFloat(pos.avg_entry_price || 0);
      const stop   = avg * 0.90;
      const qty    = parseFloat(pos.qty || 0);
      const mv     = parseFloat(pos.market_value || 0);
      posHTML = `
        <div class="pos-row">
          <div class="pos-grid">
            <div class="pos-item"><div class="label">Shares</div><div class="val">${fmtShares(qty)}</div></div>
            <div class="pos-item"><div class="label">Avg Cost</div><div class="val">${fmt$(avg)}</div></div>
            <div class="pos-item"><div class="label">P&amp;L %</div><div class="val ${plpc >= 0 ? "pos" : "neg"}">${fmtPct(plpc)}</div></div>
            <div class="pos-item"><div class="label">Stop (−10%)</div><div class="val">${fmt$(stop)}</div></div>
          </div>
        </div>
        ${statusBadge(plpc)}
      `;
    } else {
      posHTML = `<div class="no-pos">No position held</div>`;
    }

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-accent" style="background:${s.color}"></div>
      <div class="card-header">
        <div>
          <div class="sym" style="color:${s.color}">${s.sym}</div>
          <div class="co-name">${s.name}</div>
        </div>
        <div class="sector-badge" title="${s.sector}">${s.icon}</div>
      </div>
      <div class="price-row">
        <span class="price">${curPrice != null ? fmt$(curPrice) : "—"}</span>
        <span class="ytd-badge ${ytdClass}">${ytdLabel} YTD</span>
      </div>
      <div class="sparkline-wrap">${spark}</div>
      ${posHTML}
    `;
    grid.appendChild(card);
  }
}

init();
</script>
</body>
</html>
