<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3600">
  <title>DCA Portfolio Dashboard</title>
  <style>
    :root {
      --bg:      #0a0d14;
      --card:    #111520;
      --card-h:  #161c2d;
      --border:  #1e2535;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #22c55e;
      --red:     #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      min-height: 100vh;
      padding: 1.25rem;
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .75rem;
      margin-bottom: 1.4rem;
    }
    .header h1 {
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, #e2e8f0 30%, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { font-size: .72rem; color: var(--muted); margin-top: .18rem; }
    .refresh-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .38rem .9rem;
      border-radius: 6px;
      font-size: .78rem;
      cursor: pointer;
      transition: background .15s;
    }
    .refresh-btn:hover { background: var(--card-h); }

    /* ── STATS BAR ───────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: .75rem;
      margin-bottom: 1.25rem;
    }
    @media(max-width:700px){ .stats-bar{ grid-template-columns:repeat(2,1fr); } }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .9rem 1rem;
    }
    .stat-label {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: .3rem;
    }
    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .stat-sub { font-size: .72rem; color: var(--muted); margin-top: .18rem; }

    /* ── GRID ────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: .85rem;
    }
    @media(max-width:1100px){ .grid{ grid-template-columns:repeat(3,1fr); } }
    @media(max-width:800px) { .grid{ grid-template-columns:repeat(2,1fr); } }
    @media(max-width:480px) { .grid{ grid-template-columns:1fr; } }

    /* ── STOCK CARD ──────────────────────────── */
    .stock-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      position: relative;
      overflow: hidden;
      transition: border-color .2s, transform .15s;
    }
    .stock-card:hover { border-color: #2d3748; transform: translateY(-1px); }
    .stock-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2.5px;
      background: var(--accent, #3b82f6);
      opacity: .8;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: .55rem;
    }
    .symbol {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .company-name { font-size: .67rem; color: var(--muted); margin-top: .12rem; }
    .sector-tag {
      font-size: .62rem;
      font-weight: 600;
      padding: .14rem .48rem;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: .3rem;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: .45rem;
      margin-bottom: .1rem;
    }
    .price {
      font-size: 1.08rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .ytd-badge {
      font-size: .7rem;
      font-weight: 700;
      padding: .1rem .42rem;
      border-radius: 4px;
    }
    .ytd-badge.pos { background: rgba(34,197,94,.13); color: #22c55e; }
    .ytd-badge.neg { background: rgba(239,68,68,.13); color: #ef4444; }

    /* sparkline */
    .spark-wrap { margin: .55rem -.05rem; height: 46px; }
    .spark-wrap svg { width:100%; height:46px; overflow:visible; }

    /* position rows */
    .pos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .28rem .5rem;
      font-size: .69rem;
      margin-top: .45rem;
    }
    .pi-label { color: var(--muted); }
    .pi-value { font-weight: 600; font-variant-numeric: tabular-nums; }

    /* status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: .28rem;
      font-size: .63rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: .2rem .52rem;
      border-radius: 4px;
      margin-top: .55rem;
    }
    .sb-trail  { background:rgba(34,197,94,.1);  color:#22c55e; border:1px solid rgba(34,197,94,.25); }
    .sb-stop   { background:rgba(239,68,68,.1);  color:#ef4444; border:1px solid rgba(239,68,68,.25); animation:pulse-r 2s infinite; }
    .sb-profit { background:rgba(96,165,250,.1); color:#60a5fa; border:1px solid rgba(96,165,250,.25); }
    .sb-watch  { background:rgba(100,116,139,.1);color:var(--muted); border:1px solid rgba(100,116,139,.2); }
    @keyframes pulse-r {
      0%,100%{ box-shadow:0 0 0 0 rgba(239,68,68,0); }
      50%    { box-shadow:0 0 0 4px rgba(239,68,68,.1); }
    }

    .no-pos { font-size:.7rem; color:var(--muted); font-style:italic; margin-top:.5rem; }

    /* ── LOADING / ERROR ─────────────────────── */
    .loader-wrap {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      min-height:55vh; gap:1rem;
    }
    .spinner {
      width:34px; height:34px;
      border:3px solid var(--border);
      border-top-color:#3b82f6;
      border-radius:50%;
      animation:spin .75s linear infinite;
    }
    @keyframes spin{ to{transform:rotate(360deg);} }
    .loader-text { color:var(--muted); font-size:.88rem; }

    .err-box {
      background:rgba(239,68,68,.07);
      border:1px solid rgba(239,68,68,.2);
      border-radius:10px;
      padding:1.2rem 1.5rem;
      color:#ef4444;
      font-size:.85rem;
      max-width:540px;
      margin:2.5rem auto;
      text-align:center;
      line-height:1.6;
    }
    .err-box small { color:var(--muted); font-size:.75rem; }

    /* ── FOOTER ──────────────────────────────── */
    .footer {
      margin-top:1.5rem;
      padding-top:.9rem;
      border-top:1px solid var(--border);
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:.4rem;
    }
    .footer span { font-size:.68rem; color:var(--muted); }
  </style>
</head>
<body>
  <div id="app">
    <div class="loader-wrap">
      <div class="spinner"></div>
      <div class="loader-text">Fetching live portfolio data from Alpaca…</div>
    </div>
  </div>

<script>
/* ─── CONFIG ─────────────────────────────────────────────────── */
const KEY    = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const PAPER  = 'https://paper-api.alpaca.markets/v2';
const DATA   = 'https://data.alpaca.markets';
const SYMS   = ['STRC','MSTR','GEV','BE','KGS','QBTS','IONQ','QUBT',
                 'SNDK','MU','WDC','MRVL','ALMU','IPGP','POET','TSLA','AAPL','NFLX','CAT'];

const META = {
  STRC:{ name:'Strategy Inc',      sector:'Crypto Treasury', color:'#f7931a' },
  MSTR:{ name:'MicroStrategy',     sector:'Crypto Treasury', color:'#f7931a' },
  GEV: { name:'GE Vernova',        sector:'Energy',          color:'#22c55e' },
  BE:  { name:'Bloom Energy',      sector:'Energy',          color:'#22c55e' },
  KGS: { name:'Kodiak Gas',        sector:'Energy',          color:'#22c55e' },
  QBTS:{ name:'D-Wave Quantum',    sector:'Quantum',         color:'#a855f7' },
  IONQ:{ name:'IonQ',              sector:'Quantum',         color:'#a855f7' },
  QUBT:{ name:'Quantum Computing', sector:'Quantum',         color:'#a855f7' },
  SNDK:{ name:'SanDisk',           sector:'Semiconductors',  color:'#3b82f6' },
  MU:  { name:'Micron Technology', sector:'Semiconductors',  color:'#3b82f6' },
  WDC: { name:'Western Digital',   sector:'Semiconductors',  color:'#3b82f6' },
  MRVL:{ name:'Marvell Technology',sector:'Semiconductors',  color:'#3b82f6' },
  ALMU:{ name:'Aeluma Inc',        sector:'Semiconductors',  color:'#3b82f6' },
  IPGP:{ name:'IPG Photonics',     sector:'Photonics',       color:'#06b6d4' },
  POET:{ name:'POET Technologies', sector:'Photonics',       color:'#06b6d4' },
  TSLA:{ name:'Tesla',             sector:'EV',              color:'#ef4444' },
  AAPL:{ name:'Apple',             sector:'Consumer Tech',   color:'#64748b' },
  NFLX:{ name:'Netflix',           sector:'Streaming',       color:'#ec4899' },
  CAT: { name:'Caterpillar',       sector:'Industrial',      color:'#f59e0b' },
};

/* ─── HELPERS ────────────────────────────────────────────────── */
const f$ = n => (n == null || isNaN(n)) ? '—'
  : '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

const fPct = n => (n == null || isNaN(n)) ? '—'
  : (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';

const fK = n => {
  if (n == null || isNaN(n)) return '—';
  const a = Math.abs(n);
  if (a >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (a >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Number(n).toFixed(2);
};

async function alpaca(url) {
  const r = await fetch(url, { headers:{ 'APCA-API-KEY-ID':KEY, 'APCA-API-SECRET-KEY':SECRET } });
  if (!r.ok) throw new Error(`HTTP ${r.status} – ${r.url}`);
  return r.json();
}

/* ─── SPARKLINE ──────────────────────────────────────────────── */
function sparkline(closes, color) {
  if (!closes || closes.length < 2)
    return `<svg viewBox="0 0 200 46"><text x="100" y="27" fill="#475569" font-size="11" text-anchor="middle">No data</text></svg>`;

  const W=200, H=46, PAD=2;
  const mn=Math.min(...closes), mx=Math.max(...closes);
  const rng = mx-mn || 1;
  const pts = closes.map((v,i)=>{
    const x = PAD + (i/(closes.length-1))*(W-PAD*2);
    const y = H-PAD - ((v-mn)/rng)*(H-PAD*2);
    return [x.toFixed(1), y.toFixed(1)];
  });
  const line = pts.map((p,i)=>`${i?'L':'M'}${p[0]},${p[1]}`).join(' ');
  const area = line + ` L${pts[pts.length-1][0]},${H+2} L${pts[0][0]},${H+2} Z`;
  const gid  = 'g'+Math.random().toString(36).slice(2,8);

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity=".28"/>
        <stop offset="100%" stop-color="${color}" stop-opacity=".02"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.6"
          stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

/* ─── STATUS BADGE ───────────────────────────────────────────── */
function badge(plpc) {
  if (plpc == null) return `<span class="status-badge sb-watch">● Watching</span>`;
  if (plpc >= 10)   return `<span class="status-badge sb-trail">▲ Trailing</span>`;
  if (plpc <= -8)   return `<span class="status-badge sb-stop">⚠ Near Stop</span>`;
  if (plpc > 0)     return `<span class="status-badge sb-profit">● In Profit</span>`;
  return                   `<span class="status-badge sb-watch">● Watching</span>`;
}

/* ─── RENDER ─────────────────────────────────────────────────── */
function render(acct, posMap, barsMap) {
  const portVal  = +acct.portfolio_value  || 0;
  const cash     = +acct.cash             || 0;
  const longMV   = +acct.long_market_value|| 0;

  let totalUPL=0, totalCost=0;
  Object.values(posMap).forEach(p=>{
    totalUPL  += +(p.unrealized_pl || 0);
    totalCost += +(p.cost_basis    || 0);
  });
  const uplPct = totalCost > 0 ? (totalUPL/totalCost)*100 : 0;

  const ts = new Date().toLocaleString('en-US',{
    month:'short',day:'numeric',year:'numeric',
    hour:'2-digit',minute:'2-digit',timeZoneName:'short'
  });

  /* --- cards --- */
  const cards = SYMS.map(sym => {
    const m   = META[sym] || { name:sym, sector:'', color:'#64748b' };
    const pos = posMap[sym];
    const bars = (barsMap[sym] || []);
    const closes = bars.map(b=>b.c);

    const cur    = pos ? +pos.current_price : (closes.length ? closes[closes.length-1] : null);
    const ytdF   = closes.length ? closes[0] : null;
    const ytdPct = (ytdF && cur) ? ((cur-ytdF)/ytdF)*100 : null;

    const avgCost  = pos ? +pos.avg_entry_price : null;
    const qty      = pos ? +pos.qty             : null;
    const plpc     = pos ? +pos.unrealized_plpc * 100 : null;
    const stop     = avgCost ? avgCost*0.9 : null;

    const sparkColor = ytdPct != null ? (ytdPct>=0?'#22c55e':'#ef4444') : m.color;

    return `
    <div class="stock-card" style="--accent:${m.color}">
      <div class="card-top">
        <div>
          <div class="symbol" style="color:${m.color}">${sym}</div>
          <div class="company-name">${m.name}</div>
        </div>
        <span class="sector-tag" style="background:${m.color}1a;color:${m.color}">${m.sector}</span>
      </div>

      <div class="price-row">
        <span class="price">${f$(cur)}</span>
        ${ytdPct!=null ? `<span class="ytd-badge ${ytdPct>=0?'pos':'neg'}">${fPct(ytdPct)} YTD</span>` : ''}
      </div>

      <div class="spark-wrap">${sparkline(closes, sparkColor)}</div>

      ${pos ? `
        <div class="pos-grid">
          <div><div class="pi-label">Shares</div><div class="pi-value">${Number(qty).toLocaleString()}</div></div>
          <div><div class="pi-label">Avg Cost</div><div class="pi-value">${f$(avgCost)}</div></div>
          <div><div class="pi-label">P&amp;L</div>
               <div class="pi-value" style="color:${plpc>=0?'#22c55e':'#ef4444'}">${fPct(plpc)}</div></div>
          <div><div class="pi-label">Stop</div>
               <div class="pi-value" style="color:#f59e0b">${f$(stop)}</div></div>
        </div>
        ${badge(plpc)}
      ` : `<div class="no-pos">No position held</div>`}
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div>
        <h1>DCA Portfolio Dashboard</h1>
        <p>Updated ${ts} &nbsp;·&nbsp; Auto-refreshes every hour</p>
      </div>
      <button class="refresh-btn" onclick="location.reload()">↺ Refresh now</button>
    </div>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Portfolio Value</div>
        <div class="stat-value">${f$(portVal)}</div>
        <div class="stat-sub">Total equity</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Cash</div>
        <div class="stat-value">${f$(cash)}</div>
        <div class="stat-sub">Available to trade</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Invested</div>
        <div class="stat-value">${f$(longMV)}</div>
        <div class="stat-sub">Long market value</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Unrealized P&amp;L</div>
        <div class="stat-value" style="color:${totalUPL>=0?'#22c55e':'#ef4444'}">${f$(totalUPL)}</div>
        <div class="stat-sub" style="color:${totalUPL>=0?'#22c55e':'#ef4444'}">${fPct(uplPct)}</div>
      </div>
    </div>

    <div class="grid">${cards}</div>

    <div class="footer">
      <span>Paper trading account · Alpaca Markets</span>
      <span>19 stocks · 8 sectors · Data via IEX</span>
    </div>`;
}

/* ─── INIT ───────────────────────────────────────────────────── */
async function init() {
  try {
    const start  = '2026-01-02T00:00:00Z';
    const symStr = SYMS.join(',');
    const barUrl = `${DATA}/v2/stocks/bars?symbols=${symStr}&timeframe=1Day&start=${start}&limit=10000&feed=iex&adjustment=raw`;

    const [acct, positions, barsResp] = await Promise.all([
      alpaca(`${PAPER}/account`),
      alpaca(`${PAPER}/positions`),
      alpaca(barUrl),
    ]);

    const posMap  = {};
    positions.forEach(p => posMap[p.symbol] = p);

    render(acct, posMap, barsResp.bars || {});
  } catch(err) {
    document.getElementById('app').innerHTML = `
      <div class="header"><div><h1>DCA Portfolio Dashboard</h1></div></div>
      <div class="err-box">
        <strong>Could not load portfolio data</strong><br><br>
        ${err.message}<br><br>
        <small>If this is a CORS error, the Alpaca API may need to be accessed through a proxy.<br>
        Check browser console for details (F12 → Console).</small>
      </div>`;
  }
}

init();
</script>
</body>
</html>
