<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>DCA Portfolio Dashboard</title>
<style>
  :root {
    --bg: #0a0d14;
    --card: #111520;
    --card2: #161b2e;
    --border: #1e2740;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --cyan: #06b6d4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
    min-height: 100vh;
  }
  /* ---- Header ---- */
  .header {
    background: linear-gradient(135deg, #111520 0%, #0d1629 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .logo { font-size: 1.1rem; font-weight: 700; color: #fff; letter-spacing: .5px; }
  .logo span { color: var(--cyan); }
  .last-updated { font-size: .75rem; color: var(--muted); }
  .summary-row {
    display: flex; flex-wrap: wrap; gap: 20px; margin-top: 14px;
  }
  .summary-item { display: flex; flex-direction: column; gap: 2px; }
  .summary-label { font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .summary-value { font-size: 1.35rem; font-weight: 700; color: #fff; }
  .summary-value.pos { color: var(--green); }
  .summary-value.neg { color: var(--red); }
  /* ---- Status bar ---- */
  .status-bar {
    background: #0d1629; border-bottom: 1px solid var(--border);
    padding: 6px 24px; font-size: .75rem; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; }
  .status-dot.live { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  /* ---- Grid ---- */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    padding: 20px 20px;
    max-width: 1600px;
    margin: 0 auto;
  }
  @media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 860px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px)  { .grid { grid-template-columns: 1fr; } }
  /* ---- Card ---- */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px 12px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color .2s, box-shadow .2s;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent-color, #3b82f6);
    opacity: .7;
  }
  .card:hover { border-color: #2e3a5a; box-shadow: 0 4px 20px rgba(0,0,0,.4); }
  /* card header */
  .card-head {
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .sym-block { display: flex; flex-direction: column; gap: 1px; }
  .sym { font-size: 1.3rem; font-weight: 800; color: #fff; letter-spacing: .5px; }
  .company { font-size: .72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .sector-badge {
    font-size: .65rem; font-weight: 600; padding: 2px 7px; border-radius: 20px;
    background: color-mix(in srgb, var(--accent-color, #3b82f6) 15%, transparent);
    color: var(--accent-color, #3b82f6);
    border: 1px solid color-mix(in srgb, var(--accent-color, #3b82f6) 30%, transparent);
    white-space: nowrap;
  }
  /* price row */
  .price-row {
    display: flex; align-items: baseline; gap: 8px;
  }
  .price { font-size: 1.45rem; font-weight: 700; color: #fff; }
  .ytd-badge {
    font-size: .78rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  }
  .ytd-badge.pos { background: rgba(34,197,94,.15); color: var(--green); }
  .ytd-badge.neg { background: rgba(239,68,68,.15); color: var(--red); }
  .ytd-badge.neu { background: rgba(100,116,139,.15); color: var(--muted); }
  /* sparkline */
  .sparkline-wrap {
    height: 52px; width: 100%;
  }
  .sparkline-wrap svg { width: 100%; height: 100%; }
  /* position row */
  .pos-row {
    background: var(--card2); border-radius: 8px; padding: 9px 10px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 14px;
    font-size: .72rem;
  }
  .pos-item { display: flex; flex-direction: column; gap: 1px; }
  .pos-label { color: var(--muted); font-size: .65rem; text-transform: uppercase; letter-spacing: .5px; }
  .pos-value { color: #cbd5e1; font-weight: 600; }
  .pos-value.pos { color: var(--green); }
  .pos-value.neg { color: var(--red); }
  /* status badge */
  .status-badge {
    font-size: .68rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    text-align: center; letter-spacing: .5px; align-self: flex-start;
  }
  .status-TRAILING  { background: rgba(34,197,94,.18);  color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
  .status-PROFIT    { background: rgba(6,182,212,.15);  color: var(--cyan); border: 1px solid rgba(6,182,212,.25); }
  .status-NESTSTOP  { background: rgba(239,68,68,.18);  color: #f87171; border: 1px solid rgba(239,68,68,.3); }
  .status-WATCHING  { background: rgba(100,116,139,.15);color: var(--muted); border: 1px solid rgba(100,116,139,.25); }
  /* loading / error */
  .loading { text-align: center; color: var(--muted); padding: 60px 20px; font-size: .9rem; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--cyan); border-radius: 50%; animation: spin .9s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: var(--red); font-size: .8rem; text-align: center; padding: 40px; }
  /* skeleton */
  .skeleton { background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skel-price { height: 32px; width: 80px; }
  .skel-spark { height: 52px; width: 100%; }
  .skel-pos  { height: 70px; width: 100%; }
  /* filter tabs */
  .filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 14px 20px 2px;
    max-width: 1600px; margin: 0 auto;
  }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 5px 14px; border-radius: 20px; font-size: .75rem; cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: rgba(6,182,212,.12); border-color: var(--cyan); color: var(--cyan);
  }
  /* totals row */
  .totals {
    display: flex; gap: 10px; flex-wrap: wrap;
    padding: 0 20px 14px;
    max-width: 1600px; margin: 0 auto;
  }
  .total-chip {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 14px; font-size: .75rem; color: var(--muted);
  }
  .total-chip b { color: #fff; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">DCA <span>Portfolio</span> Dashboard</div>
    <div class="last-updated" id="last-updated">Initializing…</div>
  </div>
  <div class="summary-row">
    <div class="summary-item">
      <span class="summary-label">Portfolio Value</span>
      <span class="summary-value" id="hdr-total">—</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Cash</span>
      <span class="summary-value" id="hdr-cash">—</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Invested</span>
      <span class="summary-value" id="hdr-invested">—</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Unrealized P&amp;L</span>
      <span class="summary-value" id="hdr-pnl">—</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Day P&amp;L</span>
      <span class="summary-value" id="hdr-daypnl">—</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Positions</span>
      <span class="summary-value" id="hdr-count">—</span>
    </div>
  </div>
</div>

<div class="status-bar">
  <span class="status-dot" id="status-dot"></span>
  <span id="status-text">Connecting to Alpaca…</span>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-sector="all">All</button>
  <button class="filter-btn" data-sector="Crypto Treasury">₿ Crypto</button>
  <button class="filter-btn" data-sector="Energy">⚡ Energy</button>
  <button class="filter-btn" data-sector="Quantum">⚛ Quantum</button>
  <button class="filter-btn" data-sector="Semiconductors">💾 Semis</button>
  <button class="filter-btn" data-sector="Photonics">🔬 Photonics</button>
  <button class="filter-btn" data-sector="EV">🚗 EV</button>
  <button class="filter-btn" data-sector="Consumer Tech">🍎 Apple</button>
  <button class="filter-btn" data-sector="Streaming">🎬 Streaming</button>
  <button class="filter-btn" data-sector="Industrial">🏗 Industrial</button>
</div>
<div class="totals" id="totals" style="display:none">
  <div class="total-chip">Showing <b id="shown-count">0</b> of <b>19</b> positions</div>
  <div class="total-chip" id="sector-pnl"></div>
</div>

<div class="grid" id="grid">
  <div class="loading" style="grid-column:1/-1">
    <div class="spinner"></div><br>Loading live portfolio data…
  </div>
</div>

<script>
const ALPACA_KEY    = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const ALPACA_SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const ALPACA_BASE   = 'https://paper-api.alpaca.markets/v2';
const ALPACA_DATA   = 'https://data.alpaca.markets';
const YEAR_START    = '2026-01-02T00:00:00Z';

const STOCK_META = [{"sym": "STRC", "name": "Strategy Inc", "sector": "Crypto Treasury", "color": "#f7931a", "icon": "₿"}, {"sym": "MSTR", "name": "MicroStrategy", "sector": "Crypto Treasury", "color": "#f7931a", "icon": "₿"}, {"sym": "GEV", "name": "GE Vernova", "sector": "Energy", "color": "#22c55e", "icon": "⚡"}, {"sym": "BE", "name": "Bloom Energy", "sector": "Energy", "color": "#22c55e", "icon": "⚡"}, {"sym": "KGS", "name": "Kodiak Gas", "sector": "Energy", "color": "#22c55e", "icon": "⚡"}, {"sym": "QBTS", "name": "D-Wave Quantum", "sector": "Quantum", "color": "#a855f7", "icon": "⚛"}, {"sym": "IONQ", "name": "IonQ", "sector": "Quantum", "color": "#a855f7", "icon": "⚛"}, {"sym": "QUBT", "name": "Quantum Computing", "sector": "Quantum", "color": "#a855f7", "icon": "⚛"}, {"sym": "SNDK", "name": "SanDisk", "sector": "Semiconductors", "color": "#3b82f6", "icon": "💾"}, {"sym": "MU", "name": "Micron Technology", "sector": "Semiconductors", "color": "#3b82f6", "icon": "💾"}, {"sym": "WDC", "name": "Western Digital", "sector": "Semiconductors", "color": "#3b82f6", "icon": "💾"}, {"sym": "MRVL", "name": "Marvell Technology", "sector": "Semiconductors", "color": "#3b82f6", "icon": "💾"}, {"sym": "ALMU", "name": "Aeluma Inc", "sector": "Semiconductors", "color": "#3b82f6", "icon": "💾"}, {"sym": "IPGP", "name": "IPG Photonics", "sector": "Photonics", "color": "#06b6d4", "icon": "🔬"}, {"sym": "POET", "name": "POET Technologies", "sector": "Photonics", "color": "#06b6d4", "icon": "🔬"}, {"sym": "TSLA", "name": "Tesla", "sector": "EV", "color": "#ef4444", "icon": "🚗"}, {"sym": "AAPL", "name": "Apple", "sector": "Consumer Tech", "color": "#64748b", "icon": "🍎"}, {"sym": "NFLX", "name": "Netflix", "sector": "Streaming", "color": "#ec4899", "icon": "🎬"}, {"sym": "CAT", "name": "Caterpillar", "sector": "Industrial", "color": "#f59e0b", "icon": "🏗"}];

const SECTOR_COLORS = {
  "Crypto Treasury":  "#f7931a",
  "Energy":           "#22c55e",
  "Quantum":          "#a855f7",
  "Semiconductors":   "#3b82f6",
  "Photonics":        "#06b6d4",
  "EV":               "#ef4444",
  "Consumer Tech":    "#64748b",
  "Streaming":        "#ec4899",
  "Industrial":       "#f59e0b",
};

let state = {
  positions: {},
  bars: {},
  account: null,
  activeSector: 'all',
};

async function alpacaFetch(url, isData=false) {
  const base = isData ? ALPACA_DATA : ALPACA_BASE;
  const r = await fetch(base + url, {
    headers: {
      'APCA-API-KEY-ID': ALPACA_KEY,
      'APCA-API-SECRET-KEY': ALPACA_SECRET,
    }
  });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${url}`);
  return r.json();
}

function fmt(n, dec=2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', {minimumFractionDigits: dec, maximumFractionDigits: dec});
}
function fmtDollar(n) { return n >= 0 ? '+$' + fmt(Math.abs(n)) : '-$' + fmt(Math.abs(n)); }
function fmtPct(n) { return (n >= 0 ? '+' : '') + fmt(n) + '%'; }

function buildSparkline(closes, color) {
  if (!closes || closes.length < 2) return '<svg viewBox="0 0 100 40"><text x="50" y="24" text-anchor="middle" fill="#64748b" font-size="9">no data</text></svg>';
  const mn = Math.min(...closes), mx = Math.max(...closes), rng = mx - mn || 1;
  const w = 100, h = 40, pad = 2;
  const pts = closes.map((v, i) => {
    const x = pad + (i / (closes.length - 1)) * (w - 2*pad);
    const y = h - pad - ((v - mn) / rng) * (h - 2*pad);
    return [x, y];
  });
  const pathD = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const areaD = pathD + ` L${pts[pts.length-1][0].toFixed(1)},${(h-pad).toFixed(1)} L${pad},{${(h-pad).toFixed(1)}} Z`;
  const gradId = 'g' + Math.random().toString(36).slice(2);
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <path d="${areaD}" fill="url(#${gradId})"/>
    <path d="${pathD}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${pts[pts.length-1][0].toFixed(1)}" cy="${pts[pts.length-1][1].toFixed(1)}" r="2.5" fill="${color}"/>
  </svg>`;
}

function statusBadge(plpc) {
  if (plpc >= 10)  return ['TRAILING STOP', 'TRAILING'];
  if (plpc <= -8)  return ['NEAR STOP ⚠', 'NESTSTOP'];
  if (plpc > 0)    return ['IN PROFIT', 'PROFIT'];
  return ['WATCHING', 'WATCHING'];
}

function renderCard(meta, pos, bars) {
  const color = meta.color;
  const closes = (bars || []).map(b => b.c);
  const ytdStart = closes[0] || null;
  const curPrice = pos ? parseFloat(pos.current_price) : (closes[closes.length-1] || null);
  const ytdPct = (ytdStart && curPrice) ? ((curPrice - ytdStart) / ytdStart * 100) : null;
  const ytdPos = ytdPct === null ? 'neu' : (ytdPct >= 0 ? 'pos' : 'neg');
  const sparkColor = ytdPct === null ? '#64748b' : (ytdPct >= 0 ? '#22c55e' : '#ef4444');

  let plpc = pos ? parseFloat(pos.unrealized_plpc) * 100 : null;
  let qty = pos ? parseFloat(pos.qty) : null;
  let avgCost = pos ? parseFloat(pos.avg_entry_price) : null;
  let stopPrice = avgCost ? avgCost * 0.9 : null;
  let mktValue = pos ? parseFloat(pos.market_value) : null;
  let unrealPnl = pos ? parseFloat(pos.unrealized_pl) : null;

  const [badgeText, badgeClass] = pos ? statusBadge(plpc) : ['NO POSITION', 'WATCHING'];

  const posBlock = pos ? `
    <div class="pos-row">
      <div class="pos-item">
        <span class="pos-label">Shares</span>
        <span class="pos-value">${fmt(qty, qty % 1 === 0 ? 0 : 4)}</span>
      </div>
      <div class="pos-item">
        <span class="pos-label">Avg Cost</span>
        <span class="pos-value">$${fmt(avgCost)}</span>
      </div>
      <div class="pos-item">
        <span class="pos-label">P&amp;L</span>
        <span class="pos-value ${plpc >= 0 ? 'pos' : 'neg'}">${fmtPct(plpc)}</span>
      </div>
      <div class="pos-item">
        <span class="pos-label">Stop (${(((curPrice||0) - stopPrice)/stopPrice*100).toFixed(1)}%)</span>
        <span class="pos-value">$${fmt(stopPrice)}</span>
      </div>
      <div class="pos-item">
        <span class="pos-label">Value</span>
        <span class="pos-value">$${fmt(mktValue)}</span>
      </div>
      <div class="pos-item">
        <span class="pos-label">Unreal P&amp;L</span>
        <span class="pos-value ${unrealPnl >= 0 ? 'pos' : 'neg'}">${fmtDollar(unrealPnl)}</span>
      </div>
    </div>` : `<div class="pos-row" style="height:70px;display:flex;align-items:center;justify-content:center">
      <span style="color:var(--muted);font-size:.75rem">No open position</span></div>`;

  return `
  <div class="card" style="--accent-color:${color}" data-sector="${meta.sector}" data-sym="${meta.sym}">
    <div class="card-head">
      <div class="sym-block">
        <span class="sym">${meta.sym}</span>
        <span class="company">${meta.name}</span>
      </div>
      <span class="sector-badge" style="--accent-color:${color}">${meta.icon} ${meta.sector}</span>
    </div>
    <div class="price-row">
      <span class="price">${curPrice ? '$${fmt(curPrice)}' : '—'}</span>
      ${ytdPct !== null ? `<span class="ytd-badge ${ytdPos}">${fmtPct(ytdPct)} YTD</span>` : ''}
    </div>
    <div class="sparkline-wrap">${buildSparkline(closes, sparkColor)}</div>
    ${posBlock}
    <span class="status-badge status-${badgeClass}">${badgeText}</span>
  </div>`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const sector = state.activeSector;

  let visible = STOCK_META.filter(m => sector === 'all' || m.sector === sector);
  grid.innerHTML = visible.map(meta => {
    const pos = state.positions[meta.sym];
    const bars = state.bars[meta.sym];
    return renderCard(meta, pos, bars);
  }).join('');

  document.getElementById('shown-count').textContent = visible.length;
  document.getElementById('totals').style.display = 'flex';

  if (sector !== 'all') {
    const sectorPos = visible.filter(m => state.positions[m.sym]);
    const sectorPnl = sectorPos.reduce((s, m) => s + parseFloat(state.positions[m.sym].unrealized_pl || 0), 0);
    document.getElementById('sector-pnl').innerHTML =
      `Sector P&amp;L: <b style="color:${sectorPnl >= 0 ? '#22c55e' : '#ef4444'}">${fmtDollar(sectorPnl)}</b>`;
  } else {
    document.getElementById('sector-pnl').innerHTML = '';
  }
}

function setStatus(live, msg) {
  document.getElementById('status-dot').className = 'status-dot' + (live ? ' live' : '');
  document.getElementById('status-text').textContent = msg;
}

async function loadData() {
  setStatus(false, 'Fetching account…');

  // Account
  try {
    const acc = await alpacaFetch('/account');
    state.account = acc;
    const portValue = parseFloat(acc.portfolio_value);
    const cash = parseFloat(acc.cash);
    const equity = parseFloat(acc.equity);
    const dayPnl = parseFloat(acc.equity) - parseFloat(acc.last_equity);
    document.getElementById('hdr-total').textContent    = '$' + fmt(portValue);
    document.getElementById('hdr-cash').textContent     = '$' + fmt(cash);
    document.getElementById('hdr-daypnl').textContent   = fmtDollar(dayPnl);
    document.getElementById('hdr-daypnl').className = 'summary-value ' + (dayPnl >= 0 ? 'pos' : 'neg');
  } catch(e) {
    setStatus(false, 'Error loading account: ' + e.message);
  }

  // Positions
  setStatus(false, 'Fetching positions…');
  try {
    const positions = await alpacaFetch('/positions');
    positions.forEach(p => { state.positions[p.symbol] = p; });

    const invested = positions.reduce((s, p) => s + parseFloat(p.cost_basis), 0);
    const unrealPnl = positions.reduce((s, p) => s + parseFloat(p.unrealized_pl), 0);
    document.getElementById('hdr-invested').textContent = '$' + fmt(invested);
    document.getElementById('hdr-pnl').textContent      = fmtDollar(unrealPnl);
    document.getElementById('hdr-pnl').className        = 'summary-value ' + (unrealPnl >= 0 ? 'pos' : 'neg');
    document.getElementById('hdr-count').textContent    = positions.length;
  } catch(e) {
    setStatus(false, 'Error loading positions: ' + e.message);
  }

  // YTD bars
  setStatus(false, 'Fetching YTD price history…');
  const syms = STOCK_META.map(s => s.sym).join(',');
  try {
    let next = `/v2/stocks/bars?symbols=${syms}&timeframe=1Day&start=${YEAR_START}&limit=10000&feed=iex&adjustment=raw`;
    while (next) {
      const data = await fetch(ALPACA_DATA + next, {
        headers: {
          'APCA-API-KEY-ID': ALPACA_KEY,
          'APCA-API-SECRET-KEY': ALPACA_SECRET,
        }
      });
      if (!data.ok) throw new Error(data.status);
      const json = await data.json();
      Object.entries(json.bars || {}).forEach(([sym, bars]) => {
        state.bars[sym] = (state.bars[sym] || []).concat(bars);
      });
      next = json.next_page_token ? `/v2/stocks/bars?symbols=${syms}&timeframe=1Day&start=${YEAR_START}&limit=10000&feed=iex&adjustment=raw&page_token=${json.next_page_token}` : null;
    }
  } catch(e) {
    setStatus(false, 'Warning: bars error — ' + e.message);
  }

  setStatus(true, 'Live · Last refresh: ' + new Date().toLocaleTimeString());
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleString();
  renderGrid();
}

// Sector filter
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.activeSector = btn.dataset.sector;
  renderGrid();
});

// Boot
loadData().catch(e => {
  document.getElementById('grid').innerHTML = `<div class="err" style="grid-column:1/-1">
    <b>Failed to load data:</b><br>${e.message}<br><br>
    <small>Make sure pop-ups / CORS are allowed for this page and your Alpaca credentials are valid.</small>
  </div>`;
  setStatus(false, 'Error — see grid for details');
});

// Auto-refresh every 60 min
setTimeout(() => location.reload(), 60 * 60 * 1000);
</script>
</body>
</html>
