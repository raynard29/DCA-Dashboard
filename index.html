<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3600">
  <title>DCA Portfolio Dashboard</title>
  <style>
    :root {
      --bg: #0a0d14;
      --card: #111520;
      --card2: #141929;
      --border: #1e2a40;
      --border2: #253350;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 24px 28px 20px;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #1e3a5f, #1e4d8c);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .header-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .refresh-badge {
      font-size: 11px; color: var(--muted);
      background: var(--card2); border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 20px;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: var(--green); border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
      display: inline-block; margin-right: 5px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── STATS GRID ─────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; } }

    .stat-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: var(--accent, transparent);
      opacity: 0.6;
    }
    .stat-label {
      font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 8px; font-weight: 600;
    }
    .stat-value { font-size: 24px; font-weight: 800; letter-spacing: -0.8px; line-height: 1; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .positive { color: var(--green); }
    .negative { color: var(--red); }

    /* ── MAIN CONTENT ───────────────────────── */
    .main { padding: 24px 28px; }
    @media (max-width: 600px) { .main { padding: 16px; } }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .section-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1.2px;
    }
    .count-badge {
      font-size: 11px; color: var(--muted);
      background: var(--card2); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
    }

    /* ── CARD GRID ──────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 1400px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px)  { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .cards-grid { grid-template-columns: 1fr 1fr; gap: 10px; } }

    /* ── STOCK CARD ─────────────────────────── */
    .stock-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      cursor: default;
    }
    .stock-card:hover {
      border-color: var(--border2);
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .stock-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent);
      border-radius: 14px 14px 0 0;
    }
    .stock-card.no-pos { opacity: 0.72; }

    .card-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 12px;
    }
    .ticker {
      font-size: 20px; font-weight: 900;
      letter-spacing: -0.5px; line-height: 1;
    }
    .company {
      font-size: 10px; color: var(--muted); margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 110px;
    }
    .sector-badge {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 3px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }

    .price-row {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 10px; flex-wrap: wrap;
    }
    .price { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .ytd-badge {
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
    }
    .ytd-pos { background: rgba(34,197,94,0.15); color: var(--green); }
    .ytd-neg { background: rgba(239,68,68,0.15); color: var(--red); }

    /* Sparkline */
    .sparkline-wrap {
      margin: 8px -2px 10px;
      height: 50px; overflow: hidden;
    }
    .sparkline-wrap svg { width: 100%; height: 50px; display: block; }

    /* Position rows */
    .divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    .position-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px 4px;
    }
    .pos-item label {
      font-size: 9px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      display: block; margin-bottom: 2px;
    }
    .pos-item span { font-size: 12px; font-weight: 700; }

    .status-badge {
      display: inline-block; margin-top: 11px;
      font-size: 9px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 4px 10px; border-radius: 10px;
    }
    .st-trailing   { background: rgba(168,85,247,0.18); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
    .st-near-stop  { background: rgba(239,68,68,0.18);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .st-in-profit  { background: rgba(34,197,94,0.15);  color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .st-watching   { background: rgba(100,116,139,0.15); color: var(--muted); border: 1px solid rgba(100,116,139,0.25); }

    /* ── LOADING / ERROR ────────────────────── */
    .loading-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; gap: 16px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--muted); font-size: 14px; }

    .error-wrap { padding: 40px 28px; }
    .error-card {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px; padding: 20px;
      color: #f87171; font-size: 13px; line-height: 1.6;
    }
    .error-card strong { font-size: 15px; display: block; margin-bottom: 8px; }
    .retry-btn {
      margin-top: 14px; padding: 8px 18px;
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      color: #f87171; border-radius: 8px; cursor: pointer;
      font-size: 12px; font-weight: 600;
    }
    .retry-btn:hover { background: rgba(239,68,68,0.25); }

    /* ── FOOTER ─────────────────────────────── */
    .footer {
      padding: 20px 28px; text-align: center;
      color: var(--muted); font-size: 11px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
<div id="app">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-text">Fetching live portfolio data&hellip;</div>
  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const APCA_KEY    = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const APCA_SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const TRADING_URL = 'https://paper-api.alpaca.markets/v2';
const DATA_URL    = 'https://data.alpaca.markets';

const STOCKS = {
  STRC: { name:'Strategy Inc',       sector:'Crypto Treasury', color:'#f7931a' },
  MSTR: { name:'MicroStrategy',      sector:'Crypto Treasury', color:'#f7931a' },
  GEV:  { name:'GE Vernova',         sector:'Energy',          color:'#22c55e' },
  BE:   { name:'Bloom Energy',       sector:'Energy',          color:'#22c55e' },
  KGS:  { name:'Kodiak Gas',         sector:'Energy',          color:'#22c55e' },
  QBTS: { name:'D-Wave Quantum',     sector:'Quantum',         color:'#a855f7' },
  IONQ: { name:'IonQ',               sector:'Quantum',         color:'#a855f7' },
  QUBT: { name:'Quantum Computing',  sector:'Quantum',         color:'#a855f7' },
  SNDK: { name:'SanDisk',            sector:'Semiconductors',  color:'#3b82f6' },
  MU:   { name:'Micron Technology',  sector:'Semiconductors',  color:'#3b82f6' },
  WDC:  { name:'Western Digital',    sector:'Semiconductors',  color:'#3b82f6' },
  MRVL: { name:'Marvell Technology', sector:'Semiconductors',  color:'#3b82f6' },
  ALMU: { name:'Aeluma Inc',         sector:'Semiconductors',  color:'#3b82f6' },
  IPGP: { name:'IPG Photonics',      sector:'Photonics',       color:'#06b6d4' },
  POET: { name:'POET Technologies',  sector:'Photonics',       color:'#06b6d4' },
  TSLA: { name:'Tesla',              sector:'EV',              color:'#ef4444' },
  AAPL: { name:'Apple',              sector:'Consumer Tech',   color:'#64748b' },
  NFLX: { name:'Netflix',            sector:'Streaming',       color:'#ec4899' },
  CAT:  { name:'Caterpillar',        sector:'Industrial',      color:'#f59e0b' },
};

const SYMBOLS = Object.keys(STOCKS);

// ── Formatters ───────────────────────────────────────────────────────────────
function fmtUSD(v, dec = 2) {
  if (v == null || isNaN(v)) return '—';
  const abs = Math.abs(v), sign = v < 0 ? '-$' : '$';
  if (abs >= 1e9) return sign + (abs/1e9).toFixed(1) + 'B';
  if (abs >= 1e6) return sign + (abs/1e6).toFixed(1) + 'M';
  if (abs >= 1e3) return sign + (abs/1e3).toFixed(1) + 'K';
  return sign + abs.toFixed(dec);
}
function fmtPrice(v) {
  if (v == null || isNaN(v)) return '—';
  return '$' + Number(v).toLocaleString('en-US', {minimumFractionDigits: v < 10 ? 4 : 2, maximumFractionDigits: v < 10 ? 4 : 2});
}
function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}
function fmtShares(v) {
  if (v == null || isNaN(v)) return '—';
  return Number(v) % 1 === 0 ? Number(v).toFixed(0) : Number(v).toFixed(4);
}

// ── Sparkline SVG ────────────────────────────────────────────────────────────
function sparkline(prices, color) {
  if (!prices || prices.length < 2)
    return '<svg viewBox="0 0 200 50"><text x="50%" y="50%" text-anchor="middle" fill="#334155" font-size="11" dy=".3em">No data</text></svg>';

  const W = 200, H = 46, PAD = 2;
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;

  const pts = prices.map((p, i) => {
    const x = PAD + (i / (prices.length - 1)) * (W - PAD * 2);
    const y = H - PAD - ((p - min) / range) * (H - PAD * 2);
    return [x.toFixed(1), y.toFixed(1)];
  });

  const polyPts = pts.map(([x, y]) => `${x},${y}`).join(' ');
  const fillPts = `${PAD},${H} ` + pts.map(([x, y]) => `${x},${y}`).join(' ') + ` ${W - PAD},${H}`;
  const gid = 'g' + color.replace('#', '') + Math.random().toString(36).slice(2, 6);

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="${color}" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <polygon points="${fillPts}" fill="url(#${gid})"/>
    <polyline points="${polyPts}" fill="none" stroke="${color}" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ── Status badge ─────────────────────────────────────────────────────────────
function statusBadge(plpc) {
  if (plpc >= 10)   return ['TRAILING STOP', 'st-trailing'];
  if (plpc <= -8)   return ['NEAR STOP',     'st-near-stop'];
  if (plpc  > 0)    return ['IN PROFIT',     'st-in-profit'];
  return ['WATCHING', 'st-watching'];
}

// ── Render Header ─────────────────────────────────────────────────────────────
function renderHeader(account, positions) {
  const portVal    = parseFloat(account.portfolio_value || 0);
  const cash       = parseFloat(account.cash || 0);
  const buyPower   = parseFloat(account.buying_power || 0);
  const totalCost  = positions.reduce((s, p) => s + parseFloat(p.cost_basis || 0), 0);
  const totalPL    = positions.reduce((s, p) => s + parseFloat(p.unrealized_pl || 0), 0);
  const plPct      = totalCost > 0 ? (totalPL / totalCost) * 100 : 0;
  const plCls      = totalPL >= 0 ? 'positive' : 'negative';
  const heldCount  = positions.length;

  const now = new Date().toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric',year:'numeric'});

  return `
  <div class="header">
    <div class="header-top">
      <div class="header-brand">
        <div class="brand-icon">📈</div>
        <div>
          <div class="header-title">DCA Portfolio Dashboard</div>
          <div class="header-subtitle">${heldCount} active positions &middot; ${now}</div>
        </div>
      </div>
      <div class="header-right">
        <span class="refresh-badge"><span class="live-dot"></span>Live &middot; 1h refresh</span>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card" style="--accent:#3b82f6">
        <div class="stat-label">Portfolio Value</div>
        <div class="stat-value">${fmtUSD(portVal)}</div>
        <div class="stat-sub">Total equity</div>
      </div>
      <div class="stat-card" style="--accent:#22c55e">
        <div class="stat-label">Cash Available</div>
        <div class="stat-value">${fmtUSD(cash)}</div>
        <div class="stat-sub">Buying power: ${fmtUSD(buyPower)}</div>
      </div>
      <div class="stat-card" style="--accent:#f59e0b">
        <div class="stat-label">Total Invested</div>
        <div class="stat-value">${fmtUSD(totalCost)}</div>
        <div class="stat-sub">${heldCount} holdings</div>
      </div>
      <div class="stat-card" style="--accent:${totalPL>=0?'#22c55e':'#ef4444'}">
        <div class="stat-label">Unrealized P&amp;L</div>
        <div class="stat-value ${plCls}">${fmtUSD(totalPL)}</div>
        <div class="stat-sub ${plCls}">${fmtPct(plPct)} total return</div>
      </div>
    </div>
  </div>`;
}

// ── Render one stock card ─────────────────────────────────────────────────────
function renderCard(sym, pos, bars) {
  const info   = STOCKS[sym];
  const color  = info.color;
  const prices = (bars || []).map(b => b.c);

  const ytdStart = prices[0] || 0;
  const curPrice = pos ? parseFloat(pos.current_price) : (prices[prices.length - 1] || 0);
  const ytdPct   = ytdStart ? ((curPrice - ytdStart) / ytdStart) * 100 : null;
  const lineColor = (ytdPct == null || ytdPct >= 0) ? '#22c55e' : '#ef4444';
  const sparkSVG  = sparkline(prices, lineColor);

  const ytdBadge = ytdPct != null
    ? `<span class="ytd-badge ${ytdPct >= 0 ? 'ytd-pos' : 'ytd-neg'}">${fmtPct(ytdPct)} YTD</span>`
    : '';

  let posRows = '', badge = '';
  if (pos) {
    const qty    = parseFloat(pos.qty);
    const avg    = parseFloat(pos.avg_entry_price);
    const plpc   = parseFloat(pos.unrealized_plpc) * 100;
    const stop   = avg * 0.9;
    const plCls  = plpc >= 0 ? 'positive' : 'negative';
    const [stTxt, stCls] = statusBadge(plpc);

    posRows = `
      <hr class="divider">
      <div class="position-grid">
        <div class="pos-item"><label>Shares</label><span>${fmtShares(qty)}</span></div>
        <div class="pos-item"><label>Avg Cost</label><span>${fmtPrice(avg)}</span></div>
        <div class="pos-item"><label>P&amp;L</label><span class="${plCls}">${fmtPct(plpc)}</span></div>
        <div class="pos-item"><label>Stop Price</label><span>${fmtPrice(stop)}</span></div>
      </div>`;
    badge = `<div class="status-badge ${stCls}">${stTxt}</div>`;
  } else {
    posRows = `
      <hr class="divider">
      <div class="position-grid" style="opacity:.5">
        <div class="pos-item" style="grid-column:1/-1"><label>No position</label><span style="color:var(--muted)">—</span></div>
      </div>`;
    badge = `<div class="status-badge st-watching">WATCHING</div>`;
  }

  return `
  <div class="stock-card${pos ? '' : ' no-pos'}" style="--accent:${color}">
    <div class="card-header">
      <div>
        <div class="ticker" style="color:${color}">${sym}</div>
        <div class="company" title="${info.name}">${info.name}</div>
      </div>
      <div class="sector-badge" style="background:${color}1a;color:${color}">${info.sector}</div>
    </div>
    <div class="price-row">
      <span class="price">${curPrice ? fmtPrice(curPrice) : '—'}</span>
      ${ytdBadge}
    </div>
    <div class="sparkline-wrap">${sparkSVG}</div>
    ${posRows}
    ${badge}
  </div>`;
}

// ── Fetch helpers ─────────────────────────────────────────────────────────────
const APCAH = { 'APCA-API-KEY-ID': APCA_KEY, 'APCA-API-SECRET-KEY': APCA_SECRET };

async function apca(url) {
  const r = await fetch(url, { headers: APCAH });
  if (!r.ok) { const t = await r.text(); throw new Error(`${r.status}: ${t.slice(0,200)}`); }
  return r.json();
}

// ── Main render ───────────────────────────────────────────────────────────────
async function load() {
  const app = document.getElementById('app');
  try {
    const ytdStart = new Date().getFullYear() + '-01-02T00:00:00Z';
    const syms     = SYMBOLS.join(',');

    const [account, positions, barsResp] = await Promise.all([
      apca(`${TRADING_URL}/account`),
      apca(`${TRADING_URL}/positions`),
      apca(`${DATA_URL}/v2/stocks/bars?symbols=${syms}&timeframe=1Day&start=${ytdStart}&limit=10000&feed=iex&adjustment=raw`)
    ]);

    const posMap  = Object.fromEntries(positions.map(p => [p.symbol, p]));
    const barsMap = barsResp.bars || {};

    // sort: positions with holdings first, then alphabetical
    const sorted = [...SYMBOLS].sort((a, b) => {
      const ha = !!posMap[a], hb = !!posMap[b];
      if (ha !== hb) return hb - ha;
      return a.localeCompare(b);
    });

    const header  = renderHeader(account, positions);
    const cards   = sorted.map(s => renderCard(s, posMap[s], barsMap[s])).join('');
    const held    = positions.length;
    const updated = new Date().toLocaleString('en-US', {
      month:'short', day:'numeric', year:'numeric',
      hour:'2-digit', minute:'2-digit', timeZoneName:'short'
    });

    app.innerHTML = `
      ${header}
      <div class="main">
        <div class="section-header">
          <div class="section-title">Holdings &amp; Watchlist</div>
          <div class="count-badge">${held} / ${SYMBOLS.length} positions held</div>
        </div>
        <div class="cards-grid">${cards}</div>
      </div>
      <div class="footer">
        Last updated: ${updated} &nbsp;&middot;&nbsp; Auto-refreshes every hour &nbsp;&middot;&nbsp; Paper trading account
      </div>`;

  } catch (err) {
    console.error(err);
    app.innerHTML = `
      <div class="header">
        <div class="header-top">
          <div class="header-brand">
            <div class="brand-icon">📈</div>
            <div>
              <div class="header-title">DCA Portfolio Dashboard</div>
              <div class="header-subtitle">Failed to load</div>
            </div>
          </div>
        </div>
      </div>
      <div class="error-wrap">
        <div class="error-card">
          <strong>Could not fetch portfolio data</strong>
          ${err.message}<br><br>
          This may be a CORS issue if loaded from a local file. Open via GitHub Pages URL or check browser console for details.
          <br><button class="retry-btn" onclick="location.reload()">Retry</button>
        </div>
      </div>`;
  }
}

load();
</script>
</body>
</html>
