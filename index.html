<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3600">
  <title>DCA Portfolio Dashboard</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0d14; --surf:#111520; --surf2:#161c2e;
      --bdr:#1e2535; --bdr2:#2a3550;
      --tx:#e2e8f0; --tx2:#94a3b8; --tx3:#475569;
      --green:#22c55e; --red:#ef4444; --yellow:#eab308;
    }
    body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;min-height:100vh}

    /* ── HEADER ── */
    .hdr{
      background:linear-gradient(180deg,#0d1221 0%,var(--bg) 100%);
      border-bottom:1px solid var(--bdr);
      padding:1.4rem 2rem 1.2rem;
      position:sticky;top:0;z-index:10;
      backdrop-filter:blur(12px);
    }
    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
    .brand{display:flex;align-items:center;gap:.75rem}
    .brand-icon{
      width:38px;height:38px;border-radius:9px;
      background:linear-gradient(135deg,#3b82f6,#a855f7);
      display:flex;align-items:center;justify-content:center;font-size:20px;
    }
    .brand h1{
      font-size:1.2rem;font-weight:800;letter-spacing:-.02em;
      background:linear-gradient(135deg,#e2e8f0,#94a3b8);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .ts{font-size:.7rem;color:var(--tx3);display:flex;align-items:center;gap:.35rem}
    .live{display:inline-block;width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem}
    .sc{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:.9rem 1.1rem}
    .sc-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:.35rem}
    .sc-val{font-size:1.45rem;font-weight:800;font-variant-numeric:tabular-nums}
    .sc-sub{font-size:.72rem;color:var(--tx2);margin-top:.15rem}
    .pos{color:var(--green)}.neg{color:var(--red)}

    /* ── MAIN ── */
    .main{padding:1.4rem 2rem}
    .sec-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:.9rem}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem}

    /* ── CARD ── */
    .card{
      background:var(--surf);border:1px solid var(--bdr);border-radius:13px;
      padding:.95rem;position:relative;overflow:hidden;
      transition:border-color .2s,transform .18s;cursor:default;
    }
    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2.5px;
      background:var(--ac,transparent);
    }
    .card:hover{border-color:var(--bdr2);transform:translateY(-2px)}
    .card.no-pos{opacity:.55}

    .ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.45rem}
    .csym{font-size:1.1rem;font-weight:900;color:var(--tx);line-height:1}
    .cname{font-size:.65rem;color:var(--tx3);margin-top:.18rem}
    .sbadge{
      font-size:.55rem;font-weight:700;padding:.18rem .45rem;
      border-radius:20px;border:1px solid;opacity:.85;white-space:nowrap;
    }

    .prow{display:flex;align-items:baseline;gap:.4rem;margin:.35rem 0}
    .cprice{font-size:1.05rem;font-weight:800;font-variant-numeric:tabular-nums}
    .ytd{
      font-size:.65rem;font-weight:700;padding:.12rem .35rem;border-radius:4px;
    }
    .ytd.pos{background:rgba(34,197,94,.15);color:#22c55e}
    .ytd.neg{background:rgba(239,68,68,.15);color:#ef4444}

    .spark{width:100%;height:42px;margin:.35rem 0}
    .spark svg{width:100%;height:42px;overflow:visible}

    hr.div{border:none;border-top:1px solid var(--bdr);margin:.45rem 0}

    .dg{display:grid;grid-template-columns:1fr 1fr;gap:.25rem .5rem}
    .di{display:flex;flex-direction:column}
    .dl{font-size:.58rem;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3)}
    .dv{font-size:.78rem;font-weight:700;color:var(--tx2);font-variant-numeric:tabular-nums}
    .dv.pos{color:var(--green)}.dv.neg{color:var(--red)}

    .cf{margin-top:.55rem}
    .stbadge{
      display:inline-flex;align-items:center;gap:.25rem;
      font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
      padding:.22rem .55rem;border-radius:20px;
    }
    .stbadge.trailing{background:rgba(34,197,94,.18);color:#22c55e}
    .stbadge.in-profit{background:rgba(74,222,128,.1);color:#4ade80}
    .stbadge.near-stop{background:rgba(239,68,68,.18);color:#ef4444}
    .stbadge.watching{background:rgba(100,116,139,.13);color:#94a3b8}

    /* ── LOADING / ERROR ── */
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:65vh;gap:1.5rem}
    .spin{width:42px;height:42px;border:3px solid var(--bdr);border-top-color:#3b82f6;border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ltxt{color:var(--tx2);font-size:.9rem}
    .errc{
      background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);
      border-radius:13px;padding:1.75rem 2rem;max-width:520px;text-align:center;
    }
    .errc h3{color:#ef4444;margin-bottom:.6rem;font-size:1.05rem}
    .errc p{color:var(--tx2);font-size:.83rem;line-height:1.65}
    .errc .hint{margin-top:.9rem;font-size:.75rem;color:var(--tx3);font-family:monospace;background:var(--surf);border-radius:6px;padding:.5rem .75rem;text-align:left}
    .retry-btn{
      margin-top:1.1rem;padding:.55rem 1.25rem;background:#1e3a8a;color:#93c5fd;
      border:1px solid #2563eb;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;
    }
    .retry-btn:hover{background:#1d4ed8;color:#fff}

    /* ── RESPONSIVE ── */
    @media(max-width:1200px){.grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){
      .hdr{padding:1rem}.main{padding:1rem}
      .stats{grid-template-columns:1fr 1fr;gap:.6rem}
      .sc-val{font-size:1.2rem}
      .grid{grid-template-columns:1fr 1fr;gap:.6rem}
    }
    @media(max-width:380px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="root">
  <div class="loading"><div class="spin"></div><p class="ltxt">Fetching live portfolio data…</p></div>
</div>
<script>
const KEY    = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const BROKER = 'https://paper-api.alpaca.markets/v2';
const DATA   = 'https://data.alpaca.markets';
const META   = {"STRC": {"symbol": "STRC", "name": "Strategy Inc", "sector": "Crypto Treasury", "color": "#f7931a"}, "MSTR": {"symbol": "MSTR", "name": "MicroStrategy", "sector": "Crypto Treasury", "color": "#f7931a"}, "GEV": {"symbol": "GEV", "name": "GE Vernova", "sector": "Energy", "color": "#22c55e"}, "BE": {"symbol": "BE", "name": "Bloom Energy", "sector": "Energy", "color": "#22c55e"}, "KGS": {"symbol": "KGS", "name": "Kodiak Gas", "sector": "Energy", "color": "#22c55e"}, "QBTS": {"symbol": "QBTS", "name": "D-Wave Quantum", "sector": "Quantum", "color": "#a855f7"}, "IONQ": {"symbol": "IONQ", "name": "IonQ", "sector": "Quantum", "color": "#a855f7"}, "QUBT": {"symbol": "QUBT", "name": "Quantum Computing", "sector": "Quantum", "color": "#a855f7"}, "SNDK": {"symbol": "SNDK", "name": "SanDisk", "sector": "Semiconductors", "color": "#3b82f6"}, "MU": {"symbol": "MU", "name": "Micron Technology", "sector": "Semiconductors", "color": "#3b82f6"}, "WDC": {"symbol": "WDC", "name": "Western Digital", "sector": "Semiconductors", "color": "#3b82f6"}, "MRVL": {"symbol": "MRVL", "name": "Marvell Technology", "sector": "Semiconductors", "color": "#3b82f6"}, "ALMU": {"symbol": "ALMU", "name": "Aeluma Inc", "sector": "Semiconductors", "color": "#3b82f6"}, "IPGP": {"symbol": "IPGP", "name": "IPG Photonics", "sector": "Photonics", "color": "#06b6d4"}, "POET": {"symbol": "POET", "name": "POET Technologies", "sector": "Photonics", "color": "#06b6d4"}, "TSLA": {"symbol": "TSLA", "name": "Tesla", "sector": "EV", "color": "#ef4444"}, "AAPL": {"symbol": "AAPL", "name": "Apple", "sector": "Consumer Tech", "color": "#64748b"}, "NFLX": {"symbol": "NFLX", "name": "Netflix", "sector": "Streaming", "color": "#ec4899"}, "CAT": {"symbol": "CAT", "name": "Caterpillar", "sector": "Industrial", "color": "#f59e0b"}};
const SYMS   = 'STRC,MSTR,GEV,BE,KGS,QBTS,IONQ,QUBT,SNDK,MU,WDC,MRVL,ALMU,IPGP,POET,TSLA,AAPL,NFLX,CAT'.split(',');

function aFetch(url) {
  return fetch(url, {
    headers: {'APCA-API-KEY-ID': KEY, 'APCA-API-SECRET-KEY': SECRET}
  }).then(r => {
    if (!r.ok) return r.text().then(t => { throw new Error(t || 'HTTP ' + r.status); });
    return r.json();
  });
}

function $$(n, opts) {
  if (n == null || isNaN(n)) return '—';
  return new Intl.NumberFormat('en-US', Object.assign({style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2}, opts||{})).format(n);
}
function pct(n, decimals) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + parseFloat(n).toFixed(decimals == null ? 2 : decimals) + '%';
}
function shares(n) {
  if (n == null) return '—';
  const f = parseFloat(n);
  return f % 1 === 0 ? f.toFixed(0) : f.toFixed(4);
}

function sparkline(prices, color) {
  if (!prices || prices.length < 2) {
    return '<svg width="100%" height="42" viewBox="0 0 120 42"><line x1="0" y1="21" x2="120" y2="21" stroke="' + color + '44" stroke-width="1.5" stroke-dasharray="5,5"/></svg>';
  }
  const W = 120, H = 38;
  const mn = Math.min.apply(null, prices), mx = Math.max.apply(null, prices);
  const rng = mx - mn || 1;
  const n = prices.length;
  const pts = prices.map(function(p, i) {
    return ((i / (n - 1)) * W).toFixed(1) + ',' + (H - ((p - mn) / rng) * H).toFixed(1);
  });
  const line = pts.join(' ');
  const area = 'M' + pts[0] + ' L' + pts.join(' L') + ' L' + W + ',' + (H + 4) + ' L0,' + (H + 4) + ' Z';
  const gid = 'g' + Math.random().toString(36).slice(2, 8);
  return (
    '<svg width="100%" height="42" viewBox="0 0 ' + W + ' ' + (H + 4) + '" preserveAspectRatio="none">' +
    '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0%" stop-color="' + color + '" stop-opacity="0.28"/>' +
    '<stop offset="100%" stop-color="' + color + '" stop-opacity="0.02"/>' +
    '</linearGradient></defs>' +
    '<path d="' + area + '" fill="url(#' + gid + ')"/>' +
    '<polyline points="' + line + '" fill="none" stroke="' + color + '" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>' +
    '</svg>'
  );
}

function statusBadge(plpc) {
  const v = parseFloat(plpc || 0);
  if (v >= 10)  return {cls: 'trailing',  label: '▲ Trailing'};
  if (v <= -8)  return {cls: 'near-stop', label: '⚠ Near Stop'};
  if (v > 0)    return {cls: 'in-profit', label: '✓ In Profit'};
  return           {cls: 'watching',  label: '◎ Watching'};
}

function card(sym, pos, bars) {
  const m = META[sym] || {name: sym, sector: '—', color: '#64748b'};
  const col = m.color;
  const prices = (bars || []).map(function(b) { return b.c; });
  const ytdPct = prices.length >= 2 ? ((prices[prices.length-1] - prices[0]) / prices[0]) * 100 : null;
  const sparkCol = ytdPct == null ? col : (ytdPct >= 0 ? '#22c55e' : '#ef4444');

  const curP  = pos ? parseFloat(pos.current_price) : (prices.length ? prices[prices.length-1] : null);
  const avg   = pos ? parseFloat(pos.avg_entry_price) : null;
  const qty   = pos ? parseFloat(pos.qty) : null;
  const plp   = pos ? parseFloat(pos.unrealized_plpc) * 100 : null;
  const stop  = avg ? avg * 0.9 : null;
  const st    = statusBadge(plp);

  return (
    '<div class="card' + (pos ? '' : ' no-pos') + '" style="--ac:' + col + '">' +
      '<div class="ch">' +
        '<div><div class="csym">' + sym + '</div><div class="cname">' + m.name + '</div></div>' +
        '<span class="sbadge" style="color:' + col + ';border-color:' + col + '44">' + m.sector + '</span>' +
      '</div>' +
      '<div class="prow">' +
        '<span class="cprice">' + $$(curP) + '</span>' +
        (ytdPct != null ? '<span class="ytd ' + (ytdPct >= 0 ? 'pos' : 'neg') + '">' + pct(ytdPct) + ' YTD</span>' : '') +
      '</div>' +
      '<div class="spark">' + sparkline(prices, sparkCol) + '</div>' +
      '<hr class="div">' +
      '<div class="dg">' +
        '<div class="di"><span class="dl">Shares</span><span class="dv">' + (qty != null ? shares(qty) : '—') + '</span></div>' +
        '<div class="di"><span class="dl">Avg Cost</span><span class="dv">' + $$(avg) + '</span></div>' +
        '<div class="di"><span class="dl">P&amp;L %</span><span class="dv ' + (plp != null ? (plp >= 0 ? 'pos' : 'neg') : '') + '">' + (plp != null ? pct(plp) : '—') + '</span></div>' +
        '<div class="di"><span class="dl">Stop (90%)</span><span class="dv">' + $$(stop) + '</span></div>' +
      '</div>' +
      '<div class="cf"><span class="stbadge ' + st.cls + '">' + st.label + '</span></div>' +
    '</div>'
  );
}

function render(acct, positions, barsMap) {
  const posMap = {};
  (positions || []).forEach(function(p) { posMap[p.symbol] = p; });

  const equity    = parseFloat(acct.equity || 0);
  const cash      = parseFloat(acct.cash || 0);
  const portVal   = parseFloat(acct.portfolio_value || equity);
  const invested  = portVal - cash;

  let totalPL = 0, totalCost = 0;
  (positions || []).forEach(function(p) {
    totalPL   += parseFloat(p.unrealized_pl || 0);
    totalCost += parseFloat(p.cost_basis || 0);
  });
  const plPct = totalCost > 0 ? (totalPL / totalCost) * 100 : 0;

  const now = new Date().toLocaleString('en-US', {
    month:'short', day:'numeric', year:'numeric',
    hour:'numeric', minute:'2-digit', timeZoneName:'short'
  });

  const cards = SYMS.map(function(s) {
    return card(s, posMap[s] || null, barsMap[s] || []);
  }).join('');

  document.getElementById('root').innerHTML =
    '<div class="hdr">' +
      '<div class="hdr-top">' +
        '<div class="brand">' +
          '<div class="brand-icon">📊</div>' +
          '<h1>DCA Portfolio</h1>' +
        '</div>' +
        '<div class="ts"><span class="live"></span>Updated: ' + now + '</div>' +
      '</div>' +
      '<div class="stats">' +
        '<div class="sc"><div class="sc-lbl">Portfolio Value</div><div class="sc-val">' + $$(portVal) + '</div><div class="sc-sub">Total equity</div></div>' +
        '<div class="sc"><div class="sc-lbl">Cash</div><div class="sc-val">' + $$(cash) + '</div><div class="sc-sub">Available buying power</div></div>' +
        '<div class="sc"><div class="sc-lbl">Invested</div><div class="sc-val">' + $$(invested) + '</div><div class="sc-sub">Market value</div></div>' +
        '<div class="sc"><div class="sc-lbl">Unrealized P&amp;L</div><div class="sc-val ' + (totalPL >= 0 ? 'pos' : 'neg') + '">' + $$(totalPL) + '</div><div class="sc-sub">' + pct(plPct) + ' overall</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="main">' +
      '<div class="sec-title">' + SYMS.length + ' Holdings — DCA Watchlist</div>' +
      '<div class="grid">' + cards + '</div>' +
    '</div>';
}

function showError(msg) {
  document.getElementById('root').innerHTML =
    '<div class="loading"><div class="errc">' +
      '<h3>Unable to load portfolio data</h3>' +
      '<p>' + msg + '</p>' +
      '<div class="hint">If you see a CORS error, Alpaca\'s paper API may require a server-side proxy.<br>Try opening this page from a local server or re-run the publisher script.</div>' +
      '<button class="retry-btn" onclick="location.reload()">↺ Retry</button>' +
    '</div></div>';
}

async function main() {
  try {
    const [acct, positions] = await Promise.all([
      aFetch(BROKER + '/account'),
      aFetch(BROKER + '/positions'),
    ]);
    const barsRes = await aFetch(
      DATA + '/v2/stocks/bars?symbols=' + SYMS.join(',') +
      '&timeframe=1Day&start=2026-01-02T00:00:00Z&limit=10000&feed=iex&adjustment=raw'
    );
    render(acct, positions, barsRes.bars || {});
  } catch(e) {
    showError(e.message || String(e));
  }
}

main();
</script>
</body>
</html>
