<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>DCA Portfolio Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0d14;
    --card: #111520;
    --card2: #161b2e;
    --border: #1e2840;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --blue: #3b82f6;
    --purple: #a855f7;
  }
  html { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  body { min-height: 100vh; background: var(--bg); padding-bottom: 40px; }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0d1220 0%, #111827 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px 20px;
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(12px);
  }
  .header-inner { max-width: 1400px; margin: 0 auto; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, #3b82f6, #a855f7); border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .refresh-btn {
    background: var(--card2); border: 1px solid var(--border); color: var(--text);
    padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .refresh-btn:hover { background: #1e2840; border-color: #3b82f6; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .stat-card {
    background: var(--card2); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent, #3b82f6);
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .neutral { color: var(--muted); }

  /* ── Grid ── */
  .grid-wrap { max-width: 1400px; margin: 24px auto; padding: 0 16px; }
  .section-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 12px; padding-left: 4px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  /* ── Stock Card ── */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    cursor: default; position: relative; overflow: hidden;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--c, #3b82f6); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--c, #3b82f6); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .card-left { flex: 1; min-width: 0; }
  .symbol { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--c, #3b82f6); }
  .company { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sector-tag {
    font-size: 10px; padding: 3px 8px; border-radius: 20px; white-space: nowrap;
    background: color-mix(in srgb, var(--c, #3b82f6) 15%, transparent);
    color: var(--c, #3b82f6); border: 1px solid color-mix(in srgb, var(--c, #3b82f6) 30%, transparent);
    flex-shrink: 0; margin-top: 2px;
  }

  .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .price { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .ytd-badge {
    font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 6px;
  }
  .ytd-pos { background: rgba(34,197,94,0.15); color: #22c55e; }
  .ytd-neg { background: rgba(239,68,68,0.15); color: #ef4444; }
  .ytd-flat { background: rgba(100,116,139,0.15); color: #94a3b8; }

  .sparkline-wrap { margin: 8px 0 12px; height: 52px; }
  .sparkline-wrap svg { width: 100%; height: 52px; display: block; }

  .pos-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px;
    padding: 10px 12px; background: rgba(255,255,255,0.03);
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 10px;
  }
  .pos-item { display: flex; flex-direction: column; gap: 2px; }
  .pos-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .pos-val { font-size: 13px; font-weight: 600; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-trailing { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
  .badge-profit  { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
  .badge-stop    { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
  .badge-watch   { background: rgba(100,116,139,0.1); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); }
  .badge-nopos   { background: rgba(245,158,11,0.1);  color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }

  /* loading skeleton */
  .skeleton { background: linear-gradient(90deg, #1a2035 25%, #1e2840 50%, #1a2035 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
  @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }

  .loader-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 200px; gap: 16px; color: var(--muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: #3b82f6;
    border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: #f87171; padding: 16px 20px; border-radius: 10px; margin-bottom: 16px;
    font-size: 14px; display: flex; align-items: center; gap: 10px; }

  .timestamp { font-size: 11px; color: var(--muted); text-align: center; margin-top: 32px; }

  /* ── Responsive ── */
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 760px)  { .grid { grid-template-columns: repeat(2, 1fr); } .price { font-size: 20px; } }
  @media (max-width: 480px)  { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📈</div>
        <div>
          <div class="logo-text">DCA Portfolio</div>
          <div class="logo-sub">Paper Trading · Alpaca Markets</div>
        </div>
      </div>
      <button class="refresh-btn" onclick="init()">
        <span id="refresh-icon">↻</span> Refresh
      </button>
    </div>
    <div class="stats-row" id="stats-row">
      <div class="stat-card" style="--accent:#3b82f6">
        <div class="stat-label">Portfolio Value</div>
        <div class="stat-value" id="s-portfolio">—</div>
        <div class="stat-sub" id="s-portfolio-sub">Loading…</div>
      </div>
      <div class="stat-card" style="--accent:#22c55e">
        <div class="stat-label">Cash</div>
        <div class="stat-value" id="s-cash">—</div>
        <div class="stat-sub" id="s-cash-sub">Buying power</div>
      </div>
      <div class="stat-card" style="--accent:#a855f7">
        <div class="stat-label">Invested</div>
        <div class="stat-value" id="s-invested">—</div>
        <div class="stat-sub" id="s-invested-sub">Market value</div>
      </div>
      <div class="stat-card" style="--accent:#f59e0b">
        <div class="stat-label">Unrealized P&L</div>
        <div class="stat-value" id="s-pnl">—</div>
        <div class="stat-sub" id="s-pnl-sub">Open positions</div>
      </div>
    </div>
  </div>
</div>

<div class="grid-wrap">
  <div id="error-area"></div>
  <div class="section-label" id="section-label">Loading positions…</div>
  <div class="grid" id="grid">
    <div class="loader-wrap" style="grid-column:1/-1">
      <div class="spinner"></div>
      <div>Fetching live data from Alpaca…</div>
    </div>
  </div>
  <div class="timestamp" id="ts">Generated 2026-06-05 18:05 UTC · Auto-refreshes every 60 min</div>
</div>

<script>
const KEY    = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const BASE   = 'https://paper-api.alpaca.markets/v2';
const DATA   = 'https://data.alpaca.markets';

const STOCKS = [
  {symbol:'STRC', name:'Strategy Inc',       sector:'Crypto Treasury', color:'#f7931a'},
  {symbol:'MSTR', name:'MicroStrategy',       sector:'Crypto Treasury', color:'#f7931a'},
  {symbol:'GEV',  name:'GE Vernova',          sector:'Energy',          color:'#22c55e'},
  {symbol:'BE',   name:'Bloom Energy',        sector:'Energy',          color:'#22c55e'},
  {symbol:'KGS',  name:'Kodiak Gas',          sector:'Energy',          color:'#22c55e'},
  {symbol:'QBTS', name:'D-Wave Quantum',      sector:'Quantum',         color:'#a855f7'},
  {symbol:'IONQ', name:'IonQ',                sector:'Quantum',         color:'#a855f7'},
  {symbol:'QUBT', name:'Quantum Computing',   sector:'Quantum',         color:'#a855f7'},
  {symbol:'SNDK', name:'SanDisk',             sector:'Semiconductors',  color:'#3b82f6'},
  {symbol:'MU',   name:'Micron Technology',   sector:'Semiconductors',  color:'#3b82f6'},
  {symbol:'WDC',  name:'Western Digital',     sector:'Semiconductors',  color:'#3b82f6'},
  {symbol:'MRVL', name:'Marvell Technology',  sector:'Semiconductors',  color:'#3b82f6'},
  {symbol:'ALMU', name:'Aeluma Inc',          sector:'Semiconductors',  color:'#3b82f6'},
  {symbol:'IPGP', name:'IPG Photonics',       sector:'Photonics',       color:'#06b6d4'},
  {symbol:'POET', name:'POET Technologies',   sector:'Photonics',       color:'#06b6d4'},
  {symbol:'TSLA', name:'Tesla',               sector:'EV',              color:'#ef4444'},
  {symbol:'AAPL', name:'Apple',               sector:'Consumer Tech',   color:'#64748b'},
  {symbol:'NFLX', name:'Netflix',             sector:'Streaming',       color:'#ec4899'},
  {symbol:'CAT',  name:'Caterpillar',         sector:'Industrial',      color:'#f59e0b'},
];

const SYMS = STOCKS.map(s => s.symbol).join(',');
const START_DATE = '2026-01-02T00:00:00Z';

function fmt$(n) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e6) return (n < 0 ? '-' : '') + '$' + (abs/1e6).toFixed(2) + 'M';
  return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function fmtN(n, dec=2) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toFixed(dec);
}

async function api(url) {
  const r = await fetch(url, {
    headers: {'APCA-API-KEY-ID': KEY, 'APCA-API-SECRET-KEY': SECRET}
  });
  if (!r.ok) throw new Error(`HTTP ${r.status} ${await r.text()}`);
  return r.json();
}

function makeSpark(closes, color, positive) {
  if (!closes || closes.length < 2) return '<svg></svg>';
  const w = 260, h = 52, pad = 4;
  const mn = Math.min(...closes), mx = Math.max(...closes);
  const range = mx - mn || 1;
  const pts = closes.map((v, i) => {
    const x = pad + (i / (closes.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - mn) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const lineColor = positive ? '#22c55e' : '#ef4444';
  const fillColor = positive ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)';
  const path = 'M' + pts.join(' L');
  const last = pts[pts.length - 1].split(',');
  const first = pts[0].split(',');
  const fillPath = path + ` L${last[0]},${h} L${first[0]},${h} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g_${color.slice(1)}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${lineColor}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${fillPath}" fill="url(#g_${color.slice(1)})" />
    <path d="${path}" fill="none" stroke="${lineColor}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function statusBadge(plpc) {
  if (plpc == null) return `<span class="status-badge badge-nopos">◆ No Position</span>`;
  if (plpc >= 10)   return `<span class="status-badge badge-trailing">▲ Trailing</span>`;
  if (plpc <= -8)   return `<span class="status-badge badge-stop">⚠ Near Stop</span>`;
  if (plpc > 0)     return `<span class="status-badge badge-profit">● In Profit</span>`;
  return `<span class="status-badge badge-watch">◌ Watching</span>`;
}

function renderCard(meta, pos, closes) {
  const el = document.getElementById('card-' + meta.symbol);
  if (!el) return;

  const price = pos ? Number(pos.current_price) : (closes?.length ? closes[closes.length-1] : null);
  const ytdStart = closes?.[0];
  const ytdPct = (price && ytdStart) ? ((price - ytdStart) / ytdStart * 100) : null;
  const plpc = pos ? Number(pos.unrealized_plpc) * 100 : null;
  const avgCost = pos ? Number(pos.avg_entry_price) : null;
  const qty = pos ? Number(pos.qty) : null;
  const stopPrice = avgCost ? avgCost * 0.9 : null;
  const mktVal = pos ? Number(pos.market_value) : null;

  const ytdClass = ytdPct == null ? 'ytd-flat' : ytdPct >= 0 ? 'ytd-pos' : 'ytd-neg';
  const ytdLabel = ytdPct != null ? fmtPct(ytdPct) : '—';
  const spark = makeSpark(closes, meta.color, ytdPct >= 0);

  el.innerHTML = `
    <div class="card-accent"></div>
    <div class="card-top">
      <div class="card-left">
        <div class="symbol">${meta.symbol}</div>
        <div class="company">${meta.name}</div>
      </div>
      <span class="sector-tag">${meta.sector}</span>
    </div>
    <div class="price-row">
      <span class="price">${price != null ? fmt$(price) : '—'}</span>
      <span class="ytd-badge ${ytdClass}">${ytdLabel} YTD</span>
    </div>
    <div class="sparkline-wrap">${spark}</div>
    ${pos ? `
    <div class="pos-grid">
      <div class="pos-item">
        <span class="pos-label">Shares</span>
        <span class="pos-val">${fmtN(qty, qty % 1 === 0 ? 0 : 4)}</span>
      </div>
      <div class="pos-item">
        <span class="pos-label">Avg Cost</span>
        <span class="pos-val">${fmt$(avgCost)}</span>
      </div>
      <div class="pos-item">
        <span class="pos-label">P&amp;L %</span>
        <span class="pos-val ${plpc >= 0 ? 'positive' : 'negative'}">${fmtPct(plpc)}</span>
      </div>
      <div class="pos-item">
        <span class="pos-label">Stop (–10%)</span>
        <span class="pos-val">${fmt$(stopPrice)}</span>
      </div>
    </div>` : `<div style="height:10px"></div>`}
    ${statusBadge(plpc)}
  `;
}

function showError(msg) {
  document.getElementById('error-area').innerHTML =
    `<div class="error-banner">⚠ ${msg}</div>`;
}

async function init() {
  document.getElementById('refresh-icon').style.animation = 'spin 0.8s linear infinite';
  document.getElementById('grid').innerHTML =
    `<div class="loader-wrap" style="grid-column:1/-1"><div class="spinner"></div><div>Fetching live data…</div></div>`;
  document.getElementById('error-area').innerHTML = '';

  // Build card shells first
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = STOCKS.map(s => `
    <div class="card" id="card-${s.symbol}" style="--c:${s.color}">
      <div class="card-accent"></div>
      <div class="symbol skeleton" style="width:60px;height:24px;margin-bottom:6px">&nbsp;</div>
      <div class="skeleton" style="width:100%;height:16px;margin-bottom:10px">&nbsp;</div>
      <div class="skeleton" style="width:100%;height:52px;margin-bottom:10px">&nbsp;</div>
    </div>
  `).join('');

  try {
    const [account, positions, barsData] = await Promise.all([
      api(`${BASE}/account`),
      api(`${BASE}/positions`),
      api(`${DATA}/v2/stocks/bars?symbols=${SYMS}&timeframe=1Day&start=${START_DATE}&limit=10000&feed=iex&adjustment=raw`)
    ]);

    // Header stats
    const equity = Number(account.equity);
    const cash   = Number(account.cash);
    const invested = Number(account.long_market_value);
    let totalPnL = 0, totalPnLPct = 0;
    positions.forEach(p => { totalPnL += Number(p.unrealized_pl); });
    totalPnLPct = invested ? (totalPnL / (invested - totalPnL) * 100) : 0;

    document.getElementById('s-portfolio').textContent = fmt$(equity);
    document.getElementById('s-portfolio-sub').textContent = `${account.status} · ${positions.length} holdings`;
    document.getElementById('s-cash').textContent = fmt$(cash);
    document.getElementById('s-cash-sub').textContent = `BP: ${fmt$(Number(account.buying_power))}`;
    document.getElementById('s-invested').textContent = fmt$(invested);
    document.getElementById('s-invested-sub').textContent = `${positions.length} open positions`;

    const pnlEl = document.getElementById('s-pnl');
    pnlEl.textContent = fmt$(totalPnL);
    pnlEl.className = `stat-value ${totalPnL >= 0 ? 'positive' : 'negative'}`;
    document.getElementById('s-pnl-sub').textContent = fmtPct(totalPnLPct) + ' total return';

    // Build position lookup
    const posMap = {};
    positions.forEach(p => posMap[p.symbol] = p);

    // Build bars lookup: symbol -> sorted close prices
    const bars = barsData.bars || {};
    const closesMap = {};
    Object.entries(bars).forEach(([sym, data]) => {
      closesMap[sym] = (data || []).map(b => b.c).filter(Boolean);
    });

    // Render all cards
    STOCKS.forEach(meta => {
      renderCard(meta, posMap[meta.symbol] || null, closesMap[meta.symbol] || []);
    });

    const heldCount = positions.filter(p => STOCKS.find(s => s.symbol === p.symbol)).length;
    document.getElementById('section-label').textContent =
      `${STOCKS.length} Tracked Stocks · ${heldCount} Positions · Last updated ${new Date().toLocaleTimeString()}`;

  } catch(err) {
    showError('Could not load Alpaca data: ' + err.message);
    // Render empty cards
    STOCKS.forEach(meta => renderCard(meta, null, []));
    document.getElementById('section-label').textContent = 'Data unavailable — showing structure only';
  }

  document.getElementById('refresh-icon').style.animation = '';
  document.getElementById('ts').textContent =
    'Generated 2026-06-05 18:05 UTC · Live data fetched by your browser · Auto-refreshes every 60 min';
}

init();
</script>
</body>
</html>
