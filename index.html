<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>DCA Portfolio Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0a0d14;color:#e2e8f0;min-height:100vh;padding:16px}
.header{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;padding:20px;background:#111520;border-radius:12px;border:1px solid #1e2535}
.header-title{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header-title h1{font-size:1.35rem;font-weight:800;color:#f1f5f9;letter-spacing:-0.025em}
.live-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:#0d1a12;border:1px solid #22c55e;border-radius:20px;font-size:.68rem;color:#22c55e;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.live-dot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:640px){.stats-row{grid-template-columns:repeat(4,1fr)}}
.stat-card{padding:12px 14px;background:#0d1120;border-radius:8px;border:1px solid #1e2535}
.stat-label{font-size:.65rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-value{font-size:1.2rem;font-weight:700;color:#f1f5f9;font-variant-numeric:tabular-nums}
.stat-value.pos{color:#22c55e}
.stat-value.neg{color:#ef4444}
.stat-sub{font-size:.72rem;color:#64748b;margin-top:2px;font-variant-numeric:tabular-nums}
.last-updated{font-size:.68rem;color:#475569;text-align:right}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:540px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr);gap:14px}}
@media(max-width:380px){.grid{grid-template-columns:1fr}}
.card{background:#111520;border:1px solid #1e2535;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:9px;transition:border-color .2s,transform .15s;position:relative;overflow:hidden}
.card:hover{border-color:#2e3a55;transform:translateY(-2px)}
.card-accent{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:12px 0 0 12px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.symbol{font-size:1.05rem;font-weight:800;color:#f1f5f9;letter-spacing:-.02em}
.company-name{font-size:.6rem;color:#64748b;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.sector-badge{font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:8px;border:1px solid currentColor;white-space:nowrap;flex-shrink:0}
.price-row{display:flex;justify-content:space-between;align-items:center}
.price{font-size:1.1rem;font-weight:700;color:#f1f5f9;font-variant-numeric:tabular-nums}
.ytd-badge{font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:6px;font-variant-numeric:tabular-nums}
.ytd-pos{background:#0d2318;color:#22c55e}
.ytd-neg{background:#1f0f0f;color:#ef4444}
.ytd-neu{background:#1a1f2e;color:#64748b}
.spark-wrap{width:100%;height:40px;overflow:hidden}
.spark-wrap svg{display:block;width:100%;height:40px}
.pos-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.pos-item{display:flex;flex-direction:column;gap:1px}
.pos-lbl{font-size:.56rem;color:#475569;text-transform:uppercase;letter-spacing:.04em}
.pos-val{font-size:.7rem;font-weight:600;color:#cbd5e1;font-variant-numeric:tabular-nums}
.pos-val.pos{color:#22c55e}
.pos-val.neg{color:#ef4444}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.stop-price{font-size:.63rem;color:#ef4444;opacity:.75}
.sbadge{font-size:.57rem;font-weight:700;padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.06em}
.s-trail{background:#1a0d2e;color:#a855f7;border:1px solid #a855f7}
.s-stop{background:#1f0f0f;color:#ef4444;border:1px solid #ef4444;animation:blink 1.4s infinite}
.s-profit{background:#0d2318;color:#22c55e;border:1px solid #22c55e}
.s-watch{background:#1a1f2e;color:#64748b;border:1px solid #374151}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}
.no-pos{opacity:.5}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:64px 20px;color:#475569}
.spinner{width:38px;height:38px;border:3px solid #1e2535;border-top-color:#3b82f6;border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-banner{background:#1c0e0e;border:1px solid #7f1d1d;border-radius:8px;padding:14px 16px;margin-bottom:16px;color:#fca5a5;font-size:.8rem;display:none}
.shimmer{background:linear-gradient(90deg,#1e2535 25%,#2a3450 50%,#1e2535 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:4px;display:inline-block}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <h1>&#9781; DCA Portfolio</h1>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
  </div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Portfolio Value</div>
      <div class="stat-value" id="s-portfolio"><span class="shimmer" style="width:90px;height:18px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Cash</div>
      <div class="stat-value" id="s-cash"><span class="shimmer" style="width:70px;height:18px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Invested</div>
      <div class="stat-value" id="s-invested"><span class="shimmer" style="width:80px;height:18px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Unrealized P&amp;L</div>
      <div class="stat-value" id="s-pnl"><span class="shimmer" style="width:85px;height:18px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></div>
      <div class="stat-sub" id="s-pnl-pct"></div>
    </div>
  </div>
  <div class="last-updated" id="last-updated">Connecting to Alpaca&hellip;</div>
</div>

<div class="err-banner" id="err-banner"></div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:.85rem">Fetching live portfolio data&hellip;</div>
</div>

<div class="grid" id="grid" style="display:none"></div>

<script>

const AK = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const AS = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const AB = 'https://paper-api.alpaca.markets/v2';
const AD = 'https://data.alpaca.markets';
const YTDS = '2026-01-02T00:00:00Z';
const SYMS = 'STRC,MSTR,GEV,BE,KGS,QBTS,IONQ,QUBT,SNDK,MU,WDC,MRVL,ALMU,IPGP,POET,TSLA,AAPL,NFLX,CAT';
const STOCKS = [{"symbol": "STRC", "name": "Strategy Inc", "sector": "Crypto Treasury", "color": "#f7931a"}, {"symbol": "MSTR", "name": "MicroStrategy", "sector": "Crypto Treasury", "color": "#f7931a"}, {"symbol": "GEV", "name": "GE Vernova", "sector": "Energy", "color": "#22c55e"}, {"symbol": "BE", "name": "Bloom Energy", "sector": "Energy", "color": "#22c55e"}, {"symbol": "KGS", "name": "Kodiak Gas", "sector": "Energy", "color": "#22c55e"}, {"symbol": "QBTS", "name": "D-Wave Quantum", "sector": "Quantum", "color": "#a855f7"}, {"symbol": "IONQ", "name": "IonQ", "sector": "Quantum", "color": "#a855f7"}, {"symbol": "QUBT", "name": "Quantum Computing", "sector": "Quantum", "color": "#a855f7"}, {"symbol": "SNDK", "name": "SanDisk", "sector": "Semiconductors", "color": "#3b82f6"}, {"symbol": "MU", "name": "Micron Technology", "sector": "Semiconductors", "color": "#3b82f6"}, {"symbol": "WDC", "name": "Western Digital", "sector": "Semiconductors", "color": "#3b82f6"}, {"symbol": "MRVL", "name": "Marvell Technology", "sector": "Semiconductors", "color": "#3b82f6"}, {"symbol": "ALMU", "name": "Aeluma Inc", "sector": "Semiconductors", "color": "#3b82f6"}, {"symbol": "IPGP", "name": "IPG Photonics", "sector": "Photonics", "color": "#06b6d4"}, {"symbol": "POET", "name": "POET Technologies", "sector": "Photonics", "color": "#06b6d4"}, {"symbol": "TSLA", "name": "Tesla", "sector": "EV", "color": "#ef4444"}, {"symbol": "AAPL", "name": "Apple", "sector": "Consumer Tech", "color": "#64748b"}, {"symbol": "NFLX", "name": "Netflix", "sector": "Streaming", "color": "#ec4899"}, {"symbol": "CAT", "name": "Caterpillar", "sector": "Industrial", "color": "#f59e0b"}];

</script>
<script>

const HDR = {'APCA-API-KEY-ID': AK, 'APCA-API-SECRET-KEY': AS};
const SM = {};
STOCKS.forEach(s => SM[s.symbol] = s);

const $  = id => document.getElementById(id);
const ce = tag => document.createElement(tag);

function fmt(n, d=2){ if(n==null||isNaN(n)) return '—'; return (+n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fd(n,d=2){ if(n==null||isNaN(n)) return '—'; const a=Math.abs(+n); return (n<0?'-':'')+'$'+a.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fp(n){ if(n==null||isNaN(n)) return '—'; return (n>=0?'+':'')+fmt(n,2)+'%'; }
function pc(n){ if(n==null||isNaN(n)) return ''; return n>0?'pos':n<0?'neg':''; }

function badge(plpc){
  if(plpc==null) return {l:'WATCHING',c:'s-watch'};
  if(plpc>=10)   return {l:'TRAILING',c:'s-trail'};
  if(plpc<=-8)   return {l:'NEAR STOP',c:'s-stop'};
  if(plpc>0)     return {l:'IN PROFIT',c:'s-profit'};
  return {l:'WATCHING',c:'s-watch'};
}

function spark(closes, isPos){
  const W=120, H=40, pad=2;
  if(!closes||closes.length<2){
    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><line x1="${pad}" y1="${H/2}" x2="${W-pad}" y2="${H/2}" stroke="#1e2535" stroke-width="1.5" stroke-dasharray="4"/></svg>`;
  }
  const mn=Math.min(...closes), mx=Math.max(...closes), rng=mx-mn||1;
  const n=closes.length;
  const pts=closes.map((c,i)=>{
    const x=pad+(i/(n-1))*(W-2*pad);
    const y=pad+(1-(c-mn)/rng)*(H-2*pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const line=pts.join(' ');
  const fill=`${pad},${H-pad} ${line} ${(W-pad).toFixed(1)},${H-pad}`;
  const id='g'+Math.random().toString(36).slice(2,7);
  const col=isPos?'#22c55e':'#ef4444';
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${fill}" fill="url(#${id})"/>
    <polyline points="${line}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function renderCard(stock, pos, closes){
  const {symbol:sym, name, sector, color} = stock;
  let price=null, avg=null, qty=null, plpc=null, pld=null, mv=null;
  if(pos){
    price = +pos.current_price||null;
    avg   = +pos.avg_entry_price||null;
    qty   = +pos.qty||null;
    plpc  = (+pos.unrealized_plpc)*100;
    pld   = +pos.unrealized_pl||null;
    mv    = +pos.market_value||null;
  }
  let ytd=null;
  if(closes&&closes.length>=2){
    ytd = ((closes[closes.length-1]-closes[0])/closes[0])*100;
    if(price==null) price=closes[closes.length-1];
  }
  const isPos = ytd!=null ? ytd>=0 : (plpc!=null ? plpc>=0 : true);
  const ytdCls = ytd==null?'ytd-neu':ytd>=0?'ytd-pos':'ytd-neg';
  const stop = avg ? avg*0.9 : null;
  const b = badge(plpc);
  const sv = spark(closes, isPos);

  const posHtml = pos ? `
    <div class="pos-row">
      <div class="pos-item"><div class="pos-lbl">Shares</div><div class="pos-val">${qty!=null?fmt(qty,qty%1===0?0:2):'—'}</div></div>
      <div class="pos-item"><div class="pos-lbl">Avg Cost</div><div class="pos-val">${avg!=null?'$'+fmt(avg):'—'}</div></div>
      <div class="pos-item"><div class="pos-lbl">P&L</div><div class="pos-val ${pc(plpc)}">${fp(plpc)}</div></div>
      <div class="pos-item"><div class="pos-lbl">Value</div><div class="pos-val">${fd(mv,0)}</div></div>
    </div>
    <div class="card-foot">
      <span class="stop-price">${stop!=null?'Stop: $'+fmt(stop):''}</span>
      <span class="sbadge ${b.c}">${b.l}</span>
    </div>` : `
    <div class="pos-row no-pos">
      <div class="pos-item" style="grid-column:1/-1"><div class="pos-lbl">Position</div><div class="pos-val">No position</div></div>
    </div>
    <div class="card-foot"><span></span><span class="sbadge s-watch">WATCHING</span></div>`;

  return `<div class="card">
    <div class="card-accent" style="background:${color}"></div>
    <div class="card-top">
      <div><div class="symbol">${sym}</div><div class="company-name" title="${name}">${name}</div></div>
      <div class="sector-badge" style="color:${color}">${sector}</div>
    </div>
    <div class="price-row">
      <span class="price">${price!=null?'$'+fmt(price):'—'}</span>
      <span class="ytd-badge ${ytdCls}">${ytd!=null?fp(ytd):'—'}</span>
    </div>
    <div class="spark-wrap">${sv}</div>
    ${posHtml}
  </div>`;
}

async function fetchAll(){
  const h = HDR;
  let acct=null, pos=[], bars={}, errs=[];
  const par = await Promise.allSettled([
    fetch(AB+'/account',{headers:h}).then(r=>r.json()),
    fetch(AB+'/positions',{headers:h}).then(r=>r.json()),
    fetch(`${AD}/v2/stocks/bars?symbols=${encodeURIComponent(SYMS)}&timeframe=1Day&start=${YTDS}&limit=10000&feed=iex&adjustment=raw`,{headers:h}).then(r=>r.json()),
  ]);
  if(par[0].status==='fulfilled') acct=par[0].value; else errs.push(par[0].reason?.message||'account error');
  if(par[1].status==='fulfilled'){ pos=par[1].value; if(!Array.isArray(pos)) pos=[]; } else errs.push(par[1].reason?.message||'positions error');
  if(par[2].status==='fulfilled'){ const j=par[2].value; if(j&&j.bars) bars=j.bars; } else errs.push(par[2].reason?.message||'bars error');
  return {acct, pos, bars, errs};
}

async function init(){
  const {acct, pos, bars, errs} = await fetchAll();

  if(errs.length){
    const eb = $('err-banner');
    eb.style.display='block';
    eb.innerHTML = '<strong>⚠ Data fetch error:</strong> '+errs.join(' · ')+
      '<br><small>Check browser console. CORS may be blocking the request.</small>';
  }

  const pm = {};
  pos.forEach(p => pm[p.symbol]=p);

  if(acct){
    const equity   = +acct.equity||0;
    const cash     = +acct.cash||0;
    const invested = pos.reduce((s,p)=>s+(+p.market_value||0),0);
    const pnl      = pos.reduce((s,p)=>s+(+p.unrealized_pl||0),0);
    const cost     = invested - pnl;
    const pnlpct   = cost>0 ? (pnl/cost)*100 : 0;

    $('s-portfolio').textContent = fd(equity,0);
    $('s-cash').textContent      = fd(cash,0);
    $('s-invested').textContent  = fd(invested,0);
    const pe = $('s-pnl');
    pe.textContent = fd(pnl,0);
    pe.className   = 'stat-value '+(pnl>=0?'pos':'neg');
    $('s-pnl-pct').textContent = fp(pnlpct);
  }

  const grid = $('grid');
  grid.innerHTML = STOCKS.map(stock => {
    const closes = (bars[stock.symbol]||[]).map(b=>b.c);
    return renderCard(stock, pm[stock.symbol]||null, closes);
  }).join('');

  $('loading').style.display='none';
  grid.style.display='grid';

  const now = new Date();
  $('last-updated').textContent = 'Updated ' +
    now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + ' · ' +
    now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZoneName:'short'});
}

init();

</script>
</body>
</html>
