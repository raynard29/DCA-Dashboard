<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3600">
  <title>DCA Portfolio Dashboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0d14;
      --card: #111520;
      --card2: #161b2e;
      --border: #1e2740;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #0d1220 0%, #111827 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .header-top h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #93c5fd, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--green);
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 20px;
      padding: 2px 8px;
    }

    .live-dot::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .stat {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .stat-val {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .stat-val.green { color: var(--green); }
    .stat-val.red { color: var(--red); }

    /* ── MAIN GRID ── */
    main { padding: 20px 16px 40px; max-width: 1600px; margin: 0 auto; }

    .section-header {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 20px 0 12px;
      padding-left: 2px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    @media (max-width: 480px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, border-color 0.15s;
      cursor: default;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent, #3b82f6);
      opacity: 0.7;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.12);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .symbol {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      color: #f1f5f9;
    }

    .ytd-badge {
      font-size: 0.68rem;
      font-weight: 700;
      border-radius: 6px;
      padding: 2px 6px;
      letter-spacing: 0.02em;
    }

    .ytd-pos { background: rgba(34,197,94,0.15); color: var(--green); }
    .ytd-neg { background: rgba(239,68,68,0.15); color: var(--red); }

    .company-name {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sector-tag {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.85;
      margin-bottom: 6px;
    }

    .price-row {
      margin-bottom: 6px;
    }

    .price {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f8fafc;
    }

    .sparkline-wrap {
      height: 48px;
      margin: 0 -2px 8px;
      overflow: hidden;
    }

    .sparkline-wrap svg {
      width: 100%;
      height: 48px;
      display: block;
    }

    .pos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 8px;
      margin-bottom: 8px;
    }

    .pos-item {
      display: flex;
      flex-direction: column;
    }

    .pos-label {
      font-size: 0.6rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .pos-val {
      font-size: 0.82rem;
      font-weight: 600;
      color: #cbd5e1;
    }

    .pos-val.green { color: var(--green); }
    .pos-val.red   { color: var(--red); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    .status-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 6px;
      padding: 3px 8px;
    }

    .s-trailing { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }
    .s-stop     { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .s-profit   { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .s-watching { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.3); }
    .s-nopos    { background: rgba(30,39,64,0.5);    color: #475569; border: 1px solid var(--border); }

    .no-position {
      font-size: 0.68rem;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 12px 0 4px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: var(--muted);
      flex-wrap: wrap;
      gap: 8px;
    }

    /* ── LOADING / ERROR ── */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      gap: 16px;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(93, 130, 246, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { color: var(--muted); font-size: 0.9rem; }

    .error-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      gap: 12px;
      text-align: center;
      padding: 24px;
    }

    .error-icon { font-size: 3rem; }
    .error-screen h2 { color: var(--red); font-size: 1.2rem; }
    .error-screen p { color: var(--muted); font-size: 0.85rem; max-width: 500px; }

    .retry-btn {
      margin-top: 8px;
      padding: 10px 24px;
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .retry-btn:hover { background: #2563eb; }

    /* ── SECTOR GROUPS ── */
    .sector-group { margin-bottom: 24px; }
  </style>
</head>
<body>

<div id="root">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Fetching live portfolio data…</div>
  </div>
</div>

<script>
const KEY    = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const BROKER = 'https://paper-api.alpaca.markets/v2';
const DATA   = 'https://data.alpaca.markets/v2';

const STOCK_META = {
  STRC: { name: 'Strategy Inc',       sector: 'Crypto Treasury',  color: '#f7931a' },
  MSTR: { name: 'MicroStrategy',      sector: 'Crypto Treasury',  color: '#f7931a' },
  GEV:  { name: 'GE Vernova',         sector: 'Energy',           color: '#22c55e' },
  BE:   { name: 'Bloom Energy',       sector: 'Energy',           color: '#22c55e' },
  KGS:  { name: 'Kodiak Gas',         sector: 'Energy',           color: '#22c55e' },
  QBTS: { name: 'D-Wave Quantum',     sector: 'Quantum',          color: '#a855f7' },
  IONQ: { name: 'IonQ',               sector: 'Quantum',          color: '#a855f7' },
  QUBT: { name: 'Quantum Computing',  sector: 'Quantum',          color: '#a855f7' },
  SNDK: { name: 'SanDisk',            sector: 'Semiconductors',   color: '#3b82f6' },
  MU:   { name: 'Micron Technology',  sector: 'Semiconductors',   color: '#3b82f6' },
  WDC:  { name: 'Western Digital',    sector: 'Semiconductors',   color: '#3b82f6' },
  MRVL: { name: 'Marvell Technology', sector: 'Semiconductors',   color: '#3b82f6' },
  ALMU: { name: 'Aeluma Inc',         sector: 'Semiconductors',   color: '#3b82f6' },
  IPGP: { name: 'IPG Photonics',      sector: 'Photonics',        color: '#06b6d4' },
  POET: { name: 'POET Technologies',  sector: 'Photonics',        color: '#06b6d4' },
  TSLA: { name: 'Tesla',              sector: 'EV',               color: '#ef4444' },
  AAPL: { name: 'Apple',              sector: 'Consumer Tech',    color: '#64748b' },
  NFLX: { name: 'Netflix',            sector: 'Streaming',        color: '#ec4899' },
  CAT:  { name: 'Caterpillar',        sector: 'Industrial',       color: '#f59e0b' },
};

const SECTOR_ORDER = [
  'Crypto Treasury','Quantum','Semiconductors','Photonics','Energy','EV','Consumer Tech','Streaming','Industrial'
];

async function apiFetch(url) {
  const r = await fetch(url, {
    headers: { 'APCA-API-KEY-ID': KEY, 'APCA-API-SECRET-KEY': SECRET }
  });
  if (!r.ok) {
    const body = await r.text();
    throw new Error(`HTTP ${r.status}: ${body.slice(0,200)}`);
  }
  return r.json();
}

function drawSparkline(prices, color) {
  if (!prices || prices.length < 2) return '<svg viewBox="0 0 200 48" style="width:100%;height:48px"></svg>';
  const W = 200, H = 48, PAD = 3;
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const range = max - min || 1;
  const scaleY = p => H - PAD - ((p - min) / range) * (H - PAD * 2);
  const scaleX = i => (i / (prices.length - 1)) * W;
  const pts = prices.map((p, i) => `${scaleX(i).toFixed(1)},${scaleY(p).toFixed(1)}`).join(' ');
  const area = `0,${H} ${pts} ${W},${H}`;
  const uid = `g${color.replace('#', '')}`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:48px">
    <defs>
      <linearGradient id="${uid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <polygon points="${area}" fill="url(#${uid})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function badge(plpc) {
  if (plpc === null) return `<span class="status-badge s-nopos">NO POS</span>`;
  if (plpc >= 10)   return `<span class="status-badge s-trailing">&#9650; TRAILING STOP</span>`;
  if (plpc <= -8)   return `<span class="status-badge s-stop">&#9660; NEAR STOP</span>`;
  if (plpc > 0)     return `<span class="status-badge s-profit">&#8679; IN PROFIT</span>`;
  return `<span class="status-badge s-watching">&#9679; WATCHING</span>`;
}

function fc(n, d = 2) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: d, maximumFractionDigits: d }).format(n);
}

function fp(n, d = 2) {
  if (n === null || isNaN(n)) return '—';
  const s = n.toFixed(d);
  return (n >= 0 ? '+' : '') + s + '%';
}

function fq(n) {
  if (n === null) return '—';
  return n % 1 === 0 ? n.toFixed(0) : n.toFixed(4);
}

function buildCard(sym, pos, prices) {
  const meta = STOCK_META[sym];
  const currentPrice = pos ? parseFloat(pos.current_price)
                           : (prices.length ? prices[prices.length - 1] : 0);
  const ytdFirst = prices.length ? prices[0] : null;
  const ytdPct   = ytdFirst && currentPrice ? (currentPrice - ytdFirst) / ytdFirst * 100 : null;
  const sparkColor = ytdPct !== null ? (ytdPct >= 0 ? '#22c55e' : '#ef4444') : meta.color;

  const plpc   = pos ? parseFloat(pos.unrealized_plpc) * 100 : null;
  const avg    = pos ? parseFloat(pos.avg_entry_price) : null;
  const qty    = pos ? parseFloat(pos.qty) : null;
  const stop   = avg ? avg * 0.9 : null;

  const ytdHtml = ytdPct !== null
    ? `<span class="ytd-badge ${ytdPct >= 0 ? 'ytd-pos' : 'ytd-neg'}">${fp(ytdPct)}</span>`
    : '';

  const posSection = pos ? `
    <div class="pos-grid">
      <div class="pos-item"><span class="pos-label">Shares</span><span class="pos-val">${fq(qty)}</span></div>
      <div class="pos-item"><span class="pos-label">Avg Cost</span><span class="pos-val">${fc(avg)}</span></div>
      <div class="pos-item"><span class="pos-label">P&amp;L</span><span class="pos-val ${plpc >= 0 ? 'green' : 'red'}">${fp(plpc)}</span></div>
      <div class="pos-item"><span class="pos-label">Stop (−10%)</span><span class="pos-val red">${fc(stop)}</span></div>
    </div>
    <div class="divider"></div>
    ${badge(plpc)}
  ` : `<div class="no-position">No open position</div><div class="divider"></div>${badge(null)}`;

  return `
  <div class="card" style="--accent:${meta.color}">
    <div class="card-top">
      <span class="symbol">${sym}</span>
      ${ytdHtml}
    </div>
    <div class="company-name">${meta.name}</div>
    <div class="sector-tag" style="color:${meta.color}">${meta.sector}</div>
    <div class="price-row"><span class="price">${fc(currentPrice)}</span></div>
    <div class="sparkline-wrap">${drawSparkline(prices, sparkColor)}</div>
    ${posSection}
  </div>`;
}

function buildHeader(account, positions) {
  const portVal      = parseFloat(account.portfolio_value);
  const cash         = parseFloat(account.cash);
  const unrealizedPL = positions.reduce((s, p) => s + parseFloat(p.unrealized_pl), 0);
  const invested     = positions.reduce((s, p) => s + parseFloat(p.cost_basis), 0);

  return `
  <header>
    <div class="header-top">
      <h1>DCA Portfolio</h1>
      <span class="live-dot">LIVE</span>
    </div>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Portfolio Value</div>
        <div class="stat-val">${fc(portVal)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Cash</div>
        <div class="stat-val">${fc(cash)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Invested</div>
        <div class="stat-val">${fc(invested)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Unrealized P&amp;L</div>
        <div class="stat-val ${unrealizedPL >= 0 ? 'green' : 'red'}">${fp(unrealizedPL / (invested || 1) * 100)} &nbsp;${fc(unrealizedPL, 0)}</div>
      </div>
    </div>
  </header>`;
}

async function main() {
  const root = document.getElementById('root');
  try {
    const symbols = Object.keys(STOCK_META).join(',');
    const startDate = new Date(new Date().getFullYear() + '-01-02').toISOString();

    const [account, positions, barsResp] = await Promise.all([
      apiFetch(`${BROKER}/account`),
      apiFetch(`${BROKER}/positions`),
      apiFetch(`${DATA}/stocks/bars?symbols=${symbols}&timeframe=1Day&start=${startDate}&limit=10000&feed=iex&adjustment=raw`),
    ]);

    const bars   = barsResp.bars || {};
    const posMap = {};
    positions.forEach(p => posMap[p.symbol] = p);

    // Group by sector
    const bySector = {};
    for (const [sym, meta] of Object.entries(STOCK_META)) {
      if (!bySector[meta.sector]) bySector[meta.sector] = [];
      bySector[meta.sector].push(sym);
    }

    let mainHtml = '';
    const orderedSectors = SECTOR_ORDER.filter(s => bySector[s]);
    for (const sector of orderedSectors) {
      const syms = bySector[sector];
      const color = STOCK_META[syms[0]].color;
      mainHtml += `
      <div class="sector-group">
        <div class="section-header" style="color:${color}">${sector}</div>
        <div class="cards-grid">
          ${syms.map(sym => buildCard(sym, posMap[sym] || null, (bars[sym] || []).map(b => b.c))).join('')}
        </div>
      </div>`;
    }

    const ts = new Date().toLocaleString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });

    root.innerHTML = `
      ${buildHeader(account, positions)}
      <main>${mainHtml}</main>
      <footer>
        <span>Last updated: ${ts}</span>
        <span>Auto-refreshes every hour &nbsp;·&nbsp; 19 stocks tracked</span>
      </footer>`;

  } catch (err) {
    console.error(err);
    root.innerHTML = `
      <div class="error-screen">
        <div class="error-icon">⚠️</div>
        <h2>Failed to load portfolio data</h2>
        <p>${err.message}</p>
        <p style="margin-top:8px">If you see a CORS or 403 error, ensure your Alpaca API key's IP allow-list includes your current IP address.</p>
        <button class="retry-btn" onclick="location.reload()">Retry</button>
      </div>`;
  }
}

main();
</script>
</body>
</html>
