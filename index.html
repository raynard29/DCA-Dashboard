<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3600">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCA Portfolio Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0d14;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    /* ── Header ─────────────────────────────────────────── */
    .page-header {
      max-width: 1440px;
      margin: 0 auto 24px;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.35rem;
      font-weight: 800;
      color: #f1f5f9;
      margin-bottom: 18px;
      letter-spacing: -0.01em;
    }

    .page-title svg { flex-shrink: 0; }

    /* ── Summary stat row ───────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    @media (max-width: 900px)  { .stats-row { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 540px)  { .stats-row { grid-template-columns: repeat(2, 1fr); } }

    .stat-card {
      background: #111520;
      border: 1px solid #1e2433;
      border-radius: 12px;
      padding: 14px 18px;
    }

    .stat-label {
      font-size: 0.68rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f1f5f9;
      white-space: nowrap;
    }

    .stat-value.up   { color: #22c55e; }
    .stat-value.down { color: #ef4444; }

    .stat-sub {
      font-size: 0.7rem;
      color: #475569;
      margin-top: 3px;
    }

    /* ── Stock grid ─────────────────────────────────────── */
    .grid {
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    @media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 780px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .grid { grid-template-columns: 1fr; } }

    /* ── Stock card ─────────────────────────────────────── */
    .card {
      background: #111520;
      border: 1px solid #1e2433;
      border-radius: 14px;
      padding: 15px 15px 13px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.18s, transform 0.18s;
    }

    .card:hover {
      border-color: #2d3a52;
      transform: translateY(-1px);
    }

    .card-stripe {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
    }

    /* top section */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 9px;
    }

    .symbol {
      font-size: 1.25rem;
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: 0.01em;
      line-height: 1;
    }

    .company-name {
      font-size: 0.67rem;
      color: #475569;
      margin-top: 3px;
      line-height: 1.2;
    }

    .sector-pill {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 6px;
    }

    /* price + ytd */
    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
    }

    .price {
      font-size: 1.18rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    .ytd-pill {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
    }

    .ytd-pill.up   { background: rgba(34,197,94,0.13);  color: #22c55e; }
    .ytd-pill.down { background: rgba(239,68,68,0.13);  color: #ef4444; }
    .ytd-pill.flat { background: rgba(100,116,139,0.1); color: #64748b; }

    /* sparkline */
    .spark-wrap {
      height: 46px;
      margin-bottom: 11px;
    }

    .spark-wrap svg {
      width: 100%;
      height: 46px;
      display: block;
    }

    /* position details */
    .pos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 10px;
      font-size: 0.67rem;
      color: #475569;
      margin-bottom: 10px;
    }

    .pos-grid .lbl { color: #334155; }
    .pos-grid .val { color: #94a3b8; font-weight: 600; }
    .pos-grid .val.up   { color: #22c55e; }
    .pos-grid .val.down { color: #ef4444; }

    /* status badge */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.63rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .status.trailing  { background: rgba(168,85,247,0.12); color: #a855f7; border: 1px solid rgba(168,85,247,0.28); }
    .status.profit    { background: rgba(34,197,94,0.1);   color: #22c55e; border: 1px solid rgba(34,197,94,0.22);  }
    .status.nearstop  { background: rgba(239,68,68,0.1);   color: #f87171; border: 1px solid rgba(239,68,68,0.25);  }
    .status.watching  { background: rgba(100,116,139,0.08);color: #64748b; border: 1px solid rgba(100,116,139,0.18);}

    .no-pos {
      font-size: 0.68rem;
      color: #2d3748;
      font-style: italic;
    }

    /* ── Footer ─────────────────────────────────────────── */
    .footer {
      max-width: 1440px;
      margin: 22px auto 0;
      text-align: center;
      font-size: 0.7rem;
      color: #1e2d40;
    }

    /* ── Loading / error ─────────────────────────────────── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      gap: 14px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #1e2433;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .load-txt { color: #475569; font-size: 0.82rem; }

    #err-wrap {
      display: none;
      max-width: 520px;
      margin: 80px auto;
      background: #111520;
      border: 1px solid #ef4444;
      border-radius: 14px;
      padding: 28px 24px;
      text-align: center;
    }

    #err-title { color: #ef4444; font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
    #err-detail { color: #64748b; font-size: 0.78rem; line-height: 1.5; word-break: break-all; }

    #dashboard { display: none; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="load-txt">Fetching live portfolio data…</div>
</div>

<div id="err-wrap">
  <div id="err-title">⚠ Load Error</div>
  <div id="err-detail"></div>
</div>

<div id="dashboard"></div>

<script>
/* ── Config ───────────────────────────────────────────────── */
const KEY    = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const BASE   = 'https://paper-api.alpaca.markets/v2';
const DATA   = 'https://data.alpaca.markets';

const INFO = {
  STRC: { name:'Strategy Inc',        sector:'Crypto Treasury', color:'#f7931a' },
  MSTR: { name:'MicroStrategy',       sector:'Crypto Treasury', color:'#f7931a' },
  GEV:  { name:'GE Vernova',          sector:'Energy',          color:'#22c55e' },
  BE:   { name:'Bloom Energy',        sector:'Energy',          color:'#22c55e' },
  KGS:  { name:'Kodiak Gas',          sector:'Energy',          color:'#22c55e' },
  QBTS: { name:'D-Wave Quantum',      sector:'Quantum',         color:'#a855f7' },
  IONQ: { name:'IonQ',                sector:'Quantum',         color:'#a855f7' },
  QUBT: { name:'Quantum Computing',   sector:'Quantum',         color:'#a855f7' },
  SNDK: { name:'SanDisk',             sector:'Semiconductors',  color:'#3b82f6' },
  MU:   { name:'Micron Technology',   sector:'Semiconductors',  color:'#3b82f6' },
  WDC:  { name:'Western Digital',     sector:'Semiconductors',  color:'#3b82f6' },
  MRVL: { name:'Marvell Technology',  sector:'Semiconductors',  color:'#3b82f6' },
  ALMU: { name:'Aeluma Inc',          sector:'Semiconductors',  color:'#3b82f6' },
  IPGP: { name:'IPG Photonics',       sector:'Photonics',       color:'#06b6d4' },
  POET: { name:'POET Technologies',   sector:'Photonics',       color:'#06b6d4' },
  TSLA: { name:'Tesla',               sector:'EV',              color:'#ef4444' },
  AAPL: { name:'Apple',               sector:'Consumer Tech',   color:'#64748b' },
  NFLX: { name:'Netflix',             sector:'Streaming',       color:'#ec4899' },
  CAT:  { name:'Caterpillar',         sector:'Industrial',      color:'#f59e0b' },
};

const SYMS = Object.keys(INFO);
const H    = { 'APCA-API-KEY-ID': KEY, 'APCA-API-SECRET-KEY': SECRET };

/* ── Fetch helpers ────────────────────────────────────────── */
async function get(url) {
  const r = await fetch(url, { headers: H });
  if (!r.ok) {
    const txt = await r.text().catch(() => '');
    throw new Error(`${r.status} ${r.statusText} — ${url}\n${txt.slice(0,200)}`);
  }
  return r.json();
}

async function getAllBars() {
  const syms  = SYMS.join(',');
  const start = '2026-01-02T00:00:00Z';
  const base  = `${DATA}/v2/stocks/bars?symbols=${syms}&timeframe=1Day&start=${start}&limit=10000&feed=iex&adjustment=raw`;
  const all   = {};
  let url     = base;
  while (url) {
    const d = await get(url);
    for (const [s, bars] of Object.entries(d.bars || {})) {
      (all[s] = all[s] || []).push(...bars);
    }
    url = d.next_page_token ? `${base}&page_token=${encodeURIComponent(d.next_page_token)}` : null;
  }
  return all;
}

/* ── Formatters ───────────────────────────────────────────── */
const $n = v => v == null ? '—' : '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
const pct = v => v == null ? '—' : (v >= 0 ? '+' : '') + Number(v).toFixed(2) + '%';

/* ── SVG Sparkline ────────────────────────────────────────── */
function spark(closes, color) {
  if (!closes || closes.length < 3)
    return `<svg viewBox="0 0 120 46"><text x="60" y="26" fill="#1e2d40" text-anchor="middle" font-size="9" font-family="sans-serif">no data</text></svg>`;

  const mn = Math.min(...closes), mx = Math.max(...closes), rng = mx - mn || 0.01;
  const W = 120, H = 46, px = 2, py = 4;
  const coords = closes.map((v, i) => {
    const x = px + (i / (closes.length - 1)) * (W - 2 * px);
    const y = py + (1 - (v - mn) / rng) * (H - 2 * py);
    return [x, y];
  });

  const pts    = coords.map(([x,y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
  const up     = closes[closes.length - 1] >= closes[0];
  const stroke = up ? '#22c55e' : '#ef4444';
  const gid    = 'g' + color.replace('#','') + Math.random().toString(36).slice(2,6);

  const [x0]  = coords[0];
  const [xN]  = coords[coords.length - 1];
  const area  = `M${x0.toFixed(1)},${(H-py).toFixed(1)} ` +
                coords.map(([x,y]) => `L${x.toFixed(1)},${y.toFixed(1)}`).join(' ') +
                ` L${xN.toFixed(1)},${(H-py).toFixed(1)} Z`;

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
  <defs>
    <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="${stroke}" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="${stroke}" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="${area}" fill="url(#${gid})"/>
  <polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="1.6"
    stroke-linejoin="round" stroke-linecap="round"/>
</svg>`;
}

/* ── Status badge ─────────────────────────────────────────── */
function badge(plpcRaw) {
  if (plpcRaw == null) return `<span class="status watching">● Watching</span>`;
  const v = parseFloat(plpcRaw) * 100;
  if (v >= 10)  return `<span class="status trailing">▲ Trailing Stop</span>`;
  if (v <= -8)  return `<span class="status nearstop">⚠ Near Stop</span>`;
  if (v > 0)    return `<span class="status profit">✓ In Profit</span>`;
  return `<span class="status watching">● Watching</span>`;
}

/* ── Card renderer ────────────────────────────────────────── */
function card(sym, pos, bars) {
  const info   = INFO[sym];
  const closes = (bars || []).map(b => b.c);
  const last   = closes[closes.length - 1];
  const first  = closes[0];
  const price  = pos ? parseFloat(pos.current_price) : last;
  const ytdPct = (first && price) ? (price - first) / first * 100 : null;
  const ytdCls = ytdPct == null ? 'flat' : ytdPct >= 0 ? 'up' : 'down';

  const plpcRaw = pos ? pos.unrealized_plpc : null;
  const plpcVal = plpcRaw != null ? parseFloat(plpcRaw) * 100 : null;
  const avg     = pos ? parseFloat(pos.avg_entry_price) : null;
  const qty     = pos ? parseFloat(pos.qty) : null;
  const stop    = avg ? avg * 0.9 : null;

  const sectorStyle = `color:${info.color};background:${info.color}1a;border:1px solid ${info.color}30`;

  return `
<div class="card">
  <div class="card-stripe" style="background:${info.color}"></div>
  <div class="card-top">
    <div>
      <div class="symbol">${sym}</div>
      <div class="company-name">${info.name}</div>
    </div>
    <span class="sector-pill" style="${sectorStyle}">${info.sector}</span>
  </div>
  <div class="price-row">
    <span class="price">${$n(price)}</span>
    ${ytdPct != null ? `<span class="ytd-pill ${ytdCls}">${pct(ytdPct)} YTD</span>` : ''}
  </div>
  <div class="spark-wrap">${spark(closes, info.color)}</div>
  ${pos ? `
  <div class="pos-grid">
    <span class="lbl">Shares</span><span class="val">${qty != null ? qty.toLocaleString('en-US',{maximumFractionDigits:4}) : '—'}</span>
    <span class="lbl">Avg Cost</span><span class="val">${$n(avg)}</span>
    <span class="lbl">P&amp;L</span><span class="val ${plpcVal != null && plpcVal >= 0 ? 'up' : 'down'}">${pct(plpcVal)}</span>
    <span class="lbl">Stop (−10%)</span><span class="val">${$n(stop)}</span>
  </div>
  ${badge(plpcRaw)}
  ` : `<div class="no-pos">No open position</div>`}
</div>`;
}

/* ── Main ─────────────────────────────────────────────────── */
async function main() {
  try {
    const [acct, positions, allBars] = await Promise.all([
      get(`${BASE}/account`),
      get(`${BASE}/positions`),
      getAllBars()
    ]);

    const posMap = Object.fromEntries(positions.map(p => [p.symbol, p]));

    const portVal  = parseFloat(acct.portfolio_value);
    const cash     = parseFloat(acct.cash);
    const equity   = parseFloat(acct.equity);
    const invested = equity - cash;

    let totalPL = 0, totalBasis = 0;
    for (const p of positions) {
      totalPL    += parseFloat(p.unrealized_pl    || 0);
      totalBasis += parseFloat(p.cost_basis       || 0);
    }
    const totalPlPct = totalBasis > 0 ? (totalPL / totalBasis) * 100 : 0;
    const plUp       = totalPL >= 0;

    const ts = new Date().toLocaleString('en-US', {
      timeZone:'America/New_York', month:'short', day:'numeric',
      year:'numeric', hour:'numeric', minute:'2-digit', hour12:true
    });

    const cards = SYMS.map(s => card(s, posMap[s], allBars[s])).join('');

    const statsHTML = `
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Portfolio Value</div>
    <div class="stat-value">${$n(portVal)}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Equity</div>
    <div class="stat-value">${$n(equity)}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Cash</div>
    <div class="stat-value">${$n(cash)}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Invested</div>
    <div class="stat-value">${$n(invested)}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Unrealized P&amp;L</div>
    <div class="stat-value ${plUp ? 'up' : 'down'}">${$n(totalPL)}</div>
    <div class="stat-sub">${pct(totalPlPct)} total return</div>
  </div>
</div>`;

    document.getElementById('dashboard').innerHTML = `
<div class="page-header">
  <div class="page-title">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
      <polyline points="16 7 22 7 22 13"/>
    </svg>
    DCA Portfolio Dashboard
  </div>
  ${statsHTML}
</div>
<div class="grid">${cards}</div>
<div class="footer">
  Last updated: ${ts} ET &nbsp;·&nbsp; ${positions.length} open positions &nbsp;·&nbsp; Auto-refresh every 60 min
</div>`;

    document.getElementById('loading').style.display  = 'none';
    document.getElementById('dashboard').style.display = 'block';

  } catch (e) {
    console.error('[DCA Dashboard]', e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err-wrap').style.display = 'block';
    document.getElementById('err-detail').textContent = e.message;
  }
}

main();
</script>
</body>
</html>
