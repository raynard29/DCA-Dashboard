<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>DCA Portfolio Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0d14;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  .header{background:linear-gradient(135deg,#111520 0%,#1a1f35 100%);border-bottom:1px solid #1e2640;padding:20px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
  .header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
  .logo{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.5px}
  .logo span{color:#3b82f6}
  .updated{font-size:11px;color:#4a5568;margin-top:4px}
  .stats-row{display:flex;gap:20px;flex-wrap:wrap;margin-top:16px}
  .stat{background:#0d1117;border:1px solid #1e2640;border-radius:10px;padding:12px 18px;min-width:140px}
  .stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#4a5568;margin-bottom:4px}
  .stat-value{font-size:22px;font-weight:700;color:#fff}
  .stat-value.green{color:#22c55e}
  .stat-value.red{color:#ef4444}
  .stat-value.blue{color:#3b82f6}
  .stat-sub{font-size:11px;color:#4a5568;margin-top:2px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:20px 24px;max-width:1600px;margin:0 auto}
  .card{background:#111520;border:1px solid #1e2640;border-radius:14px;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;cursor:default}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
  .card-header{padding:14px 16px 10px;border-bottom:1px solid #1a2035}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start}
  .symbol{font-size:22px;font-weight:800;letter-spacing:-0.5px}
  .ytd-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px}
  .ytd-badge.pos{background:rgba(34,197,94,0.15);color:#22c55e}
  .ytd-badge.neg{background:rgba(239,68,68,0.15);color:#ef4444}
  .company{font-size:11px;color:#4a5568;margin-top:2px}
  .sector-pill{display:inline-block;font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;margin-top:5px;text-transform:uppercase;letter-spacing:0.5px}
  .price-row{display:flex;align-items:baseline;gap:8px;margin-top:8px}
  .price{font-size:24px;font-weight:700}
  .price-change{font-size:12px}
  .price-change.pos{color:#22c55e}
  .price-change.neg{color:#ef4444}

  .sparkline-wrap{padding:0 0;background:#0a0d14;height:60px}
  svg.spark{width:100%;height:60px;display:block}

  .card-body{padding:12px 16px}
  .pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
  .pos-item{background:#0d1117;border-radius:8px;padding:7px 10px}
  .pos-item-label{font-size:9px;text-transform:uppercase;letter-spacing:0.8px;color:#4a5568;margin-bottom:2px}
  .pos-item-value{font-size:13px;font-weight:600;color:#e2e8f0}
  .pos-item-value.green{color:#22c55e}
  .pos-item-value.red{color:#ef4444}
  .stop-row{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:7px 10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .stop-label{font-size:10px;color:#ef4444;text-transform:uppercase;letter-spacing:0.5px}
  .stop-value{font-size:13px;font-weight:700;color:#ef4444}
  .status-badge{display:inline-block;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px}
  .status-TRAILING{background:rgba(168,85,247,0.15);color:#a855f7;border:1px solid rgba(168,85,247,0.3)}
  .status-NEAR_STOP{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
  .status-IN_PROFIT{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
  .status-WATCHING{background:rgba(100,116,139,0.15);color:#94a3b8;border:1px solid rgba(100,116,139,0.3)}

  .no-pos{color:#4a5568;font-size:11px;font-style:italic;padding:4px 0}

  .loading-overlay{position:fixed;inset:0;background:#0a0d14;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.5s}
  .loading-overlay.hidden{opacity:0;pointer-events:none}
  .spinner{width:48px;height:48px;border:3px solid #1e2640;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
  .loading-text{color:#4a5568;font-size:13px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;padding:12px 16px;border-radius:10px;margin:20px 24px;font-size:13px}

  @media(max-width:600px){
    .grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:12px}
    .stats-row{gap:10px}
    .stat{min-width:110px;padding:10px 12px}
    .stat-value{font-size:18px}
  }
  @media(max-width:380px){
    .grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
  <div class="spinner"></div>
  <div class="loading-text">Fetching live portfolio data&hellip;</div>
</div>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">DCA <span>Portfolio</span></div>
      <div class="updated" id="updated-time">Loading&hellip;</div>
    </div>
    <button onclick="loadData()" style="background:#1e2640;border:1px solid #2d3a5a;color:#94a3b8;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;">&#8635; Refresh</button>
  </div>
  <div class="stats-row" id="stats-row">
    <div class="stat"><div class="stat-label">Portfolio Value</div><div class="stat-value" id="stat-equity">—</div></div>
    <div class="stat"><div class="stat-label">Cash</div><div class="stat-value blue" id="stat-cash">—</div></div>
    <div class="stat"><div class="stat-label">Invested</div><div class="stat-value" id="stat-invested">—</div></div>
    <div class="stat"><div class="stat-label">Unrealized P&L</div><div class="stat-value" id="stat-pnl">—</div></div>
    <div class="stat"><div class="stat-label">P&L %</div><div class="stat-value" id="stat-pnlpct">—</div></div>
  </div>
</div>

<div id="error-area"></div>
<div class="grid" id="card-grid"></div>

<script>
const ALPACA_KEY    = 'PKVSKGUO3BBBBYYOX2TL5L7RPC';
const ALPACA_SECRET = '7mSg5NJN9ukq4pHrmXAgZjgJ1NSnZSsMExpECfYzG38X';
const BASE          = 'https://paper-api.alpaca.markets/v2';
const DATA          = 'https://data.alpaca.markets';
const SYMBOLS       = ["STRC","MSTR","GEV","BE","KGS","QBTS","IONQ","QUBT","SNDK","MU","WDC","MRVL","ALMU","IPGP","POET","TSLA","AAPL","NFLX","CAT"];
const STOCK_META    = {
  "STRC": {name: "Strategy Inc", sector: "Crypto Treasury", color: "#f7931a"},
  "MSTR": {name: "MicroStrategy", sector: "Crypto Treasury", color: "#f7931a"},
  "GEV": {name: "GE Vernova", sector: "Energy", color: "#22c55e"},
  "BE": {name: "Bloom Energy", sector: "Energy", color: "#22c55e"},
  "KGS": {name: "Kodiak Gas", sector: "Energy", color: "#22c55e"},
  "QBTS": {name: "D-Wave Quantum", sector: "Quantum", color: "#a855f7"},
  "IONQ": {name: "IonQ", sector: "Quantum", color: "#a855f7"},
  "QUBT": {name: "Quantum Computing", sector: "Quantum", color: "#a855f7"},
  "SNDK": {name: "SanDisk", sector: "Semiconductors", color: "#3b82f6"},
  "MU": {name: "Micron Technology", sector: "Semiconductors", color: "#3b82f6"},
  "WDC": {name: "Western Digital", sector: "Semiconductors", color: "#3b82f6"},
  "MRVL": {name: "Marvell Technology", sector: "Semiconductors", color: "#3b82f6"},
  "ALMU": {name: "Aeluma Inc", sector: "Semiconductors", color: "#3b82f6"},
  "IPGP": {name: "IPG Photonics", sector: "Photonics", color: "#06b6d4"},
  "POET": {name: "POET Technologies", sector: "Photonics", color: "#06b6d4"},
  "TSLA": {name: "Tesla", sector: "EV", color: "#ef4444"},
  "AAPL": {name: "Apple", sector: "Consumer Tech", color: "#64748b"},
  "NFLX": {name: "Netflix", sector: "Streaming", color: "#ec4899"},
  "CAT": {name: "Caterpillar", sector: "Industrial", color: "#f59e0b"}
};
const START_DATE    = '2026-01-02T00:00:00Z';

const headers = {
  'APCA-API-KEY-ID': ALPACA_KEY,
  'APCA-API-SECRET-KEY': ALPACA_SECRET
};

function fmt(n, dec=2) {
  if (n == null) return '—';
  return Number(n).toLocaleString('en-US', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function fmtUSD(n) {
  if (n == null) return '—';
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtPct(n) {
  if (n == null) return '—';
  return (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';
}

function makeSpark(prices, color) {
  if (!prices || prices.length < 2) return '<svg class="spark"></svg>';
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const W = 300, H = 60, pad = 4;
  const pts = prices.map((p, i) => {
    const x = pad + (i / (prices.length - 1)) * (W - 2 * pad);
    const y = H - pad - ((p - min) / range) * (H - 2 * pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const poly = pts.join(' ');
  const firstX = pad, lastX = W - pad;
  const firstY = H - pad - ((prices[0] - min) / range) * (H - 2 * pad);
  const lastY  = H - pad - ((prices[prices.length-1] - min) / range) * (H - 2 * pad);
  const area = `M${firstX},${H - pad} L${firstX},${firstY.toFixed(1)} ` +
               pts.slice(1).map((p,i) => `L${p}`).join(' ') +
               ` L${lastX},${H - pad} Z`;
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="sg_${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#sg_${color.replace('#','')})" />
    <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lastX}" cy="${lastY.toFixed(1)}" r="3" fill="${color}"/>
  </svg>`;
}

function getStatus(plpc) {
  if (plpc == null) return 'WATCHING';
  const p = parseFloat(plpc);
  if (p >= 10) return 'TRAILING';
  if (p <= -8) return 'NEAR_STOP';
  if (p > 0)  return 'IN_PROFIT';
  return 'WATCHING';
}
function statusLabel(s) {
  return {TRAILING:'🚀 Trailing', NEAR_STOP:'⚠️ Near Stop', IN_PROFIT:'✅ In Profit', WATCHING:'👁 Watching'}[s] || s;
}

function renderCard(sym, pos, bars) {
  const meta = STOCK_META[sym] || {name:sym, sector:'Unknown', color:'#64748b'};
  const color = meta.color;
  const prices = (bars[sym] || []).map(b => b.c);
  const ytdStart = prices[0] || null;
  const ytdEnd   = prices[prices.length-1] || null;
  const ytdPct   = (ytdStart && ytdEnd) ? ((ytdEnd - ytdStart) / ytdStart * 100) : null;
  const isPos    = ytdPct != null ? ytdPct >= 0 : true;
  const sparkColor = isPos ? '#22c55e' : '#ef4444';
  const spark    = makeSpark(prices, sparkColor);

  let plpc = null, qty = null, avgCost = null, stopPrice = null, posBody = '';
  if (pos) {
    plpc     = parseFloat(pos.unrealized_plpc) * 100;
    qty      = parseFloat(pos.qty);
    avgCost  = parseFloat(pos.avg_entry_price);
    stopPrice = avgCost * 0.9;
    const statusKey = getStatus(plpc);
    const plpcColor = plpc >= 0 ? 'green' : 'red';
    posBody = `
      <div class="pos-grid">
        <div class="pos-item">
          <div class="pos-item-label">Shares</div>
          <div class="pos-item-value">${qty % 1 === 0 ? qty : fmt(qty,4)}</div>
        </div>
        <div class="pos-item">
          <div class="pos-item-label">Avg Cost</div>
          <div class="pos-item-value">$${fmt(avgCost)}</div>
        </div>
        <div class="pos-item">
          <div class="pos-item-label">Unreal. P&L</div>
          <div class="pos-item-value ${plpcColor}">${fmtPct(plpc)}</div>
        </div>
        <div class="pos-item">
          <div class="pos-item-label">Mkt Value</div>
          <div class="pos-item-value">${fmtUSD(parseFloat(pos.market_value))}</div>
        </div>
      </div>
      <div class="stop-row">
        <span class="stop-label">Stop (−10%)</span>
        <span class="stop-value">$${fmt(stopPrice)}</span>
      </div>
      <span class="status-badge status-${statusKey}">${statusLabel(statusKey)}</span>`;
  } else {
    posBody = '<div class="no-pos">No position held</div>';
  }

  const curPrice = pos ? parseFloat(pos.current_price) : ytdEnd;
  return `
  <div class="card">
    <div class="card-header">
      <div class="card-top">
        <div>
          <div class="symbol" style="color:${color}">${sym}</div>
          <div class="company">${meta.name}</div>
          <div class="sector-pill" style="background:${color}22;color:${color}">${meta.sector}</div>
        </div>
        <div>
          ${ytdPct != null ? `<div class="ytd-badge ${ytdPct>=0?'pos':'neg'}">${fmtPct(ytdPct)} YTD</div>` : ''}
        </div>
      </div>
      <div class="price-row">
        <div class="price">${curPrice != null ? '$' + fmt(curPrice) : '—'}</div>
      </div>
    </div>
    <div class="sparkline-wrap">${spark}</div>
    <div class="card-body">${posBody}</div>
  </div>`;
}

async function loadData() {
  const loader = document.getElementById('loader');
  loader.classList.remove('hidden');
  document.getElementById('error-area').innerHTML = '';

  try {
    const symStr = SYMBOLS.join(',');
    const [acctRes, posRes, barsRes] = await Promise.all([
      fetch(`${BASE}/account`, {headers}),
      fetch(`${BASE}/positions`, {headers}),
      fetch(`${DATA}/v2/stocks/bars?symbols=${symStr}&timeframe=1Day&start=${START_DATE}&limit=10000&feed=iex&adjustment=raw`, {headers})
    ]);

    if (!acctRes.ok) throw new Error(`Account API: ${acctRes.status} ${acctRes.statusText}`);
    if (!posRes.ok)  throw new Error(`Positions API: ${posRes.status} ${posRes.statusText}`);
    if (!barsRes.ok) throw new Error(`Bars API: ${barsRes.status} ${barsRes.statusText}`);

    const acct = await acctRes.json();
    const positions = await posRes.json();
    const barsData  = await barsRes.json();

    // Build lookup maps
    const posMap = {};
    for (const p of positions) posMap[p.symbol] = p;

    const bars = barsData.bars || {};

    // Stats
    const equity   = parseFloat(acct.portfolio_value || acct.equity);
    const cash     = parseFloat(acct.cash);
    let totalMktVal = 0, totalPnl = 0;
    for (const p of positions) {
      totalMktVal += parseFloat(p.market_value);
      totalPnl    += parseFloat(p.unrealized_pl);
    }
    const invested = totalMktVal - totalPnl;
    const pnlPct   = invested > 0 ? (totalPnl / invested * 100) : 0;

    document.getElementById('stat-equity').textContent   = fmtUSD(equity);
    document.getElementById('stat-cash').textContent     = fmtUSD(cash);
    document.getElementById('stat-invested').textContent = fmtUSD(invested);
    const pnlEl  = document.getElementById('stat-pnl');
    const pnlPEl = document.getElementById('stat-pnlpct');
    pnlEl.textContent   = fmtUSD(totalPnl);
    pnlEl.className     = 'stat-value ' + (totalPnl >= 0 ? 'green' : 'red');
    pnlPEl.textContent  = fmtPct(pnlPct);
    pnlPEl.className    = 'stat-value ' + (pnlPct >= 0 ? 'green' : 'red');

    document.getElementById('updated-time').textContent =
      'Last updated: ' + new Date().toLocaleString('en-US', {timeZone:'UTC',hour12:false}) + ' UTC';

    // Cards
    const grid = document.getElementById('card-grid');
    grid.innerHTML = SYMBOLS.map(sym => renderCard(sym, posMap[sym] || null, bars)).join('');

  } catch(err) {
    document.getElementById('error-area').innerHTML =
      `<div class="error-msg">⚠️ Error loading data: ${err.message}<br><small>Check browser console for details. CORS must be allowed for paper-api.alpaca.markets and data.alpaca.markets.</small></div>`;
    document.getElementById('updated-time').textContent = 'Failed to load — ' + new Date().toLocaleTimeString();
    console.error(err);
  } finally {
    loader.classList.add('hidden');
  }
}

loadData();
</script>
</body>
</html>
